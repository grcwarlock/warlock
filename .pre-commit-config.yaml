# Warlock pre-commit hooks — run BEFORE every commit
# Install: pre-commit install
# Manual run: pre-commit run --all-files
#
# These are the MINIMUM gates. Full QA runs in CI.
repos:
  - repo: local
    hooks:
      - id: warlock-qa-quick
        name: Warlock Quick QA
        entry: scripts/pre-commit-qa.sh
        language: script
        pass_filenames: false
        always_run: true
      - id: ruff-check
        name: Ruff Lint
        entry: .venv/bin/ruff check warlock/
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: Ruff Format Check
        entry: .venv/bin/ruff format --check warlock/
        language: system
        types: [python]
        pass_filenames: false
      - id: secrets-check
        name: Secrets Detection
        entry: scripts/check-secrets.sh
        language: script
        pass_filenames: false
