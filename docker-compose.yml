version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      WLK_DATABASE_URL: "postgresql+psycopg2://warlock:warlock@postgres:5432/warlock"
      WLK_OPA_URL: "http://opa:8181/v1/data/warlock/authz/allow"
      WLK_OPA_COMPLIANCE_URL: "http://opa:8181/v1/data"
      WLK_CACHE_URL: "redis://redis:6379"
      WLK_QUEUE_BACKEND: "redis"
      WLK_QUEUE_URL: "redis://redis:6379"
      WLK_ENV: "production"
      WLK_JWT_SECRET: "change-me-in-production-min-32-chars!!"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: warlock
      POSTGRES_USER: warlock
      POSTGRES_PASSWORD: warlock
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warlock -d warlock"]
      interval: 10s
      timeout: 5s
      retries: 5

  opa:
    image: openpolicyagent/opa:latest
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--bundle"
      - "/policies"
    volumes:
      - ./policies:/policies:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
