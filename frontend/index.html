<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>Warlock — Compliance Engineering</title>
    <meta name="description" content="Warlock automates compliance monitoring across ISO 27001, SOC 2, NIST 800-53, HIPAA, and CMMC L2. Real-time control status, automated evidence collection, one-click POAM exports." />
    <meta name="keywords" content="GRC, compliance, ISO 27001, SOC 2, NIST 800-53, HIPAA, CMMC, security, audit, risk management" />
    <meta name="author" content="Warlock" />
    <meta name="robots" content="index, follow" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#030711" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/" />
    <meta property="og:title" content="Warlock — Compliance Engineering Platform" />
    <meta property="og:description" content="Real-time compliance monitoring across ISO 27001, SOC 2, NIST 800-53, HIPAA, and CMMC L2. Automate evidence collection, POAM exports, and third-party risk." />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Warlock — Compliance Engineering Platform" />
    <meta property="og:site_name" content="Warlock" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Warlock — Compliance Engineering Platform" />
    <meta name="twitter:description" content="Real-time compliance monitoring across ISO 27001, SOC 2, NIST 800-53, HIPAA, and CMMC L2." />
    <meta name="twitter:image" content="/og-image.svg" />

    <!-- Apple / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Warlock" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Dark/Light mode detection — runs before paint to prevent flash -->
    <script>
      (function() {
        try {
          var mq = window.matchMedia('(prefers-color-scheme: dark)');
          function setTheme(dark) {
            if (dark) {
              document.documentElement.classList.add('dark');
              document.documentElement.classList.remove('light');
            } else {
              document.documentElement.classList.remove('dark');
              document.documentElement.classList.add('light');
            }
          }
          setTheme(mq.matches);
          mq.addEventListener('change', function(e) { setTheme(e.matches); });
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
