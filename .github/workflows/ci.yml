name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# #27: Restrict default permissions to read-only
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install ruff
      - run: ruff check warlock/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install -e ".[dev,ai]"
      - run: pytest tests/ -v --tb=short

  # #28: Security scanning step
  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
      - run: pip install pip-audit
      - run: pip-audit --requirement <(pip freeze) || true

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: warlock:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
