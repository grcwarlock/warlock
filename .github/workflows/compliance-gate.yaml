name: Compliance Gate

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'policies/**'
      - 'terraform/**'
      - 'frameworks-oscal/**'
      - 'warlock/frameworks/**'
      - 'warlock/assessors/**'
  pull_request:
    paths:
      - 'policies/**'
      - 'terraform/**'
      - 'frameworks-oscal/**'
      - 'warlock/frameworks/**'
      - 'warlock/assessors/**'

# #27: Restrict default permissions to read-only
permissions:
  contents: read

jobs:
  opa-policies:
    name: OPA Policy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Validate policy syntax
        run: opa check policies/

      - name: Run policy tests
        run: opa test policies/ -v

      - name: Check policy count regression
        run: |
          POLICY_COUNT=$(find policies/ -name "*.rego" ! -name "*_test.rego" | wc -l)
          echo "Total policies: $POLICY_COUNT"
          if [ "$POLICY_COUNT" -lt 300 ]; then
            echo "::error::Policy count dropped below 300"
            exit 1
          fi

      - name: Verify test coverage
        run: |
          MISSING=0
          for policy in $(find policies/ -name "*.rego" ! -name "*_test.rego"); do
            DIR=$(dirname "$policy")
            BASE=$(basename "$policy" .rego)
            SHORT=$(echo "$BASE" | sed 's/_[a-z_]*$//')
            if [ ! -f "${policy%.rego}_test.rego" ] && [ ! -f "$DIR/${SHORT}_test.rego" ]; then
              echo "::warning::Missing test for $policy"
              MISSING=$((MISSING + 1))
            fi
          done
          echo "Policies without tests: $MISSING"
          if [ "$MISSING" -gt 20 ]; then
            echo "::error::Too many untested policies"
            exit 1
          fi

  terraform:
    name: Terraform Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Validate all modules
        shell: bash
        timeout-minutes: 20
        env:
          TF_PLUGIN_CACHE_DIR: /tmp/terraform-plugin-cache
        run: |
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          FAILED=0
          PASSED=0
          for dir in terraform/modules/*/*; do
            if [ ! -d "$dir" ] || [ ! -f "$dir/main.tf" ]; then continue; fi
            echo "--- $dir ---"
            pushd "$dir" > /dev/null
            if ! terraform init -backend=false -input=false > /dev/null 2>&1; then
              echo "::warning::Init failed for $dir (provider download issue)"
              popd > /dev/null
              continue
            fi
            if ! terraform validate; then
              echo "::error::Validate failed for $dir"
              FAILED=$((FAILED + 1))
            else
              PASSED=$((PASSED + 1))
            fi
            popd > /dev/null
          done
          echo "Terraform modules: $PASSED passed, $FAILED failed"
          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi

      - name: Check formatting
        run: terraform fmt -check -recursive terraform/

  oscal:
    name: OSCAL Package Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate all OSCAL JSON
        shell: bash
        run: |
          python3 << 'EOF'
          import json, pathlib, sys
          errors = []
          count = 0
          for f in pathlib.Path("frameworks-oscal").rglob("*.json"):
              count += 1
              try:
                  json.loads(f.read_text())
              except Exception as e:
                  errors.append(f"{f}: {e}")
          print(f"Checked {count} OSCAL JSON files")
          if errors:
              for e in errors:
                  print(f"BROKEN: {e}", file=sys.stderr)
              sys.exit(1)
          print("All OSCAL JSON valid")
          EOF

  terraform-plan-policy:
    name: Terraform Plan Policy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Install conftest
        run: |
          CONFTEST_VERSION="0.56.0"
          wget -q --tries=3 --waitretry=5 \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            -O /tmp/conftest.tar.gz
          wget -q --tries=3 --waitretry=5 \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/checksums.txt" \
            -O /tmp/conftest_checksums.txt
          cd /tmp && grep "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" conftest_checksums.txt | sha256sum -c -
          tar -xzf /tmp/conftest.tar.gz -C /tmp
          sudo mv /tmp/conftest /usr/local/bin/conftest
          conftest --version

      - name: Generate plan JSON for policy check
        shell: bash
        run: |
          # Use a synthetic minimal plan document that exercises all policy rules
          # In production this step would run: terraform plan -out=tfplan && terraform show -json tfplan > tfplan.json
          cat > /tmp/tfplan.json << 'PLAN'
          {
            "resource_changes": [
              {
                "type": "aws_kms_key",
                "name": "example",
                "change": {
                  "actions": ["create"],
                  "after": {
                    "enable_key_rotation": true,
                    "deletion_window_in_days": 30
                  }
                }
              },
              {
                "type": "aws_s3_bucket_public_access_block",
                "name": "example",
                "change": {
                  "actions": ["create"],
                  "after": {
                    "block_public_acls": true,
                    "block_public_policy": true,
                    "ignore_public_acls": true,
                    "restrict_public_buckets": true
                  }
                }
              },
              {
                "type": "aws_cloudtrail",
                "name": "example",
                "change": {
                  "actions": ["create"],
                  "after": {
                    "is_multi_region_trail": true,
                    "enable_log_file_validation": true,
                    "include_global_service_events": true,
                    "enable_logging": true
                  }
                }
              }
            ]
          }
          PLAN
          echo "Synthetic plan JSON created at /tmp/tfplan.json"

      - name: Run conftest against Terraform plan
        run: |
          conftest test /tmp/tfplan.json \
            --policy policies/terraform/ \
            --all-namespaces \
            --output table
          echo "conftest passed: plan is compliant"

      - name: Validate new Terraform policy count
        run: |
          POLICY_COUNT=$(find policies/terraform/ -name "*.rego" ! -name "*_test.rego" | wc -l)
          echo "Terraform policies: $POLICY_COUNT"
          if [ "$POLICY_COUNT" -lt 9 ]; then
            echo "::error::Terraform policy count dropped below 9"
            exit 1
          fi

  framework-yaml:
    name: Framework YAML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate framework YAML files
        shell: bash
        run: |
          pip install pyyaml --quiet
          python3 << 'EOF'
          import yaml, pathlib, sys
          errors = []
          for f in pathlib.Path("warlock/frameworks").glob("*.yaml"):
              if f.stem.startswith("crosswalk"):
                  continue
              try:
                  data = yaml.safe_load(f.read_text())
                  if not isinstance(data, dict):
                      errors.append(f"{f}: root is not a dict")
                      continue
                  families = data.get("control_families", {})
                  if not isinstance(families, dict):
                      errors.append(f"{f}: control_families is not a dict")
                      continue
                  total = sum(len(fam.get("controls", {})) for fam in families.values()
                              if isinstance(fam.get("controls", {}), dict))
                  fid = data.get("framework_id", f.stem)
                  print(f"{f.name}: {fid} -- {len(families)} families, {total} controls")
              except Exception as e:
                  errors.append(f"{f}: {e}")
          if errors:
              for e in errors:
                  print(f"BROKEN: {e}", file=sys.stderr)
              sys.exit(1)
          print("All framework YAMLs valid")
          EOF
