framework_id: esg
control_families:
  ENV:
    name: Environmental
    controls:
      ENV.1:
        checks:
        - id: esg_ghg_emissions
          event_types:
          - sustainability_reports
          resource_types:
          - emissions_data
        monitoring_frequency: annually
      ENV.2:
        checks:
        - id: esg_energy_consumption
          event_types:
          - sustainability_reports
          resource_types:
          - energy_data
        monitoring_frequency: annually
      ENV.3:
        checks:
        - id: esg_water_usage
          event_types:
          - sustainability_reports
          resource_types:
          - water_data
        monitoring_frequency: annually
      ENV.4:
        checks:
        - id: esg_waste_management
          event_types:
