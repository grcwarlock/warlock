          resource_types:
          - waste_data
        monitoring_frequency: annually
      ENV.5:
        checks:
        - id: esg_data_center_efficiency
          event_types:
          - aws_config
          - azure_policy
          resource_types:
          - compute_instance
        monitoring_frequency: quarterly
  SOC:
