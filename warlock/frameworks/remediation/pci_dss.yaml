    console_path: "SailPoint / IAM / Entra ID"
    evidence_types: ["sailpoint_identities", "sailpoint_roles"]
    assertion_name: "access_reviews_current"
  R7.2:
    summary: "Ensure access to system components is appropriately defined and assigned"
    remediation_steps:
      - "Assign access based on individual job responsibilities"
      - "Implement least-privilege access assignments"
      - "Document and approve all access changes"
    console_path: "SailPoint / IAM"
    evidence_types: ["iam_credential_report", "sailpoint_identities"]
    assertion_name: "access_reviews_current"
  R7.3:
    summary: "Manage access to system components and data via an access control system"
    remediation_steps:
      - "Use automated access control systems (SailPoint, Okta, Entra ID)"
