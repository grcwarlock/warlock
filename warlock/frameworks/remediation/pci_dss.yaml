    console_path: "WAF / CloudFront / Application Gateway"
    evidence_types: ["vuln_export", "wiz_issues"]
    assertion_name: "vulnerability_scan_current"
  R6.5:
    summary: "Apply change management processes for all changes to system components in the CDE"
    remediation_steps:
