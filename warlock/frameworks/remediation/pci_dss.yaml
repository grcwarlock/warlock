      - "Restrict access based on need-to-know"
    console_path: "SailPoint / Okta / Entra ID"
    evidence_types: ["sailpoint_identities", "okta_users"]
    assertion_name: "access_reviews_current"
  R8.1:
    summary: "Identify and authenticate all users"
    remediation_steps:
      - "Assign a unique ID to each person with computer access"
