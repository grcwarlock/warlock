    evidence_types: ["snow_change_requests"]
    assertion_name: "change_request_approved"
  R7.1:
    summary: "Restrict access to system components and cardholder data to only those who need it"
    remediation_steps:
      - "Define access control policies based on job classification and function"
      - "Implement role-based access control for CDE systems"
      - "Document business justification for each access grant"
