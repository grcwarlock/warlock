controls:
  R1.1:
    summary: "Install and maintain network security controls to protect cardholder data"
    remediation_steps:
      - "Document all network connections and data flows involving cardholder data"
      - "Deploy firewalls/security groups at all internet-facing boundaries"
      - "Maintain a network diagram showing all connections to the CDE"
      - "Review and update firewall and router rule sets at least every six months"
    console_path: "VPC > Security Groups / Azure NSGs / GCP Firewall Rules"
    evidence_types: ["ec2_security_groups", "network_security_groups", "compute_firewall_rules"]
    assertion_name: "no_open_security_groups"
  R1.2:
    summary: "Restrict inbound and outbound traffic to only what is necessary for the CDE"
    remediation_steps:
      - "Configure deny-all default rules on all firewall/security groups"
      - "Add explicit allow rules only for documented business justifications"
      - "Block direct public access to CDE components"
      - "Review rules quarterly and remove stale entries"
    console_path: "VPC > Security Groups > Inbound/Outbound Rules"
    evidence_types: ["ec2_security_groups", "ec2_network_acls"]
    assertion_name: "no_open_security_groups"
  R1.3:
    summary: "Restrict access between the CDE and untrusted networks"
    remediation_steps:
      - "Implement network segmentation between CDE and other networks"
      - "Place web-facing components in a DMZ"
      - "Block direct inbound from internet to CDE"
      - "Restrict outbound from CDE to only required destinations"
    console_path: "VPC > Subnets / Network ACLs"
    evidence_types: ["ec2_security_groups", "ec2_network_acls"]
    assertion_name: "no_open_security_groups"
  R1.4:
    summary: "Install personal firewall software on portable devices connecting to the CDE"
    remediation_steps:
      - "Deploy endpoint firewall via MDM/EDR policy"
      - "Verify all portable devices have host-based firewall enabled"
      - "Prevent users from disabling the personal firewall"
    console_path: "CrowdStrike/Defender > Firewall Policies"
    evidence_types: ["falcon_device_details", "defender_machines"]
    assertion_name: "endpoint_protection_active"
  R1.5:
    summary: "Ensure security controls for network security are managed and maintained"
    remediation_steps:
      - "Define processes for managing network security controls"
      - "Assign roles and responsibilities for firewall management"
      - "Document change procedures for network security controls"
    console_path: "AWS Config / Azure Policy"
    evidence_types: ["config_recorders"]
    assertion_name: "config_recorder_enabled"
  R2.1:
    summary: "Establish secure configuration standards for all system components"
    remediation_steps:
      - "Develop configuration standards based on CIS Benchmarks or DISA STIGs"
      - "Apply hardening standards to all system components before deployment"
      - "Change vendor default passwords before connecting systems to production"
      - "Remove or disable unnecessary default accounts"
    console_path: "AWS Config Rules / Azure Policy / Wiz"
    evidence_types: ["config_recorders", "policy_compliance"]
    assertion_name: "config_recorder_enabled"
  R2.2:
    summary: "Configure all system components securely"
    remediation_steps:
      - "Enable only necessary services, protocols, and ports"
      - "Implement security parameters aligned with industry-accepted hardening guides"
      - "Encrypt all non-console administrative access"
      - "Document security-relevant configuration parameters"
    console_path: "AWS Config / Wiz Configuration Findings"
    evidence_types: ["config_recorders", "wiz_config_findings"]
    assertion_name: "config_recorder_enabled"
  R2.3:
    summary: "Secure wireless environments connected to or transmitting cardholder data"
    remediation_steps:
      - "Inventory all wireless access points and connections"
      - "Use WPA3 or WPA2 with AES encryption for wireless networks"
      - "Change default wireless encryption keys at installation and upon personnel changes"
    console_path: "Network Configuration"
    evidence_types: ["ec2_security_groups"]
    assertion_name: null
  R3.1:
    summary: "Minimize data storage and retention of stored account data"
    remediation_steps:
      - "Define data retention and disposal policies for cardholder data"
      - "Implement automated data purge for data exceeding retention period"
      - "Limit storage amount and retention time to business requirements"
      - "Conduct quarterly process to identify and delete unnecessary data"
    console_path: "S3 Lifecycle Policies / DLP"
    evidence_types: ["s3_buckets", "storage_accounts"]
    assertion_name: null
  R3.2:
    summary: "Do not store sensitive authentication data after authorization"
    remediation_steps:
      - "Implement DLP policies to detect and prevent storage of SAD"
      - "Verify POS/payment applications do not store full track data, CVV, or PIN"
      - "Scan for and remove any stored sensitive authentication data"
    console_path: "DLP Policies"
    evidence_types: ["purview_dlp_policies"]
    assertion_name: "dlp_policies_active"
  R3.3:
    summary: "Protect stored account data"
    remediation_steps:
      - "Render PAN unreadable using one-way hashing, truncation, or strong encryption"
      - "If disk encryption is used, manage keys independently from OS authentication"
      - "Document cryptographic architecture for cardholder data protection"
    console_path: "KMS / Key Vault"
    evidence_types: ["key_vault", "s3_buckets"]
    assertion_name: "encryption_at_rest"
  R3.4:
    summary: "Protect PAN with access restrictions"
    remediation_steps:
      - "Restrict access to PAN to only those with a business need"
      - "Use role-based access control for cardholder data systems"
      - "Display PAN in masked format (show only last four digits)"
    console_path: "IAM / SailPoint"
    evidence_types: ["s3_buckets", "storage_accounts"]
    assertion_name: "encryption_at_rest"
  R3.5:
    summary: "Protect PAN wherever it is stored"
    remediation_steps:
      - "Encrypt PAN at rest using strong cryptography (AES-256)"
      - "Use tokenization or format-preserving encryption where applicable"
      - "Implement key management procedures per R3.6 and R3.7"
    console_path: "KMS / Key Vault"
    evidence_types: ["key_vault", "s3_buckets"]
    assertion_name: "encryption_at_rest"
  R3.6:
    summary: "Protect cryptographic keys used to protect stored account data"
    remediation_steps:
      - "Restrict access to cryptographic keys to fewest custodians necessary"
      - "Store keys securely in HSM or key management service"
      - "Implement split knowledge and dual control for key management"
    console_path: "KMS / Key Vault"
    evidence_types: ["key_vault"]
    assertion_name: "encryption_at_rest"
  R3.7:
    summary: "Implement key management processes and procedures"
    remediation_steps:
      - "Generate keys using approved algorithms (AES-256, RSA-2048+)"
      - "Rotate encryption keys at least annually"
      - "Retire or replace keys when integrity is weakened or suspected compromise"
      - "Implement key destruction procedures"
    console_path: "KMS Key Rotation / Key Vault Rotation"
    evidence_types: ["key_vault"]
    assertion_name: null
  R4.1:
    summary: "Protect cardholder data with strong cryptography during transmission over public networks"
    remediation_steps:
      - "Use TLS 1.2+ for all transmissions of cardholder data"
      - "Do not use SSL or early TLS versions"
      - "Verify certificates are valid and from trusted CAs"
      - "Implement HSTS on all web interfaces handling cardholder data"
    console_path: "Certificate Manager / Load Balancer TLS Settings"
    evidence_types: ["ec2_security_groups", "network_security_groups"]
    assertion_name: null
  R4.2:
    summary: "Protect PAN with strong cryptography when sent via end-user messaging"
    remediation_steps:
      - "Implement DLP policies to prevent PAN in email, chat, SMS"
      - "Train personnel to never send PAN via unencrypted messaging"
      - "Deploy email encryption for any business-justified PAN transmission"
    console_path: "DLP Policies"
    evidence_types: ["purview_dlp_policies"]
    assertion_name: "dlp_policies_active"
  R5.1:
    summary: "Deploy anti-malware on all systems commonly affected by malware"
    remediation_steps:
      - "Install EDR/anti-malware on all endpoints and servers in the CDE"
      - "Enable real-time scanning and automatic definition updates"
      - "Ensure anti-malware cannot be disabled by users"
      - "Configure periodic full-system scans"
    console_path: "CrowdStrike/Defender/SentinelOne Console"
    evidence_types: ["falcon_device_details", "defender_machines", "s1_agents"]
    assertion_name: "endpoint_protection_active"
  R5.2:
    summary: "Detect and address malicious software"
    remediation_steps:
      - "Configure automated quarantine or blocking of detected malware"
      - "Establish process for investigating malware detections"
      - "Document and track malware incidents to resolution"
    console_path: "EDR Console > Detections"
    evidence_types: ["falcon_detection_details", "defender_alerts", "s1_threats"]
    assertion_name: "endpoint_protection_active"
  R5.3:
    summary: "Keep anti-malware mechanisms active and up to date"
    remediation_steps:
      - "Enable automatic definition updates"
      - "Monitor agent health and connectivity"
      - "Alert on agents that have not checked in within 24 hours"
    console_path: "EDR Console > Agent Health"
    evidence_types: ["falcon_device_details", "defender_machines"]
    assertion_name: "endpoint_protection_active"
  R5.4:
    summary: "Implement anti-phishing mechanisms"
    remediation_steps:
      - "Deploy email security gateway with anti-phishing capabilities"
      - "Conduct regular phishing simulations via KnowBe4"
      - "Train personnel on phishing recognition and reporting"
    console_path: "KnowBe4 > Phishing Simulations"
    evidence_types: ["kb4_phishing_results"]
    assertion_name: "phishing_failure_rate"
  R6.1:
    summary: "Establish secure software development processes"
    remediation_steps:
      - "Define and enforce a secure SDLC methodology"
      - "Train developers on secure coding practices"
      - "Integrate security testing into CI/CD pipelines"
    console_path: "Snyk / SonarQube"
    evidence_types: ["snyk_issues", "sonarqube_issues"]
    assertion_name: "no_critical_code_vulns"
  R6.2:
    summary: "Develop bespoke and custom software securely"
    remediation_steps:
      - "Perform code reviews for all custom code changes"
      - "Use SAST/DAST tools in the development pipeline"
      - "Remediate identified vulnerabilities before production deployment"
    console_path: "Snyk / SonarQube"
    evidence_types: ["snyk_issues", "sonarqube_issues"]
    assertion_name: "no_critical_code_vulns"
  R6.3:
    summary: "Identify and address security vulnerabilities"
    remediation_steps:
      - "Install vendor-supplied security patches within 30 days of release"
      - "Prioritize critical and high severity patches for immediate deployment"
      - "Track patch status across all CDE systems"
    console_path: "Vulnerability Scanner Console"
    evidence_types: ["vuln_export", "wiz_vuln_findings"]
    assertion_name: "vulnerability_scan_current"
  R6.4:
    summary: "Protect public-facing web applications"
    remediation_steps:
      - "Deploy WAF in front of public-facing web applications"
