      - "Disable accounts after 90 days of inactivity"
      - "Remove or disable departed personnel accounts immediately"
      - "Manage shared/group/service accounts securely"
    console_path: "IAM / Okta / Entra ID"
    evidence_types: ["iam_credential_report", "okta_users"]
    assertion_name: "mfa_enabled"
  R8.3:
    summary: "Establish and manage strong authentication for users and administrators"
    remediation_steps:
      - "Require minimum 12-character passwords"
      - "Enforce password complexity requirements"
      - "Change passwords at least every 90 days"
      - "Do not allow reuse of last 4 passwords"
    console_path: "IAM Password Policy / Okta Policies"
    evidence_types: ["iam_account_summary", "okta_policies"]
    assertion_name: "password_policy_compliant"
  R8.4:
    summary: "Implement multi-factor authentication for access to the CDE"
    remediation_steps:
      - "Deploy MFA for all access to the CDE"
      - "Require MFA for all remote network access"
      - "Require MFA for all non-console administrative access"
