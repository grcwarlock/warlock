    remediation_steps:
      - "Issue badges to authorized personnel"
      - "Escort visitors in cardholder data areas"
      - "Maintain visitor logs"
    console_path: "Verkada / Visitor Management"
    evidence_types: ["verkada_access_events"]
    assertion_name: null
  R9.4:
