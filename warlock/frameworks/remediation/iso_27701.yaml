controls:
  # ---------------------------------------------------------------------------
  # CL5 — PIMS-specific requirements relating to ISO 27001 (Clauses 5)
  # ---------------------------------------------------------------------------
  5.2.1:
    summary: "The organization must understand its context in relation to PII processing"
    remediation_steps:
      - "Inventory all systems processing PII via Prisma and Wiz"
      - "Map PII processing activities to business processes"
      - "Identify internal and external factors affecting PII protection"
      - "Document PII processing context in PIMS scope"
      - "Review context annually or on significant change"
    console_path: "Prisma Cloud > Inventory | Wiz > Graph"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 5.2.1"
      - "ISO/IEC 27001:2022 Clause 4.1"
    evidence_types:
      - "prisma_assets"
      - "asset_export"
    assertion_name: null

  5.2.2:
    summary: "The needs and expectations of interested parties regarding PII must be determined"
    remediation_steps:
      - "Identify all interested parties (data subjects, regulators, processors)"
      - "Document their requirements and expectations"
      - "Map regulatory requirements per jurisdiction"
      - "Review interested party requirements annually"
      - "Communicate requirements to relevant teams"
    console_path: "Confluence > Privacy Space > Interested Parties Register"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 5.2.2"
      - "ISO/IEC 27001:2022 Clause 4.2"
    evidence_types:
      - "confluence_pages"
    assertion_name: null

  5.2.3:
    summary: "The scope of the PIMS must be determined"
    remediation_steps:
      - "Define PIMS scope covering all PII processing activities"
      - "Verify scope alignment with Prisma compliance standards"
      - "Conduct compliance audits to validate scope coverage"
      - "Document scope boundaries and exclusions"
      - "Review scope when processing activities change"
    console_path: "Prisma Cloud > Compliance > Standards"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 5.2.3"
      - "ISO/IEC 27001:2022 Clause 4.3"
    evidence_types:
      - "prisma_compliance"
      - "compliance_audits"
    assertion_name: null

  5.2.4:
    summary: "The PIMS must be established, implemented, maintained, and continually improved"
    remediation_steps:
      - "Establish PIMS processes and documentation"
      - "Monitor PIMS effectiveness via Prisma compliance posture"
      - "Conduct management reviews of PIMS performance"
      - "Track continual improvement actions"
      - "Review PIMS maturity annually"
    console_path: "Prisma Cloud > Compliance > Posture"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 5.2.4"
      - "ISO/IEC 27001:2022 Clause 4.4"
    evidence_types:
      - "prisma_compliance"
      - "compliance_posture"
    assertion_name: null

  5.4.1.2:
    summary: "Information security risk assessment must include PII processing risks"
    remediation_steps:
      - "Include PII-specific threats in risk assessment methodology"
      - "Run vulnerability scans covering PII processing systems"
      - "Assess risks from Tenable, CrowdStrike, Defender, and Wiz"
      - "Quantify PII breach impact using FAIR methodology"
      - "Document PII risk assessment results"
    console_path: "Tenable > Vulnerabilities | Wiz > Issues"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 5.4.1.2"
      - "GDPR Article 35 — DPIA"
    evidence_types:
      - "vuln_export"
      - "wiz_vuln_findings"
      - "falcon_vulnerabilities"
    assertion_name: null

  5.4.1.3:
    summary: "Risk treatment must address PII processing risks"
    remediation_steps:
      - "Develop PII-specific risk treatment plans"
      - "Prioritize using Defender recommendations"
      - "Assign risk treatment owners for Wiz and Prisma PII findings"
      - "Track treatment implementation"
      - "Review treatment effectiveness quarterly"
    console_path: "Defender > Recommendations | Wiz > Issues"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 5.4.1.3"
    evidence_types:
      - "defender_recommendations"
      - "wiz_issues"
    assertion_name: null

  # ---------------------------------------------------------------------------
  # CL6 — PIMS-specific guidance relating to ISO 27002 (Clauses 6)
  # ---------------------------------------------------------------------------
  6.3.1.1:
    summary: "Privacy roles and responsibilities must be defined and assigned"
    remediation_steps:
      - "Appoint DPO or privacy lead with defined responsibilities"
      - "Assign privacy roles in SailPoint identity platform"
      - "Define privacy-specific entitlements for data handlers"
      - "Document privacy role descriptions"
      - "Review privacy role assignments quarterly"
    console_path: "SailPoint > Identities > Privacy Roles"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 6.3.1.1"
      - "GDPR Article 37 — DPO Designation"
    evidence_types:
      - "sailpoint_identities"
      - "sailpoint_roles"
    assertion_name: null

  6.5.2.1:
    summary: "Access control to PII must follow least privilege and need-to-know"
    remediation_steps:
      - "Enforce MFA on all accounts with PII access"
      - "Review IAM credential reports for PII system access"
      - "Configure Okta and Entra policies for PII application access"
      - "Restrict PII access via CyberArk privileged management"
      - "Manage PII access lifecycle through SailPoint"
    console_path: "AWS Console > IAM | Okta Admin > Policies | CyberArk > Safes"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 6.5.2.1"
      - "GDPR Article 32 — Security of Processing"
    evidence_types:
      - "iam_credential_report"
      - "okta_users"
      - "entra_conditional_access_policies"
      - "cyberark_accounts"
    assertion_name: "mfa_enabled"

  6.5.2.2:
    summary: "User access to PII systems must be provisioned through formal processes"
    remediation_steps:
      - "Implement SailPoint access request workflows for PII systems"
      - "Require manager approval for PII access provisioning"
      - "Monitor Entra directory audits for PII access changes"
      - "Verify provisioning follows data classification requirements"
      - "Audit PII access provisioning quarterly"
    console_path: "SailPoint > Access Requests | Entra > Audit Logs"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 6.5.2.2"
    evidence_types:
      - "sailpoint_identities"
      - "okta_users"
      - "entra_directory_audits"
    assertion_name: null

  6.5.2.3:
    summary: "Privileged access to PII processing systems must be restricted"
    remediation_steps:
      - "Onboard PII system privileged accounts to CyberArk"
      - "Enforce password rotation for PII admin accounts"
      - "Review SailPoint privileged entitlements for PII systems"
      - "Audit IAM policies for PII database access"
      - "Implement just-in-time access for PII administration"
    console_path: "CyberArk > Accounts | SailPoint > Entitlements"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 6.5.2.3"
    evidence_types:
      - "cyberark_accounts"
      - "cyberark_safes"
      - "sailpoint_roles"
    assertion_name: null

  6.5.3.1:
    summary: "Cryptographic controls must protect PII confidentiality and integrity"
    remediation_steps:
      - "Encrypt PII at rest using Azure Key Vault or AWS KMS"
      - "Enable encryption on S3 buckets containing PII"
      - "Enable encryption on Azure storage accounts with PII"
      - "Define cryptographic standards for PII protection"
      - "Implement key rotation schedules"
    console_path: "Azure Portal > Key Vault | AWS Console > S3 > Encryption"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 6.5.3.1"
      - "GDPR Article 32(1)(a) — Encryption"
    evidence_types:
      - "key_vault"
      - "s3_buckets"
      - "storage_accounts"
    assertion_name: "encryption_at_rest"

  6.6.2.1:
    summary: "PII processing events must be logged"
    remediation_steps:
      - "Enable CloudTrail logging for PII processing AWS accounts"
      - "Enable GCP audit logs for PII processing projects"
      - "Configure Azure Activity Log for PII subscriptions"
      - "Centralize Okta and Entra logs for PII access events"
      - "Forward logs to SIEM with PII processing context"
    console_path: "AWS Console > CloudTrail | Sentinel > Data Connectors"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 6.6.2.1"
      - "GDPR Article 30 — Records of Processing"
    evidence_types:
      - "cloudtrail_trails"
      - "audit_logs"
      - "okta_system_log"
      - "splunk_index_health"
    assertion_name: "cloudtrail_enabled"

  6.6.2.2:
    summary: "PII processing logs must be protected from unauthorized access"
    remediation_steps:
      - "Enable CloudTrail log file validation"
      - "Store PII-related logs in S3 with object lock"
      - "Monitor AWS Config for log protection compliance"
      - "Restrict access to PII log storage"
      - "Verify log integrity periodically"
    console_path: "AWS Console > CloudTrail > Settings | S3 > Object Lock"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 6.6.2.2"
    evidence_types:
      - "cloudtrail_trails"
      - "s3_buckets"
      - "config_recorders"
    assertion_name: null

  6.8.2.7:
    summary: "Network security must protect PII in transit"
    remediation_steps:
      - "Review security groups restricting PII data flows"
      - "Audit NACLs for PII subnet isolation"
      - "Verify GCP firewall rules for PII network protection"
      - "Review NSGs for PII data path restrictions"
      - "Enforce TLS 1.2+ on all PII data transfers"
    console_path: "AWS Console > VPC > Security Groups | Azure Portal > NSGs"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 6.8.2.7"
      - "GDPR Article 32 — Encryption in Transit"
    evidence_types:
      - "ec2_security_groups"
      - "ec2_network_acls"
      - "network_security_groups"
    assertion_name: "no_open_security_groups"

  6.8.2.8:
    summary: "Network segmentation must isolate PII processing environments"
    remediation_steps:
      - "Segment PII processing into dedicated VPCs/VNets"
      - "Configure NACLs for PII subnet isolation"
      - "Review security groups for cross-segment PII access"
      - "Verify GCP firewall rules enforce PII segmentation"
      - "Document PII network segmentation architecture"
    console_path: "AWS Console > VPC > NACLs | Azure Portal > NSGs"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 6.8.2.8"
    evidence_types:
      - "ec2_security_groups"
      - "ec2_network_acls"
      - "network_security_groups"
    assertion_name: null

  6.9.3.1:
    summary: "Records containing PII must be protected"
    remediation_steps:
      - "Enable versioning and encryption on PII storage"
      - "Configure immutability policies for PII records"
      - "Manage encryption keys via Key Vault"
      - "Define PII retention periods per regulatory requirement"
      - "Audit PII record access quarterly"
    console_path: "AWS Console > S3 > Versioning | Azure Portal > Key Vault"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 6.9.3.1"
      - "GDPR Article 5(1)(e) — Storage Limitation"
    evidence_types:
      - "s3_buckets"
      - "storage_accounts"
      - "key_vault"
    assertion_name: "encryption_at_rest"

  6.9.4.1:
    summary: "Privacy and PII protection compliance must be monitored"
    remediation_steps:
      - "Configure Prisma policies for PII protection compliance"
      - "Monitor Wiz configuration findings for PII exposure"
      - "Review Azure Policy compliance for privacy requirements"
      - "Track privacy compliance metrics"
      - "Report privacy posture to DPO"
    console_path: "Prisma Cloud > Compliance > Privacy | Azure Policy"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 6.9.4.1"
    evidence_types:
      - "prisma_policies"
      - "wiz_config_findings"
      - "policy_compliance"
    assertion_name: null

  6.9.4.2:
    summary: "Privacy compliance must be reviewed by independent assessors"
    remediation_steps:
      - "Schedule independent privacy compliance audits"
      - "Review Prisma compliance reports for privacy standards"
      - "Track privacy compliance posture trends"
      - "Document assessment findings and actions"
      - "Report results to management"
    console_path: "Prisma Cloud > Compliance > Standards"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 6.9.4.2"
    evidence_types:
      - "prisma_compliance"
      - "compliance_audits"
    assertion_name: null

  # ---------------------------------------------------------------------------
  # CL7 — PII Controller guidance (Clauses 7)
  # ---------------------------------------------------------------------------
  7.2.1:
    summary: "Conditions for collecting and processing PII must be determined"
    remediation_steps:
      - "Identify legal basis for each PII processing activity"
      - "Configure Prisma policies enforcing collection conditions"
      - "Conduct compliance audits for collection practices"
      - "Document lawful basis per processing activity"
      - "Review conditions when processing changes"
    console_path: "Prisma Cloud > Policies | Compliance Audits"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.2.1"
      - "GDPR Article 6 — Lawful Basis"
    evidence_types:
      - "prisma_policies"
      - "compliance_audits"
    assertion_name: null

  7.2.2:
    summary: "Consent must be obtained from PII principals where required"
    remediation_steps:
      - "Implement consent collection mechanisms"
      - "Configure Prisma policies for consent enforcement"
      - "Track consent records with timestamps and scope"
      - "Provide mechanisms to withdraw consent"
      - "Audit consent compliance quarterly"
    console_path: "Prisma Cloud > Policies"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.2.2"
      - "GDPR Article 7 — Conditions for Consent"
    evidence_types:
      - "prisma_policies"
      - "policy_compliance"
    assertion_name: null

  7.2.3:
    summary: "PII accuracy and quality must be maintained"
    remediation_steps:
      - "Define data quality standards for PII"
      - "Implement data validation at collection points"
      - "Provide mechanisms for PII principals to update their data"
      - "Schedule periodic PII accuracy reviews"
      - "Document data quality procedures"
    console_path: "Confluence > Privacy Space > Data Quality"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.2.3"
      - "GDPR Article 5(1)(d) — Accuracy"
    evidence_types:
      - "confluence_pages"
    assertion_name: null

  7.2.4:
    summary: "Privacy impact assessments must be conducted for PII processing"
    remediation_steps:
      - "Conduct DPIA for high-risk PII processing activities"
      - "Review Wiz issues for PII exposure risks"
      - "Verify Prisma compliance for PII protection"
      - "Document DPIA findings and remediation plans"
      - "Consult DPO during impact assessment"
    console_path: "Wiz > Issues | Prisma Cloud > Compliance"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.2.4"
      - "GDPR Article 35 — DPIA"
    evidence_types:
      - "wiz_issues"
      - "prisma_compliance"
    assertion_name: null

  7.2.5:
    summary: "Contracts with PII processors must include privacy requirements"
    remediation_steps:
      - "Include GDPR Article 28 requirements in processor contracts"
      - "Define data processing agreements (DPAs) with all processors"
      - "Specify processing instructions, security measures, and audit rights"
      - "Track DPA execution and renewal"
      - "Review processor contracts annually"
    console_path: "Confluence > Legal Space > Processor Agreements"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.2.5"
      - "GDPR Article 28 — Processor Obligations"
    evidence_types:
      - "confluence_pages"
    assertion_name: null

  7.2.6:
    summary: "Joint controller arrangements must be documented"
    remediation_steps:
      - "Identify joint controller relationships"
      - "Document joint controller agreements per GDPR Article 26"
      - "Define responsibilities for data subject rights fulfillment"
      - "Communicate joint processing to data subjects"
      - "Review arrangements annually"
    console_path: "Confluence > Legal Space > Joint Controller Agreements"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.2.6"
      - "GDPR Article 26 — Joint Controllers"
    evidence_types:
      - "confluence_pages"
    assertion_name: null

  7.2.7:
    summary: "Records of PII processing activities must be maintained"
    remediation_steps:
      - "Maintain Article 30 records of processing activities"
      - "Track processing via CloudTrail, GCP audit, and Azure activity logs"
      - "Monitor Entra directory audits for PII access events"
      - "Document processing purposes, categories, and recipients"
      - "Update records when processing activities change"
    console_path: "CloudTrail > Events | Entra > Audit Logs"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.2.7"
      - "GDPR Article 30 — Records of Processing"
    evidence_types:
      - "cloudtrail_trails"
      - "audit_logs"
      - "entra_directory_audits"
    assertion_name: null

  7.2.8:
    summary: "Cross-border PII transfers must be governed"
    remediation_steps:
      - "Identify all cross-border PII transfer destinations"
      - "Implement appropriate transfer mechanisms (SCCs, adequacy)"
      - "Configure policy compliance for transfer requirements"
      - "Document transfer impact assessments"
      - "Review transfer mechanisms when regulations change"
    console_path: "Prisma Cloud > Policies | Azure Policy"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.2.8"
      - "GDPR Chapter V — Cross-Border Transfers"
    evidence_types:
      - "policy_compliance"
      - "prisma_policies"
    assertion_name: null

  7.3.1:
    summary: "Obligations to PII principals regarding their rights must be determined"
    remediation_steps:
      - "Map data subject rights per applicable regulation"
      - "Monitor Okta and Entra logs for rights-related requests"
      - "Define SLA for rights request fulfillment"
      - "Document rights fulfillment procedures"
      - "Train staff on data subject rights handling"
    console_path: "Okta > System Log | Entra > Audit Logs"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.3.1"
      - "GDPR Articles 12-23 — Data Subject Rights"
    evidence_types:
      - "okta_system_log"
      - "entra_directory_audits"
    assertion_name: null

  7.3.2:
    summary: "PII principals must be provided with information about processing"
    remediation_steps:
      - "Publish privacy notice covering all required information"
      - "Include processing purposes, legal basis, and rights"
      - "Provide notice in clear, plain language"
      - "Update notice when processing changes"
      - "Track notice delivery mechanisms"
    console_path: "Confluence > Privacy Space > Privacy Notice"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.3.2"
      - "GDPR Articles 13-14 — Information to Data Subjects"
    evidence_types:
      - "confluence_pages"
    assertion_name: null

  7.3.3:
    summary: "Access, rectification, and erasure requests must be fulfilled"
    remediation_steps:
      - "Implement DSAR fulfillment workflows"
      - "Monitor Okta and Entra logs for access and deletion events"
      - "Fulfill requests within regulatory timelines (30 days GDPR)"
      - "Document request handling and outcomes"
      - "Track fulfillment metrics"
    console_path: "Okta > System Log | Entra > Audit Logs"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.3.3"
      - "GDPR Articles 15-17 — Access, Rectification, Erasure"
    evidence_types:
      - "okta_system_log"
      - "entra_directory_audits"
    assertion_name: null

  7.3.4:
    summary: "Notification obligations must be fulfilled when PII is processed"
    remediation_steps:
      - "Define notification triggers and procedures"
      - "Notify data subjects of processing as required"
      - "Track notification delivery and acknowledgment"
      - "Document notification obligations per regulation"
      - "Review notification procedures annually"
    console_path: "Confluence > Privacy Space > Notification Procedures"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.3.4"
      - "GDPR Article 34 — Communication to Data Subject"
    evidence_types:
      - "confluence_pages"
    assertion_name: null

  7.3.5:
    summary: "Automated decision-making and profiling must be transparent"
    remediation_steps:
      - "Identify automated decision-making processes involving PII"
      - "Provide data subjects with information about automated decisions"
      - "Implement human oversight mechanisms"
      - "Allow data subjects to contest automated decisions"
      - "Document automated decision-making procedures"
    console_path: "Confluence > Privacy Space > Automated Decisions"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.3.5"
      - "GDPR Article 22 — Automated Decision-Making"
    evidence_types:
      - "confluence_pages"
    assertion_name: null

  7.3.6:
    summary: "Complaints handling mechanisms must be established"
    remediation_steps:
      - "Establish privacy complaints channel"
      - "Define complaint handling procedures and SLA"
      - "Track complaints to resolution"
      - "Escalate unresolved complaints to supervisory authority"
      - "Report complaint metrics to management"
    console_path: "Confluence > Privacy Space > Complaints Register"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.3.6"
      - "GDPR Article 77 — Right to Lodge Complaint"
    evidence_types:
      - "confluence_pages"
    assertion_name: null

  7.4.1:
    summary: "PII collection must be limited to what is necessary"
    remediation_steps:
      - "Review PII collection points for necessity"
      - "Configure Prisma policies for collection limitation"
      - "Monitor Wiz findings for excessive PII collection"
      - "Document data minimization decisions"
      - "Audit PII collection scope quarterly"
    console_path: "Prisma Cloud > Policies | Wiz > Configuration Findings"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.4.1"
      - "GDPR Article 5(1)(c) — Data Minimization"
    evidence_types:
      - "prisma_policies"
      - "wiz_config_findings"
    assertion_name: null

  7.4.2:
    summary: "PII processing must be limited to identified purposes"
    remediation_steps:
      - "Restrict PII processing to documented purposes"
      - "Configure Prisma and Azure policies for processing limits"
      - "Monitor for unauthorized processing activities"
      - "Document processing purpose for each PII category"
      - "Audit processing against stated purposes"
    console_path: "Prisma Cloud > Policies | Azure Policy"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.4.2"
      - "GDPR Article 5(1)(b) — Purpose Limitation"
    evidence_types:
      - "prisma_policies"
      - "policy_compliance"
    assertion_name: null

  7.4.3:
    summary: "PII accuracy and quality must be maintained by the controller"
    remediation_steps:
      - "Implement data quality validation rules"
      - "Provide data subjects with update mechanisms"
      - "Schedule periodic PII accuracy reviews"
      - "Document data quality standards"
      - "Track data quality metrics"
    console_path: "Confluence > Privacy Space > Data Quality Standards"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.4.3"
      - "GDPR Article 5(1)(d) — Accuracy"
    evidence_types:
      - "confluence_pages"
    assertion_name: null

  7.4.4:
    summary: "Data minimization objectives must be achieved"
    remediation_steps:
      - "Minimize PII collection to what is strictly necessary"
      - "Configure Prisma policies for minimization enforcement"
      - "Monitor Wiz findings for unnecessary PII storage"
      - "Review data stores for PII that exceeds stated purposes"
      - "Document minimization decisions"
    console_path: "Prisma Cloud > Policies | Wiz > Configuration Findings"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.4.4"
    evidence_types:
      - "prisma_policies"
      - "wiz_config_findings"
    assertion_name: null

  7.4.5:
    summary: "PII must be de-identified and deleted at end of processing"
    remediation_steps:
      - "Implement de-identification procedures for PII no longer needed"
      - "Configure automated deletion at retention period expiry"
      - "Document de-identification and deletion methods"
      - "Verify deletion completeness"
      - "Audit retention compliance quarterly"
    console_path: "Confluence > Privacy Space > De-identification Procedures"
    recommended_reading:
      - "ISO/IEC 27701:2019 Clause 7.4.5"
      - "GDPR Article 5(1)(e) — Storage Limitation"
    evidence_types:
      - "confluence_pages"
    assertion_name: null

  7.4.6:
