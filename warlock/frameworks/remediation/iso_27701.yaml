      - "storage_buckets"
    assertion_name: null

  7.4.7:
    summary: "PII must be securely disposed of when no longer needed"
    remediation_steps:
      - "Implement crypto-shredding for PII disposal"
      - "Configure secure deletion policies"
      - "Verify PII deletion across all storage locations"
      - "Maintain disposal records"
