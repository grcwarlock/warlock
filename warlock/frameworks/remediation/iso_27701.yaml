      - "Set Azure storage lifecycle rules for PII data"
      - "Configure GCP bucket lifecycle policies"
      - "Define retention periods per PII category and regulation"
      - "Audit retention compliance quarterly"
    console_path: "AWS Console > S3 > Lifecycle | Azure Portal > Storage > Lifecycle"
    recommended_reading:
