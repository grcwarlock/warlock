controls:
  # ---------------------------------------------------------------------------
  # A.5 — Organizational controls
  # ---------------------------------------------------------------------------
  A.5.1:
    summary: "Information security policies must be defined, approved by management, published, and communicated"
    remediation_steps:
      - "Draft comprehensive information security policy aligned with business objectives"
      - "Obtain management approval and formal sign-off"
      - "Publish policy on internal wiki/Confluence"
      - "Communicate to all employees and relevant external parties"
      - "Schedule annual review cycle with policy owner assignment"
    console_path: "Confluence > SEC Space > Information Security Policy"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.1"
      - "ISO/IEC 27002:2022 Section 5.1 Guidance"
    evidence_types:
      - "confluence_pages"
      - "policy_review_date"
    assertion_name: "policy_reviewed_within_year"

  A.5.2:
    summary: "Information security roles and responsibilities must be defined and allocated"
    remediation_steps:
      - "Define RACI matrix for information security roles"
      - "Assign security responsibilities in SailPoint role definitions"
      - "Document role descriptions including security duties"
      - "Review GCP IAM policy bindings for role alignment"
      - "Conduct quarterly review of role assignments"
    console_path: "SailPoint > Roles > Security Role Definitions"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.2"
      - "ISO/IEC 27002:2022 Section 5.2 Guidance"
    evidence_types:
      - "sailpoint_roles"
      - "gcp_iam_policies"
    assertion_name: null

  A.5.3:
    summary: "Segregation of duties must be implemented to reduce risk of fraud or error"
    remediation_steps:
      - "Identify conflicting duties across business processes"
      - "Configure SailPoint SoD policies for conflicting entitlements"
      - "Review CyberArk privileged account separation"
      - "Implement compensating controls where segregation is not feasible"
      - "Generate SoD violation reports quarterly"
    console_path: "SailPoint > Access Policies > Segregation of Duties"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.3"
      - "ISO/IEC 27002:2022 Section 5.3 Guidance"
    evidence_types:
      - "sailpoint_roles"
      - "sailpoint_entitlements"
      - "cyberark_accounts"
    assertion_name: null

  A.5.4:
    summary: "Management must require employees and contractors to apply information security in accordance with policies"
    remediation_steps:
      - "Include security responsibilities in employment contracts"
      - "Conduct management-led security awareness briefings"
      - "Schedule SailPoint access certifications with manager attestation"
      - "Track management participation in security governance"
      - "Document management accountability in ISMS governance charter"
    console_path: "SailPoint > Certifications > Manager Certifications"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.4"
      - "ISO/IEC 27002:2022 Section 5.4 Guidance"
    evidence_types:
      - "sailpoint_certifications"
    assertion_name: null

  A.5.5:
    summary: "Contact with relevant authorities must be maintained"
    remediation_steps:
      - "Maintain contact list for law enforcement, regulatory bodies, ISACs"
      - "Document authority contact procedures in incident response plan"
      - "Publish contact registry on internal Confluence"
      - "Review and update contact information quarterly"
      - "Assign responsibility for authority liaison"
    console_path: "Confluence > SEC Space > Authority Contact Register"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.5"
      - "ISO/IEC 27002:2022 Section 5.5 Guidance"
    evidence_types:
      - "confluence_pages"
    assertion_name: null

  A.5.6:
    summary: "Contact with special interest groups or forums must be maintained"
    remediation_steps:
      - "Identify relevant security forums, ISACs, and professional associations"
      - "Document memberships and participation cadence"
      - "Subscribe to threat intelligence sharing communities"
      - "Track participation and intelligence received"
      - "Review membership value annually"
    console_path: "Confluence > SEC Space > Industry Group Memberships"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.6"
      - "ISO/IEC 27002:2022 Section 5.6 Guidance"
    evidence_types:
      - "confluence_pages"
    assertion_name: null

  A.5.7:
    summary: "Threat intelligence must be collected and analyzed to produce actionable information"
    remediation_steps:
      - "Enable AWS GuardDuty across all accounts and regions"
      - "Enable AWS Security Hub with CIS/PCI standards"
      - "Configure GCP Security Command Center findings export"
      - "Enable Azure Defender alerts and integrate with SIEM"
      - "Aggregate EDR threat feeds from CrowdStrike and SentinelOne"
      - "Establish threat intelligence review cadence"
    console_path: "AWS Console > GuardDuty > Settings | Azure Portal > Defender for Cloud"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.7"
      - "ISO/IEC 27002:2022 Section 5.7 Guidance"
    evidence_types:
      - "guardduty_detectors"
      - "securityhub_hub"
      - "scc_findings"
      - "defender_alerts"
    assertion_name: "guardduty_enabled"

  A.5.8:
    summary: "Information security must be integrated into project management"
    remediation_steps:
      - "Include security review gates in project management methodology"
      - "Require security risk assessment for new projects"
      - "Document security requirements in ServiceNow change requests"
      - "Publish project security checklist on Confluence"
      - "Track security deliverables in project milestones"
    console_path: "ServiceNow > Change Management > Security Review"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.8"
      - "ISO/IEC 27002:2022 Section 5.8 Guidance"
    evidence_types:
      - "confluence_pages"
      - "snow_change_requests"
    assertion_name: null

  A.5.9:
    summary: "An inventory of information and associated assets must be maintained"
    remediation_steps:
      - "Deploy asset discovery across cloud accounts (AWS, Azure, GCP)"
      - "Maintain endpoint inventory via CrowdStrike/SentinelOne/Defender"
      - "Sync identity inventory through SailPoint and IdP connectors"
      - "Consolidate vulnerability scanner asset inventory (Tenable)"
      - "Reconcile inventories quarterly for completeness"
      - "Assign asset owners and classify by criticality"
    console_path: "Wiz > Inventory > All Assets | Prisma Cloud > Inventory"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.9"
      - "ISO/IEC 27002:2022 Section 5.9 Guidance"
    evidence_types:
      - "prisma_assets"
      - "falcon_device_details"
      - "sailpoint_identities"
      - "asset_export"
    assertion_name: null

  A.5.10:
    summary: "Rules for acceptable use of information and assets must be defined"
    remediation_steps:
      - "Draft acceptable use policy covering devices, internet, email, cloud"
      - "Enforce policy through Okta/Entra conditional access policies"
      - "Publish AUP and require employee acknowledgment"
      - "Monitor compliance through IdP policy enforcement"
      - "Review and update annually"
    console_path: "Okta Admin > Security > Policies | Entra > Conditional Access"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.10"
      - "ISO/IEC 27002:2022 Section 5.10 Guidance"
    evidence_types:
      - "okta_policies"
      - "entra_conditional_access_policies"
    assertion_name: null

  A.5.11:
    summary: "Assets must be returned upon termination of employment or contract"
    remediation_steps:
      - "Integrate termination workflow with SailPoint identity lifecycle"
      - "Automate account deprovisioning in Okta and Entra ID"
      - "Include asset return checklist in HR offboarding process"
      - "Verify IAM user removal across cloud providers"
      - "Audit deprovisioned accounts within 24 hours of termination"
    console_path: "SailPoint > Identity Lifecycle > Termination Workflow"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.11"
      - "ISO/IEC 27002:2022 Section 5.11 Guidance"
    evidence_types:
      - "sailpoint_identities"
      - "okta_users"
      - "entra_users"
    assertion_name: null

  A.5.12:
    summary: "Information must be classified according to confidentiality, integrity, and availability needs"
    remediation_steps:
      - "Define data classification scheme (Public, Internal, Confidential, Restricted)"
      - "Apply classification tags to S3 buckets and storage accounts"
      - "Configure GCP storage bucket labels for classification"
      - "Document classification criteria and handling procedures"
      - "Train data owners on classification responsibilities"
    console_path: "AWS Console > S3 > Bucket Tags | Azure Portal > Storage > Tags"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.12"
      - "ISO/IEC 27002:2022 Section 5.12 Guidance"
    evidence_types:
      - "s3_buckets"
      - "storage_buckets"
      - "storage_accounts"
    assertion_name: null

  A.5.13:
    summary: "Labelling of information must follow the classification scheme"
    remediation_steps:
      - "Implement consistent labelling across cloud storage services"
      - "Apply AWS resource tags for classification labels"
      - "Configure Azure sensitivity labels via Purview"
      - "Apply GCP resource labels to storage buckets"
      - "Automate labelling enforcement through cloud policies"
    console_path: "AWS Console > S3 > Bucket Tags | Azure Purview > Sensitivity Labels"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.13"
      - "ISO/IEC 27002:2022 Section 5.13 Guidance"
    evidence_types:
      - "s3_buckets"
      - "storage_buckets"
      - "storage_accounts"
    assertion_name: null

  A.5.14:
    summary: "Rules and procedures for information transfer must be in place"
    remediation_steps:
      - "Define information transfer policies for each classification level"
      - "Review security group rules governing data flow"
      - "Verify NSG rules restrict unauthorized data transfer"
      - "Configure GCP firewall rules for data transfer controls"
      - "Enforce TLS for all data in transit"
      - "Document approved transfer mechanisms"
    console_path: "AWS Console > VPC > Security Groups | Azure Portal > NSGs"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.14"
      - "ISO/IEC 27002:2022 Section 5.14 Guidance"
    evidence_types:
      - "ec2_security_groups"
      - "network_security_groups"
      - "compute_firewall_rules"
    assertion_name: null

  A.5.15:
    summary: "Access control rules must be established and implemented"
    remediation_steps:
      - "Define role-based access control policy"
      - "Enforce MFA on all privileged and user accounts"
      - "Review IAM credential reports for compliance"
      - "Configure Okta/Entra conditional access policies"
      - "Implement CyberArk for privileged access management"
      - "Conduct quarterly access reviews via SailPoint"
    console_path: "AWS Console > IAM > Credential Report | Okta Admin > Security"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.15"
      - "ISO/IEC 27002:2022 Section 5.15 Guidance"
    evidence_types:
      - "iam_credential_report"
      - "okta_users"
      - "entra_conditional_access_policies"
      - "cyberark_accounts"
    assertion_name: "mfa_enabled"

  A.5.16:
    summary: "The full lifecycle of identities must be managed"
    remediation_steps:
      - "Implement SailPoint for identity governance and lifecycle"
      - "Automate joiner/mover/leaver processes"
      - "Sync identities across cloud IAM, Okta, and Entra ID"
      - "Schedule quarterly identity reconciliation"
      - "Review orphaned and dormant accounts"
    console_path: "SailPoint > Identities > Identity List | Okta Admin > People"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.16"
      - "ISO/IEC 27002:2022 Section 5.16 Guidance"
    evidence_types:
      - "sailpoint_identities"
      - "okta_users"
      - "entra_users"
    assertion_name: "access_reviews_current"

  A.5.17:
    summary: "Authentication information must be controlled through a management process"
    remediation_steps:
      - "Configure AWS IAM password policy (min 14 chars, complexity, rotation)"
      - "Enforce Okta password policies with strong requirements"
      - "Require MFA enrollment for all users via Entra conditional access"
      - "Verify CyberArk password compliance for privileged accounts"
      - "Review IAM credential report for key rotation compliance"
    console_path: "AWS Console > IAM > Account Settings > Password Policy"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.17"
      - "ISO/IEC 27002:2022 Section 5.17 Guidance"
    evidence_types:
      - "iam_password_policy"
      - "okta_policies"
      - "okta_factors"
      - "cyberark_password_compliance"
    assertion_name: "password_policy_compliant"

  A.5.18:
    summary: "Access rights must be provisioned, reviewed, and revoked in accordance with policy"
    remediation_steps:
      - "Implement SailPoint access request and approval workflows"
      - "Schedule access certification campaigns in SailPoint"
      - "Review privileged access in CyberArk safes"
      - "Audit cloud IAM policies for least privilege"
      - "Automate access revocation on role change or termination"
    console_path: "SailPoint > Certifications > Active Campaigns"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.18"
      - "ISO/IEC 27002:2022 Section 5.18 Guidance"
    evidence_types:
      - "sailpoint_certifications"
      - "sailpoint_entitlements"
      - "cyberark_accounts"
    assertion_name: null

  A.5.19:
    summary: "Processes for managing information security in supplier relationships must be defined"
    remediation_steps:
      - "Maintain vendor security assessment program"
      - "Review Entra service principal permissions and scopes"
      - "Audit Okta application integrations for data access"
      - "Include security requirements in vendor contracts"
      - "Track vendor security posture via SecurityScorecard"
    console_path: "Entra Admin > App Registrations | Okta Admin > Applications"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.19"
      - "ISO/IEC 27002:2022 Section 5.19 Guidance"
    evidence_types:
      - "entra_service_principals"
      - "okta_applications"
    assertion_name: null

  A.5.20:
    summary: "Security requirements must be established in supplier agreements"
    remediation_steps:
      - "Include security clauses in vendor agreements (encryption, access control, audit rights)"
      - "Review Entra service principal consent scopes"
      - "Document security requirements per vendor tier"
      - "Require vendor SOC 2 or ISO 27001 attestation"
      - "Schedule annual vendor agreement review"
    console_path: "Entra Admin > Enterprise Applications > Permissions"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.20"
      - "ISO/IEC 27002:2022 Section 5.20 Guidance"
    evidence_types:
      - "entra_service_principals"
      - "entra_app_registrations"
    assertion_name: null

  A.5.21:
    summary: "ICT supply chain risks must be managed"
    remediation_steps:
      - "Identify critical suppliers in the ICT supply chain"
      - "Review third-party application integrations in Entra and Okta"
      - "Monitor supply chain security posture via Wiz config findings"
      - "Implement vendor risk tiering based on data access and criticality"
      - "Require SBOM from software vendors"
    console_path: "Entra Admin > Enterprise Applications | Wiz > Third Party"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.21"
      - "ISO/IEC 27002:2022 Section 5.21 Guidance"
    evidence_types:
      - "entra_service_principals"
      - "okta_applications"
      - "wiz_config_findings"
    assertion_name: null

  A.5.22:
    summary: "Supplier services must be regularly monitored, reviewed, and change-managed"
    remediation_steps:
      - "Monitor Entra directory audit logs for supplier activity"
      - "Review Okta system logs for third-party application events"
      - "Conduct quarterly supplier security reviews"
      - "Track supplier SLA compliance and security metrics"
      - "Document supplier change notification procedures"
    console_path: "Entra Admin > Audit Logs | Okta Admin > Reports > System Log"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.22"
      - "ISO/IEC 27002:2022 Section 5.22 Guidance"
    evidence_types:
      - "entra_directory_audits"
      - "okta_system_log"
    assertion_name: null

  A.5.23:
    summary: "Security for use of cloud services must be established"
    remediation_steps:
      - "Deploy CSPM tools (Wiz, Prisma Cloud) across all cloud accounts"
      - "Enable AWS Security Hub and Config for compliance monitoring"
      - "Enable Azure Policy compliance and Defender for Cloud"
      - "Enable GCP Security Command Center"
      - "Establish cloud security baseline and monitor drift"
      - "Review CSPM findings weekly and remediate critical issues"
    console_path: "Wiz > Issues > All Issues | AWS Console > Security Hub"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.23"
      - "ISO/IEC 27002:2022 Section 5.23 Guidance"
    evidence_types:
      - "wiz_config_findings"
      - "securityhub_hub"
      - "config_recorders"
      - "policy_compliance"
    assertion_name: "config_recorder_enabled"

  A.5.24:
    summary: "Information security incident management must be planned and prepared"
    remediation_steps:
      - "Document incident response plan with roles, escalation, and communication"
      - "Configure SIEM detection rules in Sentinel/Splunk/Elastic"
      - "Enable EDR prevention policies in CrowdStrike and SentinelOne"
      - "Conduct tabletop exercises quarterly"
      - "Test detection rules against MITRE ATT&CK techniques"
    console_path: "Sentinel > Analytics Rules | Splunk > Correlation Rules"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.24"
      - "ISO/IEC 27002:2022 Section 5.24 Guidance"
    evidence_types:
      - "sentinel_analytics_rules"
      - "splunk_correlation_rules"
      - "falcon_sensor_policies"
    assertion_name: null

  A.5.25:
    summary: "Information security events must be assessed and classified"
    remediation_steps:
      - "Define incident severity classification criteria"
      - "Configure SIEM triage workflows with severity assignment"
      - "Integrate EDR detections with SIEM for centralized triage"
      - "Establish SLA for event assessment by severity tier"
      - "Review event classification accuracy monthly"
    console_path: "Sentinel > Incidents | Splunk > Notable Events"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.25"
      - "ISO/IEC 27002:2022 Section 5.25 Guidance"
    evidence_types:
      - "sentinel_incidents"
      - "splunk_notable_events"
      - "falcon_detection_details"
    assertion_name: "siem_monitoring_active"

  A.5.26:
    summary: "Information security incidents must be responded to according to documented procedures"
    remediation_steps:
      - "Execute incident response playbooks per incident type"
      - "Coordinate response across SIEM, EDR, and cloud platforms"
      - "Document containment, eradication, and recovery actions"
      - "Notify relevant stakeholders per communication plan"
      - "Preserve forensic evidence throughout response"
    console_path: "Sentinel > Incidents > Active | CrowdStrike > Detections"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.26"
      - "ISO/IEC 27002:2022 Section 5.26 Guidance"
    evidence_types:
      - "sentinel_incidents"
      - "splunk_notable_events"
      - "falcon_detection_details"
    assertion_name: "siem_monitoring_active"

  A.5.27:
    summary: "Knowledge from security incidents must be used to strengthen controls"
    remediation_steps:
      - "Conduct post-incident reviews within 5 business days"
      - "Document lessons learned and update runbooks"
      - "Create new detection rules based on incident findings"
      - "Update Sentinel hunting queries for new TTPs"
      - "Track remediation items from post-incident reviews"
    console_path: "Sentinel > Hunting Queries | Splunk > Saved Searches"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.27"
      - "ISO/IEC 27002:2022 Section 5.27 Guidance"
    evidence_types:
      - "sentinel_incidents"
      - "sentinel_hunting_queries"
    assertion_name: null

  A.5.28:
    summary: "Evidence collection procedures must be defined and applied"
    remediation_steps:
      - "Enable CloudTrail in all AWS accounts with multi-region logging"
      - "Enable GCP audit logs for admin and data access"
      - "Configure Azure Activity Log export to Log Analytics"
      - "Centralize Okta system logs and Entra audit logs in SIEM"
      - "Define evidence chain of custody procedures"
      - "Ensure log immutability with write-once storage"
    console_path: "AWS Console > CloudTrail > Trails | Azure Portal > Activity Log"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.28"
      - "ISO/IEC 27002:2022 Section 5.28 Guidance"
    evidence_types:
      - "cloudtrail_trails"
      - "audit_logs"
      - "okta_system_log"
      - "entra_directory_audits"
    assertion_name: null

  A.5.29:
    summary: "Information security must be maintained during disruption"
    remediation_steps:
      - "Verify SIEM data connector health during disruptions"
      - "Monitor Splunk indexer health and ingestion rates"
      - "Ensure Elastic agent status remains healthy"
      - "Document security monitoring continuity procedures"
      - "Test failover of security monitoring tools"
    console_path: "Sentinel > Data Connectors | Splunk > Monitoring Console"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.29"
      - "ISO/IEC 27002:2022 Section 5.29 Guidance"
    evidence_types:
      - "sentinel_data_connectors"
      - "splunk_index_health"
    assertion_name: null

  A.5.30:
    summary: "ICT readiness must be planned, implemented, and tested for business continuity"
    remediation_steps:
      - "Define ICT continuity requirements per critical system"
      - "Verify SIEM and EDR agent deployment coverage"
      - "Test monitoring tool redundancy and failover"
      - "Document recovery procedures for security infrastructure"
      - "Conduct annual ICT continuity testing"
    console_path: "Sentinel > Data Connectors | CrowdStrike > Host Management"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.30"
