  A.5.31:
    summary: "Legal, statutory, regulatory, and contractual requirements must be identified and met"
    remediation_steps:
      - "Maintain regulatory obligation register"
      - "Map compliance requirements to Prisma/Azure policy compliance"
      - "Conduct quarterly compliance posture assessments"
      - "Track regulatory changes and update controls accordingly"
      - "Document compliance evidence per regulatory requirement"
    console_path: "Prisma Cloud > Compliance | Azure Policy > Compliance"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.31"
      - "ISO/IEC 27002:2022 Section 5.31 Guidance"
    evidence_types:
      - "prisma_compliance"
      - "policy_compliance"
      - "compliance_audits"
    assertion_name: null

  A.5.32:
    summary: "Intellectual property rights must be protected"
    remediation_steps:
      - "Document IP protection procedures and ownership"
      - "Maintain software license register on Confluence"
      - "Review ServiceNow policies for IP-related procedures"
      - "Include IP clauses in employment and contractor agreements"
      - "Audit open-source license compliance"
    console_path: "Confluence > Legal Space > IP Register"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.32"
      - "ISO/IEC 27002:2022 Section 5.32 Guidance"
    evidence_types:
      - "confluence_pages"
      - "snow_policies"
    assertion_name: null

  A.5.33:
    summary: "Records must be protected from loss, destruction, falsification, and unauthorized access"
    remediation_steps:
      - "Enable versioning on S3 buckets and storage accounts"
      - "Configure object lock or immutability policies for critical records"
      - "Implement encryption at rest using KMS/Key Vault"
      - "Define retention periods per record classification"
      - "Audit access to record storage quarterly"
    console_path: "AWS Console > S3 > Bucket Properties | Azure Portal > Key Vault"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.33"
      - "ISO/IEC 27002:2022 Section 5.33 Guidance"
    evidence_types:
      - "s3_buckets"
      - "storage_accounts"
      - "key_vault"
    assertion_name: null

  A.5.34:
    summary: "Privacy and protection of personal information must be ensured per applicable legislation"
    remediation_steps:
      - "Identify PII processing activities and legal bases"
      - "Enforce access controls on PII via Okta/Entra conditional access"
      - "Restrict privileged access to PII via CyberArk"
      - "Encrypt PII at rest in S3/Azure Storage using KMS/Key Vault"
      - "Conduct DPIA for high-risk processing activities"
    console_path: "Okta Admin > Policies | AWS Console > S3 > Encryption"
    recommended_reading:
      - "ISO/IEC 27001:2022 Annex A.5.34"
      - "ISO/IEC 27002:2022 Section 5.34 Guidance"
    evidence_types:
      - "okta_policies"
      - "cyberark_accounts"
      - "s3_buckets"
      - "key_vault"
    assertion_name: null

  A.5.35:
    summary: "Independent review of the information security approach must be conducted"
    remediation_steps:
      - "Schedule annual independent ISMS audit"
      - "Review Prisma Cloud compliance posture against standards"
      - "Engage third-party assessors for ISO 27001 surveillance audits"
      - "Track audit findings and remediation progress"
      - "Report review results to management"
    console_path: "Prisma Cloud > Compliance > Standards"
