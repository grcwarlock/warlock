controls:
  # ---------------------------------------------------------------------------
  # GOV — Governance (6 controls)
  # ---------------------------------------------------------------------------
  UCF-GOV-1:
    summary: "Security policies must be defined, published, and enforced across the organization"
    remediation_steps:
      - "Draft security policies aligned with organizational risk appetite"
      - "Configure Okta and Entra conditional access policies for enforcement"
      - "Deploy Prisma Cloud and EDR sensor policies"
      - "Publish policies on internal portal and communicate to staff"
      - "Schedule annual review and approval cycle"
    console_path: "Okta Admin > Security > Policies | Entra > Conditional Access"
    recommended_reading:
      - "UCF GOV-1 — Information Security Policies"
      - "ISO 27002:2022 Section 5.1"
    evidence_types:
      - "okta_policies"
      - "entra_conditional_access_policies"
      - "prisma_policies"
    assertion_name: null

  UCF-GOV-2:
    summary: "Security roles and responsibilities must be defined and assigned"
    remediation_steps:
      - "Define RACI matrix for security governance"
      - "Assign security roles in SailPoint identity platform"
      - "Map roles to Okta groups for access enforcement"
      - "Document role descriptions and accountability"
      - "Review role assignments quarterly"
    console_path: "SailPoint > Identities > Roles | Okta Admin > Groups"
    recommended_reading:
      - "UCF GOV-2 — Security Roles"
    evidence_types:
      - "sailpoint_identities"
      - "sailpoint_roles"
    assertion_name: null

  UCF-GOV-3:
    summary: "Management oversight of security controls must be established"
    remediation_steps:
      - "Schedule SailPoint access certification campaigns"
      - "Conduct quarterly management security reviews"
      - "Track certification completion and decisions"
      - "Report oversight metrics to leadership"
      - "Document management attestation records"
    console_path: "SailPoint > Certifications > Campaigns"
    recommended_reading:
      - "UCF GOV-3 — Management Oversight"
    evidence_types:
      - "sailpoint_certifications"
    assertion_name: null

  UCF-GOV-4:
    summary: "Compliance with applicable regulations and standards must be monitored"
    remediation_steps:
      - "Deploy Prisma Cloud compliance monitoring"
      - "Schedule compliance audits against relevant frameworks"
      - "Monitor Azure Policy compliance state continuously"
      - "Track compliance metrics and trends"
      - "Remediate compliance gaps within defined SLAs"
    console_path: "Prisma Cloud > Compliance | Azure Policy > Compliance"
    recommended_reading:
      - "UCF GOV-4 — Compliance Monitoring"
    evidence_types:
      - "prisma_compliance"
      - "compliance_audits"
      - "policy_compliance"
    assertion_name: null

  UCF-GOV-5:
    summary: "Security planning must be integrated into organizational planning"
    remediation_steps:
      - "Integrate security requirements into project planning"
      - "Publish security plans on Confluence"
      - "Maintain ServiceNow policies for security procedures"
      - "Track plan versions and review dates"
      - "Align security plans with business objectives"
    console_path: "Confluence > SEC Space > Security Plans"
    recommended_reading:
      - "UCF GOV-5 — Security Planning"
    evidence_types:
      - "confluence_pages"
      - "snow_policies"
    assertion_name: null

  UCF-GOV-6:
    summary: "Security documentation must be maintained and kept current"
    remediation_steps:
      - "Maintain all security documentation on Confluence"
      - "Assign document owners and review schedules"
      - "Ensure documents are reviewed within 365 days"
      - "Track document version history"
      - "Archive superseded documents"
    console_path: "Confluence > SEC Space > All Documents"
    recommended_reading:
      - "UCF GOV-6 — Documentation Management"
    evidence_types:
      - "confluence_pages"
    assertion_name: "policy_reviewed_within_year"

  # ---------------------------------------------------------------------------
  # RSK — Risk Management (6 controls)
  # ---------------------------------------------------------------------------
  UCF-RSK-1:
    summary: "Risk identification must cover vulnerabilities and security posture"
    remediation_steps:
      - "Run vulnerability scans via Tenable, CrowdStrike, Defender, Wiz"
      - "Aggregate CSPM findings from Prisma, GCP SCC, Defender"
      - "Maintain comprehensive risk register"
      - "Map vulnerabilities to business impact"
      - "Review risk identification completeness quarterly"
    console_path: "Tenable > Vulnerabilities | Wiz > Issues"
    recommended_reading:
      - "UCF RSK-1 — Risk Identification"
    evidence_types:
      - "vuln_export"
      - "wiz_vuln_findings"
      - "prisma_alerts"
    assertion_name: null

  UCF-RSK-2:
    summary: "Risk treatment plans must be defined and implemented"
    remediation_steps:
      - "Prioritize risks using Defender recommendations"
      - "Assign risk treatment owners for Wiz and Prisma issues"
      - "Document risk treatment decisions (mitigate, accept, transfer, avoid)"
      - "Track treatment implementation progress"
      - "Review treatment effectiveness quarterly"
    console_path: "Defender > Recommendations | Wiz > Issues"
    recommended_reading:
      - "UCF RSK-2 — Risk Treatment"
    evidence_types:
      - "defender_recommendations"
      - "wiz_issues"
    assertion_name: null

  UCF-RSK-3:
    summary: "Risk acceptance must be formally documented with appropriate authority"
    remediation_steps:
      - "Document risk acceptance decisions in ServiceNow risk register"
      - "Require management sign-off for accepted risks"
      - "Define risk acceptance criteria and thresholds"
      - "Review accepted risks quarterly for continued validity"
      - "Track compensating controls for accepted risks"
    console_path: "ServiceNow > Risk Management > Risk Register"
    recommended_reading:
      - "UCF RSK-3 — Risk Acceptance"
    evidence_types:
      - "snow_risks"
    assertion_name: null

  UCF-RSK-4:
    summary: "Risk monitoring must be continuous across the environment"
    remediation_steps:
      - "Enable AWS Config, Security Hub, and GuardDuty across accounts"
      - "Configure Azure Policy compliance and GCP SCC monitoring"
      - "Deploy Prisma Cloud and Wiz for cross-cloud risk monitoring"
      - "Establish risk monitoring dashboards"
      - "Alert on new critical risks within 24 hours"
    console_path: "AWS Console > Config | Security Hub | GuardDuty"
    recommended_reading:
      - "UCF RSK-4 — Risk Monitoring"
    evidence_types:
      - "config_recorders"
      - "securityhub_hub"
      - "guardduty_detectors"
      - "prisma_compliance"
    assertion_name: null

  UCF-RSK-5:
    summary: "Supply chain risks must be assessed and managed"
    remediation_steps:
      - "Review third-party integrations in Entra and Okta"
      - "Monitor supply chain security via Wiz configuration findings"
      - "Assess vendor security posture and data access"
      - "Require SBOM from software vendors"
      - "Conduct annual supply chain risk assessment"
    console_path: "Entra Admin > Enterprise Applications | Okta > Applications"
    recommended_reading:
      - "UCF RSK-5 — Supply Chain Risk"
    evidence_types:
      - "entra_service_principals"
      - "okta_applications"
      - "wiz_config_findings"
    assertion_name: null

  UCF-RSK-6:
    summary: "AI-specific risks must be identified and managed"
    remediation_steps:
      - "Identify AI systems and their risk profiles"
      - "Monitor AI infrastructure via GCP SCC and Azure Defender"
      - "Assess AI model risks through Wiz and Prisma alerts"
      - "Document AI risk assessment methodology"
      - "Review AI risks quarterly with cross-functional team"
    console_path: "GCP SCC > Findings | Azure Defender > Alerts"
    recommended_reading:
      - "UCF RSK-6 — AI Risk Management"
      - "ISO 42001:2023 Guidance"
    evidence_types:
      - "scc_findings"
      - "wiz_issues"
      - "defender_alerts"
    assertion_name: null

  # ---------------------------------------------------------------------------
  # IAM — Identity and Access Management (8 controls)
  # ---------------------------------------------------------------------------
  UCF-IAM-1:
    summary: "User accounts must be managed across cloud, IdP, and IGA platforms"
    remediation_steps:
      - "Review AWS IAM credential reports for account hygiene"
      - "Sync Okta and Entra user inventories"
      - "Manage identity lifecycle through SailPoint"
      - "Disable dormant accounts (90+ days inactive)"
      - "Reconcile account inventories across platforms monthly"
    console_path: "AWS Console > IAM > Users | Okta Admin > People | SailPoint > Identities"
    recommended_reading:
      - "UCF IAM-1 — Account Management"
    evidence_types:
      - "iam_credential_report"
      - "okta_users"
      - "entra_users"
      - "sailpoint_identities"
    assertion_name: null

  UCF-IAM-2:
    summary: "Strong authentication including MFA and password policies must be enforced"
    remediation_steps:
      - "Enforce MFA via Okta factors and Entra conditional access"
      - "Configure strong password policy in AWS IAM"
      - "Set Okta password policies with complexity requirements"
      - "Monitor Entra risky sign-ins for compromised credentials"
      - "Block legacy authentication protocols"
    console_path: "Okta Admin > Security > Multifactor | Entra > Conditional Access"
    recommended_reading:
      - "UCF IAM-2 — Authentication"
    evidence_types:
      - "okta_factors"
      - "entra_conditional_access_policies"
      - "iam_password_policy"
      - "entra_risky_users"
    assertion_name: null

  UCF-IAM-3:
    summary: "Access enforcement must follow least-privilege principles"
    remediation_steps:
      - "Review IAM user permissions for least privilege"
      - "Configure GCP IAM policies with minimal bindings"
      - "Enforce Okta and Entra access policies"
      - "Audit over-privileged accounts quarterly"
      - "Implement just-in-time access for elevated privileges"
    console_path: "AWS Console > IAM > Access Analyzer | GCP > IAM"
    recommended_reading:
      - "UCF IAM-3 — Access Enforcement"
    evidence_types:
      - "iam_users"
      - "gcp_iam_policies"
      - "okta_policies"
    assertion_name: null

  UCF-IAM-4:
    summary: "Least privilege and segregation of duties must be maintained"
    remediation_steps:
      - "Review IAM and GCP policies for excessive permissions"
      - "Configure SailPoint SoD policies for conflicting entitlements"
      - "Restrict CyberArk privileged accounts per role separation"
      - "Audit Okta group memberships for role conflicts"
      - "Generate SoD violation reports quarterly"
    console_path: "SailPoint > Access Policies > SoD | CyberArk > Accounts"
    recommended_reading:
      - "UCF IAM-4 — Least Privilege and SoD"
    evidence_types:
      - "sailpoint_roles"
      - "sailpoint_entitlements"
      - "cyberark_accounts"
    assertion_name: null

  UCF-IAM-5:
    summary: "Privileged access must be managed through PAM controls"
    remediation_steps:
      - "Onboard all privileged accounts to CyberArk safes"
      - "Enforce password rotation via CyberArk platform policies"
      - "Monitor privileged access in cloud IAM"
      - "Review privileged roles in SailPoint entitlements"
      - "Implement session recording for privileged access"
    console_path: "CyberArk > Accounts | CyberArk > Safes"
    recommended_reading:
      - "UCF IAM-5 — Privileged Access Management"
    evidence_types:
      - "cyberark_accounts"
      - "cyberark_safes"
      - "cyberark_password_compliance"
    assertion_name: null

  UCF-IAM-6:
    summary: "Remote access must be secured with appropriate controls"
    remediation_steps:
      - "Configure Entra conditional access for remote scenarios"
      - "Enforce CrowdStrike Zero Trust Assessment for remote endpoints"
      - "Monitor Okta and Entra sign-in events for remote access"
      - "Require VPN or ZTNA for sensitive resource access"
      - "Review remote access policies quarterly"
    console_path: "Entra > Conditional Access | CrowdStrike > Zero Trust"
    recommended_reading:
      - "UCF IAM-6 — Remote Access Security"
    evidence_types:
      - "entra_conditional_access_policies"
      - "falcon_zero_trust"
      - "okta_system_log"
    assertion_name: null

  UCF-IAM-7:
    summary: "Access reviews must be conducted regularly"
    remediation_steps:
      - "Schedule SailPoint access certification campaigns"
      - "Review privileged role assignments in SailPoint"
      - "Certify entitlement appropriateness with managers"
      - "Revoke access for failed certifications"
      - "Track certification completion rates"
    console_path: "SailPoint > Certifications > Campaigns"
    recommended_reading:
      - "UCF IAM-7 — Access Reviews"
    evidence_types:
      - "sailpoint_certifications"
      - "sailpoint_roles"
      - "sailpoint_entitlements"
    assertion_name: null

  UCF-IAM-8:
    summary: "Credentials must be managed securely throughout their lifecycle"
    remediation_steps:
      - "Review IAM credential reports for key rotation compliance"
      - "Monitor Okta and Entra user credential status"
      - "Enforce CyberArk password rotation for privileged accounts"
      - "Disable credentials for terminated users within 24 hours"
      - "Audit credential hygiene monthly"
    console_path: "AWS Console > IAM > Credential Report | CyberArk > Accounts"
    recommended_reading:
      - "UCF IAM-8 — Credential Management"
    evidence_types:
      - "iam_credential_report"
      - "okta_users"
      - "cyberark_accounts"
    assertion_name: null

  # ---------------------------------------------------------------------------
  # HRS — Human Resources Security (5 controls)
  # ---------------------------------------------------------------------------
  UCF-HRS-1:
    summary: "Personnel screening must be conducted before employment"
    remediation_steps:
      - "Conduct background checks via Workday integration"
      - "Define screening requirements per role sensitivity"
      - "Verify screening completion before granting access"
      - "Document screening results and retain per policy"
      - "Re-screen personnel in sensitive roles periodically"
    console_path: "Workday > Recruiting > Background Checks"
    recommended_reading:
      - "UCF HRS-1 — Personnel Screening"
    evidence_types:
      - "workday_background_checks"
      - "workday_employees"
    assertion_name: "background_check_completed"

  UCF-HRS-2:
    summary: "Employment terms must include security responsibilities"
    remediation_steps:
      - "Include security clauses in employment agreements"
      - "Require NDA/confidentiality agreement signature"
      - "Track agreement completion in Workday"
      - "Extend security obligations to contractors"
      - "Review agreement templates annually"
    console_path: "Workday > Documents > Employment Agreements"
    recommended_reading:
      - "UCF HRS-2 — Employment Terms"
    evidence_types:
      - "workday_agreements"
    assertion_name: "employment_agreement_signed"

  UCF-HRS-3:
    summary: "Security awareness training and phishing simulations must be conducted"
    remediation_steps:
      - "Deploy KnowBe4 training campaigns for all employees"
      - "Track completion in SailPoint certifications"
      - "Run monthly phishing simulations via KnowBe4"
      - "Maintain completion rate above 95%"
      - "Provide remedial training for phishing failures"
    console_path: "KnowBe4 > Training > Campaigns | KnowBe4 > Phishing"
    recommended_reading:
      - "UCF HRS-3 — Security Training"
    evidence_types:
      - "kb4_training_enrollments"
      - "kb4_phishing_results"
      - "sailpoint_certifications"
    assertion_name: "training_completion_rate"

  UCF-HRS-4:
    summary: "Access must be revoked promptly upon termination"
    remediation_steps:
      - "Automate deprovisioning via SailPoint lifecycle events"
      - "Disable Okta, Entra, and IAM accounts on termination"
      - "Verify Workday termination triggers access removal"
      - "Audit deprovisioned accounts within 24 hours"
      - "Document offboarding completion"
    console_path: "SailPoint > Identities > Lifecycle | Okta Admin > People"
    recommended_reading:
      - "UCF HRS-4 — Termination Access"
    evidence_types:
      - "sailpoint_identities"
      - "okta_users"
      - "entra_users"
    assertion_name: null

  UCF-HRS-5:
    summary: "Access must be adjusted upon personnel transfer or role change"
    remediation_steps:
      - "Trigger SailPoint role reassignment on job change"
      - "Review and adjust Okta and Entra group memberships"
      - "Remove access no longer needed for new role"
      - "Provision access required for new responsibilities"
      - "Audit transfer access changes within 48 hours"
    console_path: "SailPoint > Identities > Access | Okta Admin > People"
    recommended_reading:
      - "UCF HRS-5 — Personnel Transfer"
    evidence_types:
      - "sailpoint_identities"
      - "okta_users"
      - "entra_users"
    assertion_name: null

  # ---------------------------------------------------------------------------
  # ASM — Asset Management (6 controls)
  # ---------------------------------------------------------------------------
  UCF-ASM-1:
    summary: "Asset inventory must be comprehensive across cloud, endpoints, and identities"
    remediation_steps:
      - "Deploy cloud asset discovery via Prisma and Wiz"
      - "Maintain endpoint inventory via CrowdStrike, Defender, SentinelOne"
      - "Track vulnerability scanner assets via Tenable"
      - "Sync identity inventory from SailPoint, Okta, Entra"
      - "Reconcile inventories quarterly for completeness"
    console_path: "Wiz > Inventory | CrowdStrike > Host Management"
    recommended_reading:
      - "UCF ASM-1 — Asset Inventory"
    evidence_types:
      - "prisma_assets"
      - "falcon_device_details"
      - "sailpoint_identities"
      - "asset_export"
    assertion_name: null

  UCF-ASM-2:
    summary: "Assets must be classified by sensitivity and criticality"
    remediation_steps:
      - "Define classification scheme (Public, Internal, Confidential, Restricted)"
      - "Apply classification tags to S3 buckets and storage accounts"
      - "Label GCP storage buckets by classification"
      - "Document classification criteria"
      - "Train asset owners on classification"
    console_path: "AWS Console > S3 > Tags | Azure Portal > Storage > Tags"
    recommended_reading:
      - "UCF ASM-2 — Asset Classification"
    evidence_types:
      - "s3_buckets"
      - "storage_buckets"
      - "storage_accounts"
    assertion_name: null

  UCF-ASM-3:
    summary: "Acceptable use of assets must be defined and enforced"
    remediation_steps:
      - "Publish acceptable use policy"
      - "Enforce via Okta and Entra conditional access policies"
      - "Monitor policy compliance through IdP logs"
      - "Require employee acknowledgment"
      - "Review policy annually"
    console_path: "Okta Admin > Policies | Entra > Conditional Access"
    recommended_reading:
      - "UCF ASM-3 — Acceptable Use"
    evidence_types:
      - "okta_policies"
      - "entra_conditional_access_policies"
    assertion_name: null

  UCF-ASM-4:
    summary: "Storage media must be managed throughout its lifecycle"
    remediation_steps:
      - "Encrypt all storage media at rest"
      - "Configure lifecycle policies for S3 and storage accounts"
      - "Track media from provisioning to disposal"
      - "Verify encryption configuration regularly"
      - "Document media handling procedures"
    console_path: "AWS Console > S3 > Encryption | Azure Portal > Storage"
    recommended_reading:
      - "UCF ASM-4 — Media Management"
    evidence_types:
      - "s3_buckets"
      - "storage_buckets"
      - "storage_accounts"
    assertion_name: null

  UCF-ASM-5:
    summary: "Capacity planning must ensure adequate resources"
    remediation_steps:
      - "Monitor SIEM capacity via Splunk index health"
      - "Track Sentinel data connector throughput"
      - "Review infrastructure capacity via Prisma and Tenable"
      - "Set capacity alerts and auto-scaling"
      - "Review capacity trends quarterly"
    console_path: "Splunk > Monitoring Console | Prisma Cloud > Inventory"
    recommended_reading:
      - "UCF ASM-5 — Capacity Management"
    evidence_types:
      - "splunk_index_health"
      - "prisma_assets"
      - "asset_export"
    assertion_name: null

  UCF-ASM-6:
    summary: "Cloud security posture must be continuously monitored"
    remediation_steps:
      - "Deploy Wiz and Prisma Cloud for CSPM"
      - "Enable AWS Security Hub and Config"
      - "Enable Azure Policy compliance and Defender"
      - "Enable GCP Security Command Center"
      - "Review CSPM findings weekly and remediate critical issues"
    console_path: "Wiz > Issues | Security Hub | Azure Policy > Compliance"
    recommended_reading:
      - "UCF ASM-6 — Cloud Security Posture"
    evidence_types:
      - "wiz_config_findings"
      - "securityhub_hub"
      - "policy_compliance"
      - "scc_findings"
    assertion_name: null

  # ---------------------------------------------------------------------------
  # PHY — Physical Security (4 controls)
  # ---------------------------------------------------------------------------
  UCF-PHY-1:
    summary: "Physical security perimeters must be established and monitored"
    remediation_steps:
      - "Deploy Verkada door access controls at facility perimeters"
      - "Configure access control lists per security zone"
      - "Monitor access events continuously"
      - "Review physical access logs monthly"
      - "Test perimeter controls annually"
    console_path: "Verkada > Access Control > Doors"
    recommended_reading:
      - "UCF PHY-1 — Physical Perimeters"
    evidence_types:
      - "verkada_doors"
    assertion_name: null

  UCF-PHY-2:
    summary: "Physical access monitoring must be in place"
    remediation_steps:
      - "Deploy video surveillance via Verkada cameras"
      - "Monitor access events for anomalies"
      - "Record privileged physical access sessions"
      - "Retain monitoring records per policy"
      - "Review monitoring coverage regularly"
    console_path: "Verkada > Access Events | CyberArk > Recordings"
    recommended_reading:
      - "UCF PHY-2 — Physical Monitoring"
    evidence_types:
      - "verkada_access_events"
      - "cyberark_recordings"
    assertion_name: null

  UCF-PHY-3:
    summary: "Off-premises assets must be secured"
    remediation_steps:
      - "Deploy EDR agents on all off-premises endpoints"
      - "Monitor remote endpoint health via CrowdStrike"
      - "Verify SentinelOne agent connectivity"
      - "Enforce full-disk encryption on portable devices"
      - "Document off-premises protection requirements"
    console_path: "CrowdStrike > Host Management | SentinelOne > Sentinels"
    recommended_reading:
      - "UCF PHY-3 — Off-Premises Security"
    evidence_types:
      - "falcon_device_details"
      - "s1_agents"
    assertion_name: null

  UCF-PHY-4:
    summary: "Environmental protection controls must be in place"
    remediation_steps:
      - "Assess environmental threats for on-premises infrastructure"
      - "Verify cloud provider environmental controls"
      - "Monitor environmental compliance via Azure Policy and AWS Config"
      - "Document environmental protection measures"
      - "Test environmental controls annually"
    console_path: "Azure Policy > Compliance | AWS Console > Config"
    recommended_reading:
      - "UCF PHY-4 — Environmental Protection"
    evidence_types:
      - "policy_compliance"
      - "config_recorders"
    assertion_name: null

  # ---------------------------------------------------------------------------
  # NET — Network Security (7 controls)
  # ---------------------------------------------------------------------------
  UCF-NET-1:
    summary: "Network boundary protection must be implemented across all cloud providers"
    remediation_steps:
      - "Review AWS security groups and NACLs for boundary rules"
      - "Audit Azure NSGs for inbound/outbound restrictions"
      - "Verify GCP firewall rules for boundary protection"
      - "Remove 0.0.0.0/0 on management ports"
      - "Document network boundary architecture"
    console_path: "AWS Console > VPC > Security Groups | Azure Portal > NSGs"
    recommended_reading:
      - "UCF NET-1 — Boundary Protection"
    evidence_types:
      - "ec2_security_groups"
      - "ec2_network_acls"
      - "network_security_groups"
      - "compute_firewall_rules"
    assertion_name: null

  UCF-NET-2:
    summary: "Network segmentation must isolate security zones"
    remediation_steps:
      - "Implement VPC/VNet segmentation per environment"
      - "Configure NACLs for subnet-level isolation"
      - "Review NSG and firewall rules for cross-zone access"
      - "Enforce network segmentation between prod and non-prod"
      - "Document segmentation architecture"
    console_path: "AWS Console > VPC > NACLs | Azure Portal > NSGs"
    recommended_reading:
      - "UCF NET-2 — Network Segmentation"
    evidence_types:
      - "ec2_network_acls"
      - "ec2_security_groups"
      - "network_security_groups"
    assertion_name: null

  UCF-NET-3:
    summary: "Firewall rules must restrict traffic to authorized flows"
    remediation_steps:
      - "Review and minimize security group rules"
      - "Audit NSGs for overly permissive rules"
      - "Verify GCP firewall rules follow least-privilege"
      - "Document approved network flows"
      - "Review firewall rules quarterly"
    console_path: "AWS Console > VPC > Security Groups | GCP > VPC > Firewall"
    recommended_reading:
      - "UCF NET-3 — Firewall Management"
    evidence_types:
      - "ec2_security_groups"
      - "network_security_groups"
      - "compute_firewall_rules"
    assertion_name: null

  UCF-NET-4:
    summary: "Wireless security controls must be implemented"
    remediation_steps:
      - "Configure wireless security per organizational standards"
      - "Monitor wireless compliance via Azure Policy and AWS Config"
      - "Review Wiz configuration findings for wireless-related issues"
      - "Enforce WPA3 or equivalent encryption"
      - "Audit wireless configurations quarterly"
    console_path: "Azure Policy > Compliance | AWS Console > Config"
    recommended_reading:
      - "UCF NET-4 — Wireless Security"
    evidence_types:
      - "policy_compliance"
      - "config_recorders"
    assertion_name: null

  UCF-NET-5:
    summary: "Remote network access must be secured"
    remediation_steps:
      - "Configure Entra conditional access for remote VPN/ZTNA"
      - "Enforce Okta sign-on policies for remote access"
      - "Enable CrowdStrike Zero Trust Assessment"
      - "Require compliant device posture for remote connections"
      - "Monitor remote access events"
    console_path: "Entra > Conditional Access | CrowdStrike > Zero Trust"
    recommended_reading:
      - "UCF NET-5 — Remote Access"
    evidence_types:
      - "entra_conditional_access_policies"
      - "okta_policies"
      - "falcon_zero_trust"
    assertion_name: null

