controls:
  "AC.L2-3.1.1":
    summary: "Limit system access to authorized users, processes acting on behalf of authorized users, and devices"
    remediation_steps:
      - "Implement identity verification for all users, processes, and devices before granting access"
      - "Deploy IAM solutions (Okta, Entra ID) to manage user authentication centrally"
      - "Configure network access controls (security groups, firewalls) to restrict device connectivity"
      - "Disable or remove unauthorized accounts and revoke access for non-compliant devices"
      - "Review access authorizations quarterly and remove accounts that are no longer needed"
    console_path: "Warlock > Access Control > Authorized Access"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.1 -- Authorized Access"
      - "CMMC Assessment Guide: AC.L2-3.1.1"
      - "NIST SP 800-171A: 3.1.1 Assessment Procedures"
    evidence_types:
      - "iam_configuration"
      - "access_review_report"
    assertion_name: "authorized_access_enforced"

  "AC.L2-3.1.2":
    summary: "Limit system access to the types of transactions and functions that authorized users are permitted to execute"
    remediation_steps:
      - "Implement role-based access control (RBAC) mapping job functions to permitted transactions"
      - "Configure IAM policies to restrict actions based on user role assignments"
      - "Enforce conditional access policies limiting function access by context (location, device, time)"
      - "Audit user permissions quarterly to ensure alignment with authorized functions"
      - "Document authorized transactions for each role and maintain an access control matrix"
    console_path: "Warlock > Access Control > Transaction Limits"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.2 -- Transaction and Function Control"
      - "CMMC Assessment Guide: AC.L2-3.1.2"
    evidence_types:
      - "iam_configuration"
      - "access_control_matrix"
    assertion_name: "transaction_control_enforced"

  "AC.L2-3.1.3":
    summary: "Control the flow of CUI in accordance with approved authorizations"
    remediation_steps:
      - "Map all CUI data flows between systems and document approved paths"
      - "Implement network segmentation to isolate CUI processing environments"
      - "Configure firewall rules and security groups to enforce approved data flow paths"
      - "Deploy DLP solutions to detect and prevent unauthorized CUI transfers"
      - "Review and update CUI flow authorizations when system architecture changes"
    console_path: "Warlock > Access Control > Information Flow"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.3 -- CUI Flow Enforcement"
      - "CMMC Assessment Guide: AC.L2-3.1.3"
    evidence_types:
      - "network_diagram"
      - "firewall_configuration"
    assertion_name: "cui_flow_controlled"

  "AC.L2-3.1.4":
    summary: "Separate the duties of individuals to reduce the risk of malicious activity without collusion"
    remediation_steps:
      - "Identify critical functions requiring separation of duties (authorize, execute, review)"
      - "Implement role-based access ensuring no single user can complete a sensitive transaction alone"
      - "Configure IAM to enforce incompatible role restrictions"
      - "Document separation of duties requirements in the access control policy"
      - "Audit for SoD violations quarterly and remediate conflicts"
    console_path: "Warlock > Access Control > Separation of Duties"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.4 -- Separation of Duties"
      - "CMMC Assessment Guide: AC.L2-3.1.4"
    evidence_types:
      - "role_matrix"
      - "sod_analysis"
    assertion_name: "separation_of_duties_enforced"

  "AC.L2-3.1.5":
    summary: "Employ the principle of least privilege, including for specific security functions and privileged accounts"
    remediation_steps:
      - "Audit all user permissions and remove access not required for current job functions"
      - "Implement just-in-time (JIT) privileged access using PAM solutions"
      - "Configure privileged access to expire after a defined time period"
      - "Use IAM Access Analyzer or equivalent tools to identify overly permissive policies"
      - "Review privileged access quarterly with documented justification for each elevation"
    console_path: "Warlock > Access Control > Least Privilege"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.5 -- Least Privilege"
      - "CMMC Assessment Guide: AC.L2-3.1.5"
    evidence_types:
      - "iam_configuration"
      - "privilege_review_report"
    assertion_name: "least_privilege_enforced"

  "AC.L2-3.1.6":
    summary: "Use non-privileged accounts or roles when accessing non-security functions"
    remediation_steps:
      - "Require administrators to use separate non-privileged accounts for daily tasks"
      - "Implement separate admin and standard accounts in the identity provider"
      - "Configure conditional access to restrict privileged accounts to admin consoles only"
      - "Monitor for privileged account use in non-administrative activities"
      - "Audit compliance with non-privileged account usage requirements quarterly"
    console_path: "Warlock > Access Control > Non-Privileged Access"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.6 -- Non-Privileged Account Use"
      - "CMMC Assessment Guide: AC.L2-3.1.6"
    evidence_types:
      - "iam_configuration"
      - "account_usage_report"
    assertion_name: "non_privileged_accounts_enforced"

  "AC.L2-3.1.7":
    summary: "Prevent non-privileged users from executing privileged functions and capture execution in audit logs"
    remediation_steps:
      - "Configure IAM policies to restrict privileged function execution to authorized roles"
      - "Enable audit logging for all privileged function executions"
      - "Implement alerts for unauthorized attempts to execute privileged functions"
      - "Review privileged function execution logs weekly for anomalies"
      - "Test access controls to verify non-privileged users cannot escalate privileges"
    console_path: "Warlock > Access Control > Privileged Function Control"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.7 -- Privileged Functions"
      - "CMMC Assessment Guide: AC.L2-3.1.7"
    evidence_types:
      - "iam_configuration"
      - "audit_log"
    assertion_name: "privileged_functions_restricted"

  "AC.L2-3.1.8":
    summary: "Limit unsuccessful logon attempts by enforcing account lockout policies"
    remediation_steps:
      - "Configure account lockout after 5 consecutive failed login attempts"
      - "Set lockout duration to a minimum of 15 minutes or require administrator unlock"
      - "Implement progressive delay between failed attempts to slow brute-force attacks"
      - "Configure alerts for accounts experiencing repeated lockouts"
      - "Review lockout events weekly and investigate patterns suggesting attacks"
    console_path: "Warlock > Identity > Lockout Policy"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.8 -- Unsuccessful Logon Attempts"
      - "CMMC Assessment Guide: AC.L2-3.1.8"
    evidence_types:
      - "authentication_policy"
      - "lockout_event_log"
    assertion_name: "account_lockout_configured"

  "AC.L2-3.1.9":
    summary: "Provide privacy and security notices consistent with applicable CUI rules before granting access"
    remediation_steps:
      - "Configure system use notification banners on all login screens"
      - "Include warnings about monitoring, acceptable use, and legal consequences"
      - "Require users to acknowledge the banner before proceeding to login"
      - "Ensure banners comply with DoD and CUI marking requirements"
      - "Review banner text annually and update for regulatory changes"
    console_path: "Warlock > Access Control > System Use Notification"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.9 -- Privacy and Security Notices"
      - "CMMC Assessment Guide: AC.L2-3.1.9"
    evidence_types:
      - "banner_configuration"
      - "policy_document"
    assertion_name: "system_use_notification_displayed"

  "AC.L2-3.1.10":
    summary: "Use session lock with pattern-hiding displays to prevent access and viewing of data after inactivity"
    remediation_steps:
      - "Configure automatic screen lock after 15 minutes of inactivity on all endpoints"
      - "Implement pattern-hiding displays (blank screen or screensaver, not data preview)"
      - "Require re-authentication to unlock the session"
      - "Apply session lock settings via group policy, MDM, or configuration management"
      - "Verify session lock configuration through endpoint compliance scanning"
    console_path: "Warlock > Endpoint > Session Lock"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.10 -- Session Lock"
      - "CMMC Assessment Guide: AC.L2-3.1.10"
    evidence_types:
      - "endpoint_configuration"
      - "policy_compliance_report"
    assertion_name: "session_lock_configured"

  "AC.L2-3.1.11":
    summary: "Terminate user sessions automatically after a defined condition such as inactivity or maximum duration"
    remediation_steps:
      - "Configure session timeout policies in IdP (Okta, Entra ID) for CUI systems"
      - "Set maximum session duration limits for web applications and remote access"
      - "Invalidate session tokens upon logout or timeout"
      - "Implement idle timeout on VPN connections and remote desktop sessions"
      - "Test session termination behavior to verify tokens are properly invalidated"
    console_path: "Warlock > Identity > Session Management"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.11 -- Session Termination"
      - "CMMC Assessment Guide: AC.L2-3.1.11"
    evidence_types:
      - "session_configuration"
      - "technical_test_result"
    assertion_name: "session_termination_configured"

  "AC.L2-3.1.12":
    summary: "Monitor and control remote access sessions using automated mechanisms"
    remediation_steps:
      - "Implement VPN or zero-trust network access for all remote connections to CUI systems"
      - "Log all remote access sessions including user, source IP, duration, and actions"
      - "Configure alerts for anomalous remote access patterns"
      - "Monitor remote sessions for policy compliance (MFA, managed device, approved location)"
      - "Review remote access logs weekly and investigate suspicious activity"
    console_path: "Warlock > Network > Remote Access Monitoring"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.12 -- Remote Access Control"
      - "CMMC Assessment Guide: AC.L2-3.1.12"
    evidence_types:
      - "remote_access_log"
      - "network_configuration"
    assertion_name: "remote_access_monitored"

  "AC.L2-3.1.13":
    summary: "Employ cryptographic mechanisms to protect the confidentiality of remote access sessions"
    remediation_steps:
      - "Configure VPN connections using IPsec or TLS 1.2+ with FIPS-validated modules"
      - "Disable legacy VPN protocols and weak cipher suites"
      - "Implement TLS 1.2+ for all web-based remote access"
      - "Verify encryption configuration through technical testing"
      - "Monitor for remote connections not using approved encrypted channels"
    console_path: "Warlock > Network > Remote Access Encryption"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.13 -- Remote Access Confidentiality"
      - "CMMC Assessment Guide: AC.L2-3.1.13"
    evidence_types:
      - "vpn_configuration"
      - "encryption_test_result"
    assertion_name: "remote_access_encrypted"

  "AC.L2-3.1.14":
    summary: "Route remote access via managed access control points"
    remediation_steps:
      - "Direct all remote connections through approved VPN concentrators or ZTNA gateways"
      - "Block direct remote connections that bypass managed access points"
      - "Implement firewall rules allowing remote access only through designated entry points"
      - "Monitor for unauthorized remote access paths and alert on violations"
      - "Document all approved remote access control points and their configurations"
    console_path: "Warlock > Network > Access Control Points"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.14 -- Remote Access Routing"
      - "CMMC Assessment Guide: AC.L2-3.1.14"
    evidence_types:
      - "network_diagram"
      - "firewall_configuration"
    assertion_name: "remote_access_routed"

  "AC.L2-3.1.15":
    summary: "Authorize remote execution of privileged commands and remote access to security-relevant information"
    remediation_steps:
      - "Document operational justification for each remote privileged access requirement"
      - "Implement PAM solutions for remote privileged access with session recording"
      - "Require approval workflow before granting remote privileged access"
      - "Log all remote privileged commands with full session recording"
      - "Review remote privileged access authorizations quarterly"
    console_path: "Warlock > Access Control > Remote Privileged Access"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.15 -- Privileged Remote Access"
      - "CMMC Assessment Guide: AC.L2-3.1.15"
    evidence_types:
      - "pam_configuration"
      - "approval_record"
    assertion_name: "remote_privileged_access_authorized"

  "AC.L2-3.1.16":
    summary: "Authorize wireless access prior to allowing such connections"
    remediation_steps:
      - "Establish a wireless access authorization process with documented approvals"
      - "Maintain an inventory of authorized wireless access points and connected devices"
      - "Implement 802.1X authentication for wireless network access"
      - "Scan for unauthorized (rogue) wireless access points regularly"
      - "Review wireless access authorizations quarterly and revoke unnecessary access"
    console_path: "Warlock > Network > Wireless Authorization"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.16 -- Wireless Access Authorization"
      - "CMMC Assessment Guide: AC.L2-3.1.16"
    evidence_types:
      - "wireless_configuration"
      - "authorization_record"
    assertion_name: "wireless_access_authorized"

  "AC.L2-3.1.17":
    summary: "Protect wireless access using authentication and encryption"
    remediation_steps:
      - "Implement WPA3 Enterprise or WPA2 Enterprise with AES encryption"
      - "Disable WEP and WPA (TKIP) on all wireless networks"
      - "Configure wireless networks with RADIUS authentication"
      - "Segment wireless CUI traffic from guest and general networks"
      - "Conduct periodic wireless security assessments and penetration tests"
    console_path: "Warlock > Network > Wireless Security"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.17 -- Wireless Access Protection"
      - "CMMC Assessment Guide: AC.L2-3.1.17"
    evidence_types:
      - "wireless_configuration"
      - "security_test_result"
    assertion_name: "wireless_access_protected"

  "AC.L2-3.1.18":
    summary: "Control connection of mobile devices using MDM and establish usage restrictions"
    remediation_steps:
      - "Deploy MDM/EMM solution for all mobile devices accessing CUI"
      - "Enforce device compliance policies (encryption, PIN, OS version, jailbreak detection)"
      - "Implement conditional access restricting CUI access to managed devices"
      - "Enable remote wipe capability for lost or stolen devices"
      - "Review mobile device inventory and compliance status monthly"
    console_path: "Warlock > Endpoint > Mobile Device Management"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.18 -- Mobile Device Connection"
      - "CMMC Assessment Guide: AC.L2-3.1.18"
    evidence_types:
      - "mdm_configuration"
      - "device_compliance_report"
    assertion_name: "mobile_devices_managed"

  "AC.L2-3.1.19":
    summary: "Encrypt CUI on mobile devices and mobile computing platforms"
    remediation_steps:
      - "Enable full-disk encryption on all mobile devices (FileVault, BitLocker, Android encryption)"
      - "Require FIPS-validated encryption modules for CUI data at rest on mobile devices"
      - "Configure container-based encryption for CUI applications on BYOD devices"
      - "Verify encryption status through MDM compliance checks"
      - "Block CUI access from devices that do not meet encryption requirements"
    console_path: "Warlock > Endpoint > Mobile Encryption"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.19 -- Mobile Device Encryption"
      - "CMMC Assessment Guide: AC.L2-3.1.19"
    evidence_types:
      - "encryption_configuration"
      - "device_compliance_report"
    assertion_name: "mobile_encryption_enforced"

  "AC.L2-3.1.20":
    summary: "Verify and control or limit connections to and use of external systems"
    remediation_steps:
      - "Inventory all connections to external systems and document data exchange agreements"
      - "Implement firewall rules restricting outbound connections to approved external systems"
      - "Monitor external connections for anomalous data transfer patterns"
      - "Require authorization before establishing new external system connections"
      - "Review external system connections quarterly and remove unnecessary connections"
    console_path: "Warlock > Network > External Connections"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.20 -- External System Connections"
      - "CMMC Assessment Guide: AC.L2-3.1.20"
    evidence_types:
      - "network_configuration"
      - "interconnection_agreement"
    assertion_name: "external_connections_controlled"

  "AC.L2-3.1.21":
    summary: "Limit use of portable storage devices on external systems"
    remediation_steps:
      - "Establish a policy restricting or prohibiting USB storage device use on external systems"
      - "Implement DLP policies blocking CUI transfer to unauthorized removable media"
      - "Deploy endpoint controls to disable USB mass storage on managed devices"
      - "Monitor for USB storage device connections and alert on violations"
      - "Provide approved encrypted storage alternatives for authorized data transfer needs"
    console_path: "Warlock > Endpoint > Removable Media Control"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.21 -- Portable Storage Use"
      - "CMMC Assessment Guide: AC.L2-3.1.21"
    evidence_types:
      - "dlp_policy"
      - "endpoint_configuration"
    assertion_name: "portable_storage_restricted"

  "AC.L2-3.1.22":
    summary: "Control information posted or processed on publicly accessible systems to prevent CUI exposure"
    remediation_steps:
      - "Identify all publicly accessible systems and verify no CUI is stored or processed"
      - "Implement content review procedures before publishing to public-facing systems"
      - "Configure S3 bucket policies and storage account settings to block public access"
      - "Deploy automated scanning to detect CUI markers on publicly accessible resources"
      - "Designate authorized individuals for public information posting with approval workflows"
    console_path: "Warlock > Data Protection > Public Access Control"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.1.22 -- Publicly Accessible Content"
      - "CMMC Assessment Guide: AC.L2-3.1.22"
    evidence_types:
      - "public_access_configuration"
      - "content_review_record"
    assertion_name: "public_content_controlled"

  "AT.L2-3.2.1":
    summary: "Ensure managers, administrators, and users are aware of security risks and applicable policies"
    remediation_steps:
      - "Develop role-based security awareness training content for all workforce levels"
      - "Require all personnel to complete initial awareness training within 30 days of onboarding"
      - "Conduct annual refresher training covering current threats and policy updates"
      - "Include CUI handling procedures and marking requirements in training content"
      - "Track completion rates and follow up with non-compliant personnel"
    console_path: "Warlock > Training > Security Awareness"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.2.1 -- Security Awareness"
      - "CMMC Assessment Guide: AT.L2-3.2.1"
    evidence_types:
      - "training_completion_record"
      - "training_material"
    assertion_name: "security_awareness_current"

  "AT.L2-3.2.2":
    summary: "Ensure personnel are trained to carry out their assigned information security duties"
    remediation_steps:
      - "Identify role-specific security training requirements for each job function"
      - "Provide specialized training for IT administrators, developers, and security personnel"
      - "Include hands-on exercises and scenario-based training for technical roles"
      - "Conduct phishing simulations and measure improvement over time"
      - "Maintain training records and require annual recertification"
    console_path: "Warlock > Training > Role-Based Training"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.2.2 -- Role-Based Training"
      - "CMMC Assessment Guide: AT.L2-3.2.2"
    evidence_types:
      - "training_completion_record"
      - "phishing_simulation_report"
    assertion_name: "role_based_training_current"

  "AT.L2-3.2.3":
    summary: "Provide security awareness training on recognizing and reporting potential indicators of insider threat"
    remediation_steps:
      - "Include insider threat awareness in the security training curriculum"
      - "Train personnel to recognize behavioral indicators of insider threats"
      - "Establish anonymous reporting mechanisms for suspected insider threats"
      - "Provide clear procedures for reporting concerns to security personnel"
      - "Conduct insider threat scenario exercises for management and security teams"
    console_path: "Warlock > Training > Insider Threat Awareness"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.2.3 -- Insider Threat Awareness"
      - "CMMC Assessment Guide: AT.L2-3.2.3"
      - "CISA Insider Threat Mitigation Guide"
    evidence_types:
      - "training_completion_record"
      - "reporting_procedure"
    assertion_name: "insider_threat_training_current"

  "AU.L2-3.3.1":
    summary: "Create and retain system audit logs and records to enable monitoring, analysis, and investigation"
    remediation_steps:
      - "Enable audit logging on all systems processing, storing, or transmitting CUI"
      - "Configure logs to capture logon attempts, privilege changes, data access, and config changes"
      - "Centralize log collection in a SIEM with defined retention periods"
      - "Retain audit logs for a minimum of one year with 90 days immediately accessible"
      - "Protect audit logs from unauthorized modification or deletion"
    console_path: "Warlock > Audit > Audit Logging"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.3.1 -- System Audit Logs"
      - "CMMC Assessment Guide: AU.L2-3.3.1"
    evidence_types:
      - "logging_configuration"
      - "retention_policy"
    assertion_name: "audit_logging_enabled"

  "AU.L2-3.3.2":
    summary: "Ensure actions of individual system users can be uniquely traced for accountability"
    remediation_steps:
      - "Assign unique user identifiers and prohibit shared accounts"
      - "Configure audit logs to associate all actions with individual user identifiers"
      - "Implement centralized authentication to ensure consistent user attribution"
      - "Verify that application-level actions are traceable to authenticated users"
      - "Test traceability by sampling audit records and verifying user attribution"
    console_path: "Warlock > Audit > User Traceability"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.3.2 -- User Accountability"
      - "CMMC Assessment Guide: AU.L2-3.3.2"
    evidence_types:
      - "audit_log_sample"
      - "iam_configuration"
    assertion_name: "user_accountability_verified"

  "AU.L2-3.3.3":
    summary: "Review and update logged events regularly based on ongoing risk assessment"
    remediation_steps:
      - "Define which events require auditing based on current threat landscape and risk assessment"
      - "Review audit event selection at least annually and after security incidents"
      - "Add new event types when emerging threats or vulnerabilities are identified"
      - "Update SIEM correlation rules to reflect current audit event requirements"
      - "Document event selection rationale and approval"
    console_path: "Warlock > Audit > Event Selection"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.3.3 -- Audit Event Review"
      - "CMMC Assessment Guide: AU.L2-3.3.3"
    evidence_types:
      - "audit_event_configuration"
      - "risk_assessment_document"
    assertion_name: "audit_events_reviewed"

  "AU.L2-3.3.4":
    summary: "Alert in the event of an audit logging process failure"
    remediation_steps:
      - "Configure monitoring for audit log agent health and collection pipeline status"
      - "Set up automated alerts when audit logging stops or degrades"
      - "Monitor log storage capacity and alert when thresholds are approached"
      - "Implement redundant logging paths to prevent single points of failure"
      - "Establish incident response procedures for audit logging failures"
    console_path: "Warlock > Audit > Logging Health"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.3.4 -- Audit Logging Failure Alerts"
      - "CMMC Assessment Guide: AU.L2-3.3.4"
    evidence_types:
      - "monitoring_configuration"
      - "alert_configuration"
    assertion_name: "audit_failure_alerts_configured"

  "AU.L2-3.3.5":
    summary: "Correlate audit record review, analysis, and reporting to support investigation and response"
    remediation_steps:
      - "Deploy a SIEM solution for centralized log correlation and analysis"
      - "Create correlation rules mapping multiple data sources to identify attack patterns"
      - "Implement automated alerting for correlated events indicating potential incidents"
      - "Establish procedures for investigating correlated findings"
      - "Generate regular reports on correlated security events for management review"
    console_path: "Warlock > Audit > Log Correlation"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.3.5 -- Audit Correlation"
      - "CMMC Assessment Guide: AU.L2-3.3.5"
    evidence_types:
      - "siem_configuration"
      - "correlation_rule_inventory"
    assertion_name: "audit_correlation_enabled"

  "AU.L2-3.3.6":
    summary: "Provide audit record reduction and report generation to support on-demand analysis"
    remediation_steps:
      - "Configure SIEM dashboards for compliance monitoring and security analysis"
      - "Implement automated report generation for audit review activities"
      - "Build filtering and search capabilities for ad-hoc audit record analysis"
      - "Create standard report templates for common compliance and investigation needs"
      - "Ensure authorized personnel can generate reports on demand"
    console_path: "Warlock > Audit > Reporting"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.3.6 -- Audit Reduction and Reporting"
      - "CMMC Assessment Guide: AU.L2-3.3.6"
    evidence_types:
      - "siem_configuration"
      - "sample_report"
    assertion_name: "audit_reporting_available"

  "AU.L2-3.3.7":
    summary: "Provide system capability to compare and synchronize clocks with an authoritative time source"
    remediation_steps:
      - "Configure all systems to synchronize time using NTP with authoritative sources"
      - "Use at least two independent time sources for redundancy"
      - "Set maximum allowable time skew to 1 second or less"
      - "Monitor time synchronization status and alert on drift"
      - "Document NTP configuration and verify compliance through configuration scanning"
    console_path: "Warlock > Infrastructure > Time Synchronization"
    recommended_reading:
      - "NIST SP 800-171 Rev 2: 3.3.7 -- Time Stamps"
      - "CMMC Assessment Guide: AU.L2-3.3.7"
    evidence_types:
      - "ntp_configuration"
      - "configuration_scan_report"
    assertion_name: "time_synchronization_configured"

  "AU.L2-3.3.8":
    summary: "Protect audit information and audit logging tools from unauthorized access, modification, and deletion"
    remediation_steps:
      - "Restrict access to audit logs and logging infrastructure to authorized security personnel"
      - "Enable log integrity validation (CloudTrail log file validation, immutable storage)"
      - "Store audit logs in write-once storage (S3 Object Lock, Azure immutable blob)"
      - "Encrypt audit logs at rest and in transit"
      - "Monitor for unauthorized access attempts to audit logging systems"
