# SOC 2 Trust Services Criteria -- Points of Focus
# Source: AICPA TSP 100, 2017 revision (with 2022 updates)
# Each point of focus maps to its parent TSC control
# Used by the attestation workflow to generate granular assessment checklists

CC1:
  CC1.1:
    title: "COSO Principle 1: Demonstrates Commitment to Integrity and Ethical Values"
    points_of_focus:
      - id: "CC1.1.1"
        title: "Sets the Tone at the Top"
        description: "The board of directors and management, at all levels, demonstrate through their directives, actions, and behavior the importance of integrity and ethical values."
        assessment_guidance: "Review board meeting minutes for ethics discussions. Verify management communications reinforcing ethical expectations. Check for leadership behavior consistent with stated values."
      - id: "CC1.1.2"
        title: "Establishes Standards of Conduct"
        description: "The expectations of the board of directors and senior management concerning integrity and ethical values are defined in the entity's standards of conduct and understood at all levels."
        assessment_guidance: "Obtain and review code of conduct. Verify distribution to all employees with acknowledgment records. Check for annual refresh cycle."
      - id: "CC1.1.3"
        title: "Evaluates Adherence to Standards of Conduct"
        description: "Processes are in place to evaluate the performance of individuals and teams against the entity's expected standards of conduct."
        assessment_guidance: "Review performance evaluation templates for ethics criteria. Sample disciplinary records for code of conduct violations. Verify HR investigation procedures."
      - id: "CC1.1.4"
        title: "Addresses Deviations in a Timely Manner"
        description: "Deviations from the entity's expected standards of conduct are identified and remedied in a timely and consistent manner."
        assessment_guidance: "Review incident response timelines for ethics violations. Verify escalation procedures. Sample corrective action records for timeliness."

  CC1.2:
    title: "COSO Principle 2: Exercises Oversight Responsibility"
    points_of_focus:
      - id: "CC1.2.1"
        title: "Establishes Oversight Responsibilities"
        description: "The board of directors identifies and accepts its oversight responsibilities in relation to established requirements and expectations."
        assessment_guidance: "Review board charter and committee charters. Verify oversight responsibilities are documented. Check board composition for independence requirements."
      - id: "CC1.2.2"
        title: "Applies Relevant Expertise"
        description: "The board of directors defines, maintains, and periodically evaluates the skills and expertise needed among its members."
        assessment_guidance: "Review board member qualifications matrix. Verify cybersecurity or technology expertise on the board or audit committee. Check for regular skills gap assessments."
      - id: "CC1.2.3"
        title: "Operates Independently"
        description: "The board of directors has sufficient members who are independent from management and exercise independent judgment."
        assessment_guidance: "Verify board independence ratios. Review conflict of interest disclosures. Check that audit committee is composed of independent directors."

  CC1.3:
    title: "COSO Principle 3: Establishes Structure, Authority, and Responsibility"
    points_of_focus:
      - id: "CC1.3.1"
        title: "Considers All Structures of the Entity"
        description: "Management and the board consider the multiple structures used to support the achievement of objectives."
        assessment_guidance: "Review organizational chart. Verify reporting lines for IT, security, and compliance functions. Check for clear authority delegation documents."
      - id: "CC1.3.2"
        title: "Establishes Reporting Lines"
        description: "Management designs and evaluates lines of reporting to enable the entity to meet its objectives."
        assessment_guidance: "Verify CISO/CTO reporting structure (reports to CEO or board). Review escalation paths for security incidents. Check for documented RACI matrices."
      - id: "CC1.3.3"
        title: "Defines, Assigns, and Limits Authorities and Responsibilities"
        description: "Management and the board delegate authority, define responsibilities, and use appropriate processes and technology."
        assessment_guidance: "Review role descriptions for key IT and security personnel. Verify segregation of duties in critical processes. Check authorization limits documentation."
      - id: "CC1.3.4"
        title: "Addresses Specific Requirements When Defining Authorities"
        description: "Management considers requirements of applicable standards, regulations, and frameworks when defining authorities."
        assessment_guidance: "Verify that role definitions reference compliance obligations. Check that data protection officer role meets GDPR requirements where applicable."

  CC1.4:
    title: "COSO Principle 4: Demonstrates Commitment to Competence"
    points_of_focus:
      - id: "CC1.4.1"
        title: "Considers Competence Requirements"
        description: "The organization defines competence requirements for key roles, including IT and security positions."
        assessment_guidance: "Review job descriptions for required certifications and skills. Verify minimum qualification standards for security-sensitive roles."
      - id: "CC1.4.2"
        title: "Addresses Shortfalls"
        description: "The organization provides mentoring, training, and other resources to help individuals develop competence."
        assessment_guidance: "Review training program records. Verify security awareness training completion rates. Check professional development budgets and utilization."
      - id: "CC1.4.3"
        title: "Attracts, Develops, and Retains Individuals"
        description: "The organization provides the resources needed to attract, develop, and retain competent individuals."
        assessment_guidance: "Review retention metrics for key security and IT roles. Verify succession planning documentation. Check competitive compensation benchmarking."

  CC1.5:
    title: "COSO Principle 5: Enforces Accountability"
    points_of_focus:
      - id: "CC1.5.1"
        title: "Enforces Accountability Through Structures and Authorities"
        description: "Management and the board establish mechanisms to communicate and hold individuals accountable for internal control responsibilities."
        assessment_guidance: "Review performance evaluation criteria for control owners. Verify accountability is documented in job descriptions. Check for control ownership assignments."
      - id: "CC1.5.2"
        title: "Establishes Performance Measures, Incentives, and Rewards"
        description: "Management and the board establish performance measures, incentives, and other rewards appropriate for responsibilities at all levels."
        assessment_guidance: "Review KPIs for security and compliance teams. Verify that incentive structures do not create conflicts with control objectives. Check bonus criteria for control effectiveness metrics."
      - id: "CC1.5.3"
        title: "Evaluates Performance and Rewards or Disciplines Individuals"
        description: "Management and the board evaluate performance and adjust as necessary."
        assessment_guidance: "Sample performance reviews for control-related objectives. Review disciplinary actions for security policy violations. Verify timely response to control failures."

CC2:
  CC2.1:
    title: "COSO Principle 13: Uses Relevant Information"
    points_of_focus:
      - id: "CC2.1.1"
        title: "Identifies Information Requirements"
        description: "A process is in place to identify information required to support the functioning of internal controls."
        assessment_guidance: "Review data classification policy. Verify information flow diagrams exist for critical systems. Check that logging requirements are documented per system."
      - id: "CC2.1.2"
        title: "Captures Internal and External Sources of Data"
        description: "Information systems capture internal and external sources of data."
        assessment_guidance: "Verify centralized log aggregation (SIEM). Review external threat intelligence feed subscriptions. Check that all in-scope systems forward logs."
      - id: "CC2.1.3"
        title: "Processes Relevant Data Into Information"
        description: "Information systems process and transform relevant data into usable information."
        assessment_guidance: "Review SIEM correlation rules and alert logic. Verify dashboard configurations for security metrics. Check that raw data is normalized and enriched."

  CC2.2:
    title: "COSO Principle 14: Communicates Internally"
    points_of_focus:
      - id: "CC2.2.1"
        title: "Communicates Information to Improve Internal Controls"
        description: "A process exists to communicate information needed to support the functioning of internal controls."
        assessment_guidance: "Review internal security newsletters or bulletins. Verify incident notification procedures. Check that policy changes are communicated to affected personnel."
      - id: "CC2.2.2"
        title: "Communicates With the Board of Directors"
        description: "Communication exists between management and the board of directors so that both have the information needed to fulfill their roles."
        assessment_guidance: "Review security briefing materials presented to the board. Verify frequency of board-level security reporting. Check that material incidents are escalated to the board."
      - id: "CC2.2.3"
        title: "Provides Separate Communication Lines"
        description: "Separate communication channels, such as whistleblower hotlines, are in place as fail-safe mechanisms."
        assessment_guidance: "Verify existence of anonymous reporting mechanism. Review whistleblower policy. Check hotline utilization and response metrics."

  CC2.3:
    title: "COSO Principle 15: Communicates Externally"
    points_of_focus:
      - id: "CC2.3.1"
        title: "Communicates to External Parties"
        description: "Processes are in place to communicate relevant and timely information to external parties including regulators, customers, and partners."
        assessment_guidance: "Review customer-facing security documentation (SOC 2 report distribution). Verify breach notification procedures. Check regulatory reporting processes."
      - id: "CC2.3.2"
        title: "Enables Inbound Communication"
        description: "Open communication channels allow input from customers, vendors, regulators, and other external parties."
        assessment_guidance: "Verify security vulnerability disclosure program (security@domain). Review vendor security questionnaire response process. Check customer complaint handling for security issues."
      - id: "CC2.3.3"
        title: "Communicates With the Board on External Matters"
        description: "Relevant information resulting from external communications is communicated to the board."
        assessment_guidance: "Verify that external audit findings are reported to the board. Review process for escalating regulatory inquiries. Check that customer security concerns are tracked."

CC3:
  CC3.1:
    title: "COSO Principle 6: Specifies Suitable Objectives"
    points_of_focus:
      - id: "CC3.1.1"
        title: "Considers Risk Tolerance"
        description: "Management considers the acceptable levels of variation in performance relative to its objectives."
        assessment_guidance: "Review documented risk appetite statement. Verify risk tolerance thresholds for availability, security, and confidentiality. Check that tolerances are approved by the board."
      - id: "CC3.1.2"
        title: "Operations Objectives"
        description: "Operations objectives reflect management choices about structure, industry considerations, and performance."
        assessment_guidance: "Review SLA definitions and targets. Verify uptime objectives for critical systems. Check that objectives are measurable and monitored."
      - id: "CC3.1.3"
        title: "External Financial Reporting Objectives"
        description: "External financial reporting objectives are consistent with applicable accounting standards."
        assessment_guidance: "Review IT controls supporting financial reporting. Verify system access controls for financial systems. Check automated vs manual controls in financial close process."

  CC3.2:
    title: "COSO Principle 7: Identifies and Analyzes Risk"
    points_of_focus:
      - id: "CC3.2.1"
        title: "Includes Entity, Subsidiary, Division, Operating Unit, and Functional Levels"
        description: "The entity identifies and assesses risk at appropriate organizational levels."
        assessment_guidance: "Review enterprise risk register. Verify risk assessments cover all in-scope business units. Check that IT risk is integrated into the enterprise risk management program."
      - id: "CC3.2.2"
        title: "Analyzes Internal and External Factors"
        description: "Risk identification considers both internal and external factors."
        assessment_guidance: "Review threat modeling outputs. Verify external threat landscape assessments. Check that emerging threats (supply chain, AI) are evaluated."
      - id: "CC3.2.3"
        title: "Involves Appropriate Levels of Management"
        description: "Risk assessment involves appropriate levels of management."
        assessment_guidance: "Verify risk committee membership and meeting frequency. Review risk assessment sign-off authority. Check that risk owners are at the appropriate management level."
      - id: "CC3.2.4"
        title: "Estimates Significance of Risks Identified"
        description: "The entity uses a defined methodology to estimate the significance of identified risks."
        assessment_guidance: "Review risk scoring methodology (likelihood x impact or FAIR model). Verify consistent application across risk assessments. Check for quantitative risk analysis where appropriate."

  CC3.3:
    title: "COSO Principle 8: Assesses Fraud Risk"
    points_of_focus:
      - id: "CC3.3.1"
        title: "Considers Various Types of Fraud"
        description: "The assessment considers fraudulent reporting, loss of assets, and corruption."
        assessment_guidance: "Review fraud risk assessment documentation. Verify that insider threat scenarios are evaluated. Check for controls addressing privileged user abuse."
      - id: "CC3.3.2"
        title: "Assesses Incentive and Pressures"
        description: "The assessment considers incentives and pressures to commit fraud."
        assessment_guidance: "Review separation of duties analysis. Verify that compensation structures do not incentivize data manipulation. Check for monitoring of high-risk transactions."
      - id: "CC3.3.3"
        title: "Assesses Opportunities"
        description: "The assessment considers opportunities for unauthorized acquisition, use, or disposal of assets."
        assessment_guidance: "Review access control effectiveness for sensitive data. Verify data loss prevention controls. Check for monitoring of data exfiltration vectors."

  CC3.4:
    title: "COSO Principle 9: Identifies and Analyzes Significant Change"
    points_of_focus:
      - id: "CC3.4.1"
        title: "Assesses Changes in the External Environment"
        description: "The risk identification process considers changes in the regulatory, economic, and physical environment."
        assessment_guidance: "Review regulatory change tracking process. Verify new compliance requirement intake workflow. Check for threat landscape change assessments."
      - id: "CC3.4.2"
        title: "Assesses Changes in the Business Model"
        description: "The entity considers the potential impacts of new business lines, acquisitions, or divestitures."
        assessment_guidance: "Review M&A security assessment procedures. Verify new product/service security review process. Check that scope changes trigger SOC 2 boundary updates."
      - id: "CC3.4.3"
        title: "Assesses Changes in Leadership"
        description: "The entity considers changes in management and respective attitudes and philosophies on internal controls."
        assessment_guidance: "Review onboarding process for new executives. Verify that leadership transitions include control responsibility handoffs. Check for updated delegation of authority documents."

CC5:
  CC5.1:
    title: "COSO Principle 10: Selects and Develops Control Activities"
    points_of_focus:
      - id: "CC5.1.1"
        title: "Integrates With Risk Assessment"
        description: "Control activities address the risks identified through the risk assessment process."
        assessment_guidance: "Verify traceability from risk register entries to specific controls. Review control design for each identified risk. Check for controls addressing the highest-rated risks."
      - id: "CC5.1.2"
        title: "Considers Entity-Specific Factors"
        description: "Management considers specific characteristics of the entity when selecting and developing control activities."
        assessment_guidance: "Review control selection rationale documentation. Verify that industry-specific risks have tailored controls. Check that cloud-specific controls are addressed for SaaS environments."
      - id: "CC5.1.3"
        title: "Determines Relevant Business Processes"
        description: "Management determines which relevant business processes require control activities."
        assessment_guidance: "Review process inventory and control mapping. Verify that all critical business processes have assigned controls. Check for gap analysis documentation."
      - id: "CC5.1.4"
        title: "Evaluates a Mix of Control Activity Types"
        description: "Control activities include a range of types: preventive and detective, manual and automated, and entity-level controls."
        assessment_guidance: "Review the control matrix for balance of preventive vs detective controls. Verify automated controls are tested differently than manual ones. Check for compensating controls where primary controls have gaps."

  CC5.2:
    title: "COSO Principle 11: Selects and Develops General Controls Over Technology"
    points_of_focus:
      - id: "CC5.2.1"
        title: "Determines Dependency Between Use of Technology and General IT Controls"
        description: "Management understands and determines the dependency between business process controls and IT general controls."
        assessment_guidance: "Review ITGC scoping documentation. Verify mapping of application controls to supporting ITGCs. Check that infrastructure dependencies are documented."
      - id: "CC5.2.2"
        title: "Establishes Relevant Technology Infrastructure Controls"
        description: "Management selects and develops controls over the technology infrastructure."
        assessment_guidance: "Review infrastructure hardening standards (CIS benchmarks). Verify patch management program effectiveness. Check network segmentation controls."
      - id: "CC5.2.3"
        title: "Establishes Relevant Security Management Process Controls"
        description: "Management selects and develops controls related to the security management process."
        assessment_guidance: "Review vulnerability management program maturity. Verify security monitoring and alerting coverage. Check incident response program readiness."
      - id: "CC5.2.4"
        title: "Establishes Relevant Technology Acquisition, Development, and Maintenance Controls"
        description: "Management selects and develops controls over the acquisition, development, and maintenance of technology."
        assessment_guidance: "Review SDLC security integration (SAST, DAST, SCA). Verify change management controls for production systems. Check vendor security assessment process for new technology."

  CC5.3:
    title: "COSO Principle 12: Deploys Through Policies and Procedures"
    points_of_focus:
      - id: "CC5.3.1"
        title: "Establishes Policies and Procedures to Support Deployment"
        description: "Management establishes control activities that are built into business processes and activities through policies and procedures."
        assessment_guidance: "Review information security policy suite completeness. Verify policy review and approval cycle (annual minimum). Check that policies are accessible to all employees."
      - id: "CC5.3.2"
        title: "Establishes Responsibility and Accountability for Policies"
        description: "Management establishes responsibility and accountability for control activities with management of the business unit or function."
        assessment_guidance: "Verify policy ownership assignments. Review policy exception process and approval authority. Check that policy owners conduct effectiveness reviews."
      - id: "CC5.3.3"
        title: "Performs in a Timely Manner"
        description: "Responsible personnel perform control activities in a timely manner as defined by policies."
        assessment_guidance: "Review SLA compliance for key control activities. Verify that control monitoring detects late or missed executions. Check for automated alerts on control activity delays."
      - id: "CC5.3.4"
        title: "Takes Corrective Action"
        description: "Responsible personnel investigate and act on matters identified as a result of control activities."
        assessment_guidance: "Review corrective action tracking and closure metrics. Verify root cause analysis process for control failures. Check that corrective actions are validated before closure."

CC6:
  CC6.1:
    title: "Logical and Physical Access -- Access Controls"
    points_of_focus:
      - id: "CC6.1.1"
        title: "Identifies and Manages Access"
        description: "Logical access security software, infrastructure, and architectures have been implemented to support identification and authentication, authorization, and accountability."
        assessment_guidance: "Review IAM platform configuration (Okta, Entra ID, AWS IAM). Verify centralized authentication for all in-scope systems. Check for accounts not managed through the central IdP."
      - id: "CC6.1.2"
        title: "Restricts Logical Access"
        description: "The entity restricts logical access to information assets based on the principle of least privilege."
        assessment_guidance: "Review role-based access control design. Sample user access for least privilege compliance. Check for excessive permissions in cloud IAM policies."
      - id: "CC6.1.3"
        title: "Manages Access to Infrastructure and Platform Software"
        description: "The entity manages access to infrastructure and platform software to support logical access security."
        assessment_guidance: "Review privileged access management (PAM) solution configuration. Verify administrative access is limited and monitored. Check for shared or generic admin accounts."
      - id: "CC6.1.4"
        title: "Considers Network Segmentation"
        description: "The entity considers network segmentation as part of its logical access controls."
        assessment_guidance: "Review network architecture diagrams for segmentation. Verify firewall rules enforce segmentation. Check for micro-segmentation in cloud environments."

  CC6.2:
    title: "Logical and Physical Access -- User Registration and Authorization"
    points_of_focus:
      - id: "CC6.2.1"
        title: "Controls Access Based on User Roles"
        description: "New user access is provisioned based on defined roles and authorized by appropriate personnel."
        assessment_guidance: "Review user provisioning workflow and approval process. Sample new hire access requests for proper authorization. Verify role definitions match job functions."
      - id: "CC6.2.2"
        title: "Removes Access When No Longer Needed"
        description: "User access is removed or modified when job responsibilities change or upon termination."
        assessment_guidance: "Review offboarding/termination access revocation SLA. Sample terminated employee accounts for timely deprovisioning. Verify automated deprovisioning from HR system integration."
      - id: "CC6.2.3"
        title: "Reviews Access Periodically"
        description: "User access is reviewed periodically to confirm continued appropriateness."
        assessment_guidance: "Review access certification campaign completion rates. Verify review frequency (quarterly for privileged, semi-annual for standard). Check that reviewers are appropriate managers."

  CC6.3:
    title: "Logical and Physical Access -- Role-Based Access and Least Privilege"
    points_of_focus:
      - id: "CC6.3.1"
        title: "Creates or Modifies Access Based on Authorization"
        description: "Processes are in place to create or modify access to protected information assets based on an authorized request."
        assessment_guidance: "Review access request ticketing workflow. Verify multi-level approval for privileged access. Check that self-service access requests have appropriate guard rails."
      - id: "CC6.3.2"
        title: "Removes Access Based on Authorization"
        description: "Processes are in place to remove access to protected information assets when an individual no longer requires access."
        assessment_guidance: "Review access removal procedures for role changes and terminations. Verify integration between HR system and IdP for automated deprovisioning. Sample transfer cases for access adjustment."
      - id: "CC6.3.3"
        title: "Segregates Incompatible Duties"
        description: "Access controls are designed to prevent individuals from performing incompatible duties."
        assessment_guidance: "Review SoD conflict matrix. Verify SoD controls in financial and IT systems. Check for automated SoD violation detection and alerting."

  CC6.4:
    title: "Logical and Physical Access -- Credential Lifecycle Management"
    points_of_focus:
      - id: "CC6.4.1"
        title: "Manages Credentials for Infrastructure and Software"
        description: "The entity manages credentials for infrastructure and software."
        assessment_guidance: "Review password policy configuration. Verify MFA enforcement across all in-scope systems. Check for secrets management solution (Vault, AWS Secrets Manager)."
      - id: "CC6.4.2"
        title: "Rotates Credentials"
        description: "The entity rotates credentials and tokens on a defined schedule."
        assessment_guidance: "Review API key and service account credential rotation schedule. Verify automated rotation for database credentials. Check for expired or stale credentials."
      - id: "CC6.4.3"
        title: "Protects Credentials Against Unauthorized Access"
        description: "The entity protects credentials from unauthorized access."
        assessment_guidance: "Review credential storage mechanisms (no plaintext passwords). Verify secrets are not committed to source code repositories. Check for secret scanning tools in CI/CD pipelines."

  CC6.5:
    title: "Logical and Physical Access -- Authentication Mechanisms"
    points_of_focus:
      - id: "CC6.5.1"
        title: "Identifies and Authenticates Users"
        description: "The entity identifies and authenticates all users before granting access."
        assessment_guidance: "Review SSO configuration and enforcement. Verify all in-scope applications are integrated with the IdP. Check for local accounts that bypass centralized authentication."
      - id: "CC6.5.2"
        title: "Multi-Factor Authentication"
        description: "Multi-factor authentication is required for remote access, privileged access, and access to sensitive data."
        assessment_guidance: "Review MFA policy and conditional access rules. Verify MFA enrollment rates (target: 100%). Check MFA method strength (hardware tokens vs SMS)."
      - id: "CC6.5.3"
        title: "Manages Identification and Authentication"
        description: "The entity manages identification and authentication for non-human identities (service accounts, APIs)."
        assessment_guidance: "Review service account inventory and ownership. Verify API authentication mechanisms (OAuth, mTLS). Check for workload identity federation in cloud environments."

  CC6.6:
    title: "Logical and Physical Access -- System Boundary Protection"
    points_of_focus:
      - id: "CC6.6.1"
        title: "Restricts Access at System Boundaries"
        description: "Points of access at the boundaries of the system are restricted and monitored."
        assessment_guidance: "Review firewall and WAF configurations. Verify ingress/egress rules restrict to required traffic. Check for exposed management interfaces."
      - id: "CC6.6.2"
        title: "Protects Against Threats From External Sources"
        description: "The entity implements boundary protection mechanisms to protect against threats from outside the system boundary."
        assessment_guidance: "Review DDoS protection configuration. Verify IDS/IPS deployment and tuning. Check for web application firewall coverage on all public endpoints."
      - id: "CC6.6.3"
        title: "Encrypts Data in Transit"
        description: "Data transmissions between the entity and external parties are encrypted."
        assessment_guidance: "Verify TLS 1.2+ enforcement on all public endpoints. Review certificate management process. Check for deprecated cipher suites."
      - id: "CC6.6.4"
        title: "Manages Endpoints"
        description: "The entity manages and protects endpoints connecting to the system."
        assessment_guidance: "Review endpoint protection platform (EPP/EDR) deployment coverage. Verify endpoint compliance policy enforcement. Check for unmanaged devices with system access."

  CC6.7:
    title: "Logical and Physical Access -- Data Classification and Protection"
    points_of_focus:
      - id: "CC6.7.1"
        title: "Restricts Transmission, Movement, and Removal of Information"
        description: "The entity restricts the transmission, movement, and removal of information to authorized parties."
        assessment_guidance: "Review DLP policy configuration and rule effectiveness. Verify email security controls (encryption, attachment filtering). Check for removable media controls."
      - id: "CC6.7.2"
        title: "Protects Information During Transmission"
        description: "Encryption is used to protect data during transmission outside the system boundary."
        assessment_guidance: "Verify TLS enforcement for all data transmissions. Review VPN configurations for site-to-site connections. Check for certificate pinning on mobile applications."
      - id: "CC6.7.3"
        title: "Classifies Data"
        description: "The entity classifies information to identify and protect sensitive data."
        assessment_guidance: "Review data classification policy and schema. Verify classification labels are applied in practice. Check for automated data discovery and classification tools."

  CC6.8:
    title: "Logical and Physical Access -- Malicious Software Prevention"
    points_of_focus:
      - id: "CC6.8.1"
        title: "Detects Malicious Software"
        description: "Controls are in place to detect and prevent the installation of malicious software."
        assessment_guidance: "Review EDR/antivirus deployment coverage. Verify signature update frequency and detection rates. Check for fileless malware detection capabilities."
      - id: "CC6.8.2"
        title: "Detects Changes to Software and Configuration"
        description: "Controls are in place to detect unauthorized changes to software and configuration."
        assessment_guidance: "Review file integrity monitoring (FIM) configuration. Verify configuration drift detection mechanisms. Check for unauthorized software installation alerts."
      - id: "CC6.8.3"
        title: "Prevents Malicious Software Installation"
        description: "Controls prevent the installation of unauthorized software on managed endpoints."
        assessment_guidance: "Review application whitelisting or control policies. Verify admin rights restrictions on endpoints. Check for software restriction policies in cloud workloads."

CC7:
  CC7.1:
    title: "System Operations -- Detection of Unauthorized Activities"
    points_of_focus:
      - id: "CC7.1.1"
        title: "Uses Defined Configuration Standards"
        description: "Management has defined configuration standards and uses those standards as a baseline for detection."
        assessment_guidance: "Review configuration baselines (CIS benchmarks, STIGs). Verify baseline compliance scanning frequency. Check for drift detection and automated remediation."
      - id: "CC7.1.2"
        title: "Monitors Infrastructure and Software"
        description: "The entity monitors infrastructure and software for security events."
        assessment_guidance: "Review SIEM log source coverage. Verify detection rule library coverage against MITRE ATT&CK. Check for log gaps in critical systems."
      - id: "CC7.1.3"
        title: "Implements Change Detection Mechanisms"
        description: "The entity implements mechanisms to detect changes to configurations and infrastructure."
        assessment_guidance: "Review cloud configuration monitoring (AWS Config, Azure Policy). Verify file integrity monitoring deployment. Check for infrastructure-as-code drift detection."
      - id: "CC7.1.4"
        title: "Detects Unknown or Unauthorized Components"
        description: "The entity detects previously unknown or unauthorized software components."
        assessment_guidance: "Review asset discovery scan results. Verify shadow IT detection mechanisms. Check for unauthorized cloud resource provisioning detection."

  CC7.2:
    title: "System Operations -- Monitoring of System Components"
    points_of_focus:
      - id: "CC7.2.1"
        title: "Monitors System Components for Anomalies"
        description: "The entity monitors system components for anomalies that are indicative of malicious acts."
        assessment_guidance: "Review anomaly detection rules and baselines. Verify user behavior analytics (UBA) configuration. Check for network traffic anomaly detection."
      - id: "CC7.2.2"
        title: "Implements Detection Policies, Procedures, and Tools"
        description: "Detection policies, procedures, and tools are in place and operating."
        assessment_guidance: "Review security operations center (SOC) procedures. Verify detection tool operational status and health. Check for detection coverage gap analysis."
      - id: "CC7.2.3"
        title: "Designs Detection to Cover Objectives"
        description: "Detection measures are designed to support the entity's objectives."
        assessment_guidance: "Verify detection aligns with the system description and trust services criteria. Review false positive rates and tuning process. Check detection SLAs (mean time to detect)."

  CC7.3:
    title: "System Operations -- Evaluation of Security Events"
    points_of_focus:
      - id: "CC7.3.1"
        title: "Evaluates Events Based on Criteria"
        description: "The entity evaluates events to determine whether they could or do indicate unauthorized activity."
        assessment_guidance: "Review alert triage and classification procedures. Verify severity classification criteria. Check for documented event analysis playbooks."
      - id: "CC7.3.2"
        title: "Assesses Ongoing Effectiveness"
        description: "The entity assesses the ongoing effectiveness of its event detection and evaluation process."
        assessment_guidance: "Review periodic detection effectiveness testing (purple team exercises). Verify metrics tracking (detection rate, false positive rate). Check for continuous improvement process."
      - id: "CC7.3.3"
        title: "Determines Timing of Detection"
        description: "The entity determines the timing of event detection and the process for notifying appropriate personnel."
        assessment_guidance: "Review mean time to detect (MTTD) metrics. Verify escalation procedures and notification timelines. Check for 24/7 monitoring coverage or on-call rotation."

  CC7.4:
    title: "System Operations -- Incident Response"
    points_of_focus:
      - id: "CC7.4.1"
        title: "Assigns Roles and Responsibilities"
        description: "Roles and responsibilities for the design, implementation, and conduct of the incident response program are assigned."
        assessment_guidance: "Review incident response plan role assignments. Verify RACI matrix for incident response. Check for documented on-call schedules and escalation paths."
      - id: "CC7.4.2"
        title: "Contains Security Incidents"
        description: "Procedures are in place to contain security incidents."
        assessment_guidance: "Review containment playbooks for common incident types. Verify network isolation capabilities. Check for automated containment actions (EDR quarantine, account disabling)."
      - id: "CC7.4.3"
        title: "Mitigates Ongoing Security Incidents"
        description: "Procedures are in place to mitigate the effects of ongoing security incidents."
        assessment_guidance: "Review incident mitigation procedures. Verify communication protocols during active incidents. Check for business continuity activation criteria."
      - id: "CC7.4.4"
        title: "Restores Operations"
        description: "Procedures are in place to restore operations after a security incident."
        assessment_guidance: "Review post-incident recovery procedures. Verify backup restoration testing records. Check for documented recovery time objectives per system."

  CC7.5:
    title: "System Operations -- Incident Recovery and Lessons Learned"
    points_of_focus:
      - id: "CC7.5.1"
        title: "Restores the Affected Environment"
        description: "The affected environment is restored to predefined system operation levels."
        assessment_guidance: "Review recovery procedures and checklists. Verify system integrity verification after recovery. Check for documented recovery validation criteria."
      - id: "CC7.5.2"
        title: "Communicates Information About the Event"
        description: "Information about the nature of the incident, recovery actions taken, and lessons learned is communicated to management."
        assessment_guidance: "Review incident post-mortem report template and samples. Verify management notification procedures. Check for external notification requirements assessment."
      - id: "CC7.5.3"
        title: "Determines Root Cause"
        description: "The root cause of the event is determined."
        assessment_guidance: "Review root cause analysis methodology. Sample post-incident reviews for root cause identification. Check for action items tracked to closure."
      - id: "CC7.5.4"
        title: "Implements Improvements"
        description: "Improvements are identified and implemented as a result of the event."
        assessment_guidance: "Review lessons learned tracking and closure. Verify that post-incident action items result in control improvements. Check for updated detection rules or playbooks after incidents."

CC8:
  CC8.1:
    title: "Change Management -- Controls Over System Changes"
    points_of_focus:
      - id: "CC8.1.1"
        title: "Manages Changes Throughout the Lifecycle"
        description: "A process for managing system changes throughout the lifecycle is used and understood."
        assessment_guidance: "Review change management policy and procedures. Verify change advisory board (CAB) meeting frequency and coverage. Check for emergency change process documentation."
      - id: "CC8.1.2"
        title: "Authorizes Changes"
        description: "A process exists to authorize system changes prior to development and implementation."
        assessment_guidance: "Review change request approval workflow. Sample change tickets for proper authorization. Verify segregation of duties between developers and deployers."
      - id: "CC8.1.3"
        title: "Designs and Develops Changes"
        description: "A process exists to design, develop, and test changes before moving them to production."
        assessment_guidance: "Review SDLC documentation and development standards. Verify code review requirements. Check for pre-production testing requirements and sign-off."
      - id: "CC8.1.4"
        title: "Tests Changes"
        description: "Changes are tested before being promoted to production."
        assessment_guidance: "Review testing methodology (unit, integration, UAT, security testing). Verify test evidence retention. Check for automated testing in CI/CD pipelines."
      - id: "CC8.1.5"
        title: "Documents Changes"
        description: "System changes are documented and configuration is updated."
        assessment_guidance: "Review change documentation requirements. Verify infrastructure-as-code repositories are up to date. Check for configuration management database (CMDB) accuracy."

A1:
  A1.1:
    title: "Availability -- Capacity Management"
    points_of_focus:
      - id: "A1.1.1"
        title: "Manages Capacity to Meet Availability Commitments"
        description: "The entity manages capacity to meet availability commitments and requirements."
        assessment_guidance: "Review capacity planning process and documentation. Verify auto-scaling configuration for cloud resources. Check for capacity monitoring and alerting thresholds."
      - id: "A1.1.2"
        title: "Identifies Environmental Threats"
        description: "The entity identifies environmental threats that could impair system availability."
        assessment_guidance: "Review business impact analysis (BIA) documentation. Verify single points of failure analysis. Check for multi-region or multi-zone deployment architecture."
      - id: "A1.1.3"
        title: "Designs for Availability"
        description: "The entity designs systems to meet availability commitments."
        assessment_guidance: "Review high availability architecture documentation. Verify load balancer and failover configurations. Check for redundancy in critical system components."

  A1.2:
    title: "Availability -- Environmental Protections and Recovery"
    points_of_focus:
      - id: "A1.2.1"
        title: "Implements Backup and Recovery"
        description: "Backup and recovery procedures support the entity's recovery objectives."
        assessment_guidance: "Review backup policy and retention schedules. Verify backup completion rates and monitoring. Check for encryption of backup data at rest and in transit."
      - id: "A1.2.2"
        title: "Tests Recovery Plan Periodically"
        description: "Recovery plan procedures are tested periodically."
        assessment_guidance: "Review disaster recovery test schedule and results. Verify recovery time achieved vs. RTO target. Check for documented lessons learned from recovery tests."
      - id: "A1.2.3"
        title: "Implements Business Continuity Plan"
        description: "A business continuity plan has been developed to reduce the impact of disruptions."
        assessment_guidance: "Review BCP documentation. Verify BCP testing and tabletop exercise records. Check for BCP updates after organizational or infrastructure changes."

  A1.3:
    title: "Availability -- Recovery Testing and Resilience"
    points_of_focus:
      - id: "A1.3.1"
        title: "Tests Recovery From Incidents"
        description: "The entity tests recovery plan procedures to validate the ability to recover from system incidents."
        assessment_guidance: "Review disaster recovery test results and metrics. Verify recovery testing covers all critical systems. Check that recovery tests simulate realistic failure scenarios."
      - id: "A1.3.2"
        title: "Assesses Recovery Capability"
        description: "The entity assesses its recovery capability against the defined recovery objectives."
        assessment_guidance: "Review RTO/RPO achievement metrics from recovery tests. Verify gap remediation plans for missed recovery targets. Check for trend analysis of recovery performance over time."
      - id: "A1.3.3"
        title: "Communicates Recovery Results"
        description: "Recovery test results are communicated to management and other relevant stakeholders."
        assessment_guidance: "Review DR test result reports distributed to management. Verify that recovery gaps are tracked as action items. Check for board-level reporting on business resilience posture."
