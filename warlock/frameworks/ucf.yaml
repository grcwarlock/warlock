framework_id: ucf

control_families:
  # ===========================================================================
  # UCF-GOV — Governance & Policy
  # Maps to: NIST PL/PM, SOC2 CC1, ISO A.5.1-A.5.4, ISO42001 A.2
  # ===========================================================================
  GOV:
    controls:
      UCF-GOV-1:
        # Security/Privacy Policies
        checks:
          - id: gov1_security_policies
            event_types:
              - okta_policies
              - entra_conditional_access_policies
              - prisma_policies
              - s1_policies
              - falcon_sensor_policies
            resource_types:
              - okta_policy
              - entra_conditional_access_policy
              - policy

      UCF-GOV-2:
        # Roles & Responsibilities
        checks:
          - id: gov2_roles
            event_types:
              - sailpoint_identities
              - sailpoint_roles
              - okta_groups
            resource_types:
              - sailpoint_identity
              - sailpoint_role

      UCF-GOV-3:
        # Management Commitment & Oversight
        checks:
          - id: gov3_oversight
            event_types:
              - sailpoint_certifications
            resource_types:
              - sailpoint_certification

      UCF-GOV-4:
        # Regulatory & Legal Compliance
        checks:
          - id: gov4_compliance
            event_types:
              - prisma_compliance
              - compliance_audits
              - policy_compliance
            resource_types:
              - compliance_standard
              - compliance_requirement

      UCF-GOV-5:
        # Security Planning
        checks:
          - id: gov5_security_planning
            event_types:
              - confluence_pages
              - confluence_page_versions
              - snow_policies
            resource_types:
              - grc_document
              - grc_document_version
              - itsm_policy

      UCF-GOV-6:
        # Documented Procedures & Operating Standards
        checks:
          - id: gov6_documentation
            event_types:
              - confluence_pages
            resource_types:
              - grc_document

  # ===========================================================================
  # UCF-RSK — Risk Management
  # Maps to: NIST RA/SR, SOC2 CC3/CC9, ISO A.5.29-A.5.31, ISO42001 A.5
  # ===========================================================================
  RSK:
    controls:
      UCF-RSK-1:
        # Risk Assessment
        checks:
          - id: rsk1_vuln_risk
            event_types:
              - vuln_export
              - host_detections
              - falcon_vulnerabilities
              - defender_vulnerabilities
              - wiz_vuln_findings
              - wiz_issues
            resource_types:
              - host
              - endpoint
              - vulnerability
          - id: rsk1_cspm_risk
            event_types:
              - prisma_alerts
              - scc_findings
              - defender_recommendations
            resource_types:
              - recommendation

      UCF-RSK-2:
        # Risk Treatment
        checks:
          - id: rsk2_treatment
            event_types:
              - defender_recommendations
              - wiz_issues
              - prisma_alerts
            resource_types:
              - recommendation

      UCF-RSK-3:
        # Risk Acceptance & Tolerance
        checks:
          - id: rsk3_risk_acceptance
            event_types:
              - snow_risks
            resource_types:
              - itsm_risk

      UCF-RSK-4:
        # Risk Monitoring & Review
        checks:
          - id: rsk4_monitoring
            event_types:
              - config_recorders
              - securityhub_hub
              - guardduty_detectors
              - policy_compliance
              - scc_findings
              - prisma_compliance
              - wiz_config_findings
            resource_types:
              - aws_config
              - securityhub
              - guardduty
              - compliance_standard

      UCF-RSK-5:
        # Supply Chain Risk
        checks:
          - id: rsk5_supply_chain
            event_types:
              - entra_service_principals
              - entra_app_registrations
              - okta_applications
              - wiz_config_findings
            resource_types:
              - entra_service_principal
              - entra_app_registration
              - okta_application

      UCF-RSK-6:
        # AI-Specific Risk Assessment
        checks:
          - id: rsk6_ai_risk
            event_types:
              - scc_findings
              - wiz_issues
              - prisma_alerts
              - monitor_alerts
              - defender_alerts
            resource_types:
              - recommendation
              - azure_monitor
              - azure_defender_alert

  # ===========================================================================
  # UCF-IAM — Identity & Access Management
  # Maps to: NIST AC/IA, SOC2 CC6, ISO A.5.15-A.5.18/A.8.2-A.8.5
  # ===========================================================================
  IAM:
    controls:
      UCF-IAM-1:
        # Account Lifecycle Management
        checks:
          - id: iam1_cloud_accounts
            event_types:
              - iam_credential_report
              - iam_users
              - iam_account_summary
            resource_types:
              - iam_user
              - iam_account
          - id: iam1_idp_accounts
            event_types:
              - okta_users
              - entra_users
            resource_types:
              - okta_user
              - entra_user
          - id: iam1_iga_accounts
            event_types:
              - sailpoint_identities
              - sailpoint_accounts
            resource_types:
              - sailpoint_identity
              - sailpoint_account

      UCF-IAM-2:
        # Authentication & MFA
        checks:
          - id: iam2_mfa
            event_types:
              - okta_factors
              - entra_conditional_access_policies
              - iam_credential_report
            resource_types:
              - okta_user_factors
              - entra_conditional_access_policy
              - iam_user
          - id: iam2_password_policy
            event_types:
              - iam_password_policy
              - okta_policies
            resource_types:
              - iam_password_policy
              - okta_policy
          - id: iam2_sign_in_risk
            event_types:
              - entra_sign_ins
              - entra_risky_users
              - okta_system_log
            resource_types:
              - entra_sign_in
              - entra_user
              - okta_event

      UCF-IAM-3:
        # Authorization & Access Enforcement
        checks:
          - id: iam3_access_enforcement
            event_types:
              - iam_users
              - gcp_iam_policies
              - okta_policies
              - entra_conditional_access_policies
            resource_types:
              - iam_policy
              - gcp_iam_binding
              - okta_policy
              - entra_conditional_access_policy

      UCF-IAM-4:
        # Least Privilege
        checks:
          - id: iam4_least_priv
            event_types:
              - iam_users
              - gcp_iam_policies
              - okta_groups
              - sailpoint_roles
              - sailpoint_entitlements
            resource_types:
              - iam_policy
              - iam_user
              - gcp_iam_binding
              - sailpoint_role
              - sailpoint_entitlement
          - id: iam4_segregation
            event_types:
              - sailpoint_roles
              - sailpoint_entitlements
              - cyberark_accounts
            resource_types:
              - sailpoint_role
              - sailpoint_entitlement
              - cyberark_account

      UCF-IAM-5:
        # Privileged Access Management
        checks:
          - id: iam5_pam
            event_types:
              - cyberark_accounts
              - cyberark_safes
              - cyberark_password_compliance
            resource_types:
              - cyberark_account
              - cyberark_safe
              - cyberark_compliance
          - id: iam5_privileged_cloud
            event_types:
              - iam_credential_report
              - iam_account_summary
              - gcp_iam_policies
            resource_types:
              - iam_user
              - iam_account
              - gcp_iam_binding
          - id: iam5_privileged_iga
            event_types:
              - sailpoint_roles
              - sailpoint_entitlements
            resource_types:
              - sailpoint_role
              - sailpoint_entitlement

      UCF-IAM-6:
        # Remote Access
        checks:
          - id: iam6_remote_access
            event_types:
              - okta_system_log
              - entra_sign_ins
              - entra_conditional_access_policies
              - falcon_zero_trust
            resource_types:
              - okta_event
              - entra_sign_in
              - entra_conditional_access_policy

      UCF-IAM-7:
        # Access Reviews & Recertification
        checks:
          - id: iam7_access_reviews
            event_types:
              - sailpoint_certifications
              - sailpoint_roles
              - sailpoint_entitlements
            resource_types:
              - sailpoint_certification
              - sailpoint_role
              - sailpoint_entitlement

      UCF-IAM-8:
        # Credential Management & Identity Proofing
        checks:
          - id: iam8_credentials
            event_types:
              - iam_credential_report
              - iam_account_summary
              - okta_users
              - entra_users
              - cyberark_accounts
              - cyberark_safes
            resource_types:
              - iam_user
              - iam_account
              - okta_user
              - entra_user
              - cyberark_account
              - cyberark_safe

  # ===========================================================================
  # UCF-HRS — Human Resources Security
  # Maps to: NIST AT/PS, SOC2 CC1, ISO A.6
  # ===========================================================================
  HRS:
    controls:
      UCF-HRS-1:
        # Personnel Screening
        checks:
          - id: hrs1_screening
            event_types:
              - workday_employees
              - workday_background_checks
            resource_types:
              - hr_employee
              - hr_background_check

      UCF-HRS-2:
        # Terms & Conditions of Employment
        checks:
          - id: hrs2_employment_terms
            event_types:
              - workday_agreements
            resource_types:
              - hr_agreement

      UCF-HRS-3:
        # Security Awareness & Training
        checks:
          - id: hrs3_training
            event_types:
              - sailpoint_certifications
              - kb4_training_campaigns
              - kb4_training_enrollments
              - kb4_phishing_results
            resource_types:
              - sailpoint_certification
              - training_campaign
              - training_enrollment
              - phishing_result

      UCF-HRS-4:
        # Termination & Access Revocation
        checks:
          - id: hrs4_termination_identity
            event_types:
              - sailpoint_identities
              - sailpoint_accounts
              - workday_employees
            resource_types:
              - sailpoint_identity
              - sailpoint_account
              - hr_employee
          - id: hrs4_termination_access
            event_types:
              - okta_users
              - entra_users
              - iam_users
            resource_types:
              - okta_user
              - entra_user
              - iam_user

      UCF-HRS-5:
        # Personnel Transfer & Role Change
        checks:
          - id: hrs5_transfer
            event_types:
              - sailpoint_identities
              - sailpoint_accounts
              - okta_users
              - entra_users
            resource_types:
              - sailpoint_identity
              - sailpoint_account
              - okta_user
              - entra_user

  # ===========================================================================
  # UCF-ASM — Asset Management
  # Maps to: NIST CM-8/MP, SOC2 A1, ISO A.5.9-A.5.13/A.7.10/A.8.6
  # ===========================================================================
  ASM:
    controls:
      UCF-ASM-1:
        # Asset Inventory
        checks:
          - id: asm1_cloud_inventory
            event_types:
              - iam_account_summary
              - prisma_assets
              - wiz_graph
            resource_types:
              - iam_account
              - azure_resource
          - id: asm1_endpoint_inventory
            event_types:
              - falcon_device_details
              - falcon_devices
              - defender_machines
              - s1_agents
            resource_types:
              - endpoint
              - agent
          - id: asm1_vuln_inventory
            event_types:
              - asset_export
              - asset_inventory
            resource_types:
              - host
          - id: asm1_identity_inventory
            event_types:
              - sailpoint_identities
              - sailpoint_accounts
              - okta_users
              - entra_users
            resource_types:
              - sailpoint_identity
              - sailpoint_account
              - okta_user
              - entra_user

      UCF-ASM-2:
        # Asset Classification & Labelling
        checks:
          - id: asm2_classification
            event_types:
              - s3_buckets
              - storage_buckets
              - storage_accounts
            resource_types:
              - s3_bucket
              - storage_bucket
              - storage_account

      UCF-ASM-3:
        # Acceptable Use
        checks:
          - id: asm3_acceptable_use
            event_types:
              - okta_policies
              - entra_conditional_access_policies
            resource_types:
              - okta_policy
              - entra_conditional_access_policy

      UCF-ASM-4:
        # Media Handling & Storage
        checks:
          - id: asm4_media
            event_types:
              - s3_buckets
              - storage_buckets
              - storage_accounts
            resource_types:
              - s3_bucket
              - storage_bucket
              - storage_account

      UCF-ASM-5:
        # Capacity Management
        checks:
          - id: asm5_capacity
            event_types:
              - splunk_index_health
              - sentinel_data_connectors
              - prisma_assets
              - asset_export
              - asset_inventory
            resource_types:
              - splunk_index
              - endpoint
              - host

      UCF-ASM-6:
        # Cloud Service Management
        checks:
          - id: asm6_cloud_posture
            event_types:
              - wiz_config_findings
              - wiz_issues
              - prisma_compliance
              - prisma_alerts
            resource_types:
              - compliance_standard
              - compliance_requirement
          - id: asm6_cloud_aws
            event_types:
              - securityhub_hub
              - config_recorders
              - guardduty_detectors
            resource_types:
              - securityhub
              - aws_config
              - guardduty
          - id: asm6_cloud_azure
            event_types:
              - policy_compliance
              - defender_alerts
            resource_types:
              - azure_resource
              - azure_defender_alert
          - id: asm6_cloud_gcp
            event_types:
              - scc_findings
              - gcp_iam_policies
            resource_types:
              - gcp_iam_binding

  # ===========================================================================
  # UCF-PHY — Physical Security
  # Maps to: NIST PE, ISO A.7
  # ===========================================================================
  PHY:
    controls:
      UCF-PHY-1:
        # Physical Security Perimeters
        checks:
          - id: phy1_perimeters
            event_types:
              - verkada_doors
            resource_types:
              - physical_door

      UCF-PHY-2:
        # Physical Entry Controls
        checks:
          - id: phy2_monitoring
            event_types:
              - cyberark_recordings
              - verkada_access_events
            resource_types:
              - physical_access_event

      UCF-PHY-3:
        # Equipment Protection & Off-premises Assets
        checks:
          - id: phy3_offpremises
            event_types:
              - falcon_device_details
              - s1_agents
            resource_types:
              - endpoint
              - agent

      UCF-PHY-4:
        # Environmental Controls
        checks:
          - id: phy4_environmental_protection
            event_types:
              - policy_compliance
              - config_recorders
            resource_types:
              - azure_resource
              - aws_config

  # ===========================================================================
  # UCF-NET — Network Security
  # Maps to: NIST AC-17/SC-7, SOC2 CC6.6, ISO A.8.20-A.8.23
  # ===========================================================================
  NET:
    controls:
      UCF-NET-1:
        # Boundary Protection
        checks:
          - id: net1_boundary_aws
            event_types:
              - ec2_security_groups
              - ec2_network_acls
            resource_types:
              - ec2_security_group
              - ec2_network_acl
          - id: net1_boundary_azure
            event_types:
              - network_security_groups
            resource_types:
              - network_security_group
          - id: net1_boundary_gcp
            event_types:
              - compute_firewall_rules
            resource_types:
              - compute_firewall_rule

      UCF-NET-2:
        # Network Segmentation
        checks:
          - id: net2_segmentation
            event_types:
              - ec2_network_acls
              - ec2_security_groups
              - network_security_groups
              - compute_firewall_rules
            resource_types:
              - ec2_network_acl
              - ec2_security_group
              - network_security_group
              - compute_firewall_rule

      UCF-NET-3:
        # Firewall Management
        checks:
          - id: net3_firewall
            event_types:
              - ec2_security_groups
              - network_security_groups
              - compute_firewall_rules
            resource_types:
              - ec2_security_group
              - network_security_group
              - compute_firewall_rule

      UCF-NET-4:
        # Wireless Security
        checks:
          - id: net4_wireless_security
            event_types:
              - policy_compliance
              - config_recorders
              - wiz_config_findings
            resource_types:
              - azure_resource
              - aws_config

      UCF-NET-5:
        # Remote Access & VPN
        checks:
          - id: net5_remote_access
            event_types:
              - entra_conditional_access_policies
              - okta_policies
              - falcon_zero_trust
            resource_types:
              - entra_conditional_access_policy
              - okta_policy

      UCF-NET-6:
        # Network Monitoring
        checks:
          - id: net6_monitoring
            event_types:
              - guardduty_detectors
              - scc_findings
              - wiz_config_findings
              - monitor_alerts
            resource_types:
              - guardduty
              - azure_monitor

      UCF-NET-7:
        # DNS & DDoS Protection
        checks:
          - id: net7_web_filtering
            event_types:
              - ec2_security_groups
              - network_security_groups
              - falcon_zero_trust
            resource_types:
              - ec2_security_group
              - network_security_group

  # ===========================================================================
  # UCF-EPP — Endpoint Protection
  # Maps to: NIST SI-3/AC-19, SOC2 CC6.8, ISO A.8.1/A.8.7
  # ===========================================================================
  EPP:
    controls:
      UCF-EPP-1:
        # Endpoint Device Management
        checks:
          - id: epp1_endpoint_edr
            event_types:
              - falcon_device_details
              - falcon_devices
              - s1_agents
              - defender_machines
            resource_types:
              - endpoint
              - agent
          - id: epp1_endpoint_compliance
            event_types:
              - falcon_zero_trust
              - s1_policies
              - falcon_sensor_policies
            resource_types:
              - endpoint
              - policy

      UCF-EPP-2:
        # Malware Protection
        checks:
          - id: epp2_malware_detection
            event_types:
              - falcon_detection_details
              - s1_threats
              - defender_alerts
            resource_types:
              - endpoint
          - id: epp2_malware_agents
            event_types:
              - falcon_device_details
              - s1_agents
              - elastic_agent_status
            resource_types:
              - agent
              - endpoint_fleet

      UCF-EPP-3:
        # Agent Health & Coverage
        checks:
          - id: epp3_agent_health
            event_types:
              - falcon_device_details
              - falcon_devices
              - s1_agents
              - elastic_agent_status
              - agent_status
            resource_types:
              - agent
              - endpoint
              - endpoint_fleet

      UCF-EPP-4:
        # Mobile Device Management
        checks:
          - id: epp4_mobile
            event_types:
              - falcon_zero_trust
              - entra_conditional_access_policies
              - intune_devices
              - intune_compliance_states
            resource_types:
              - entra_conditional_access_policy
              - mdm_device
              - mdm_compliance_state

      UCF-EPP-5:
        # Application Control & Software Restrictions
        checks:
          - id: epp5_app_control
            event_types:
              - s1_applications
              - falcon_device_details
            resource_types:
              - endpoint
              - agent

  # ===========================================================================
  # UCF-DAT — Data Protection
  # Maps to: NIST SC-8/SC-12/SC-28, SOC2 C1, ISO A.8.10-A.8.12/A.8.24
  # ===========================================================================
  DAT:
    controls:
      UCF-DAT-1:
        # Encryption at Rest
        checks:
          - id: dat1_encryption_rest
            event_types:
              - s3_buckets
              - storage_accounts
              - storage_buckets
            resource_types:
              - s3_bucket
              - storage_account
              - storage_bucket

      UCF-DAT-2:
        # Encryption in Transit
        checks:
          - id: dat2_encryption_transit
            event_types:
              - ec2_security_groups
              - network_security_groups
              - s3_buckets
            resource_types:
              - ec2_security_group
              - network_security_group
              - s3_bucket

      UCF-DAT-3:
        # Key Management
        checks:
          - id: dat3_key_mgmt
            event_types:
              - key_vault
            resource_types:
              - key_vault

      UCF-DAT-4:
        # Data Classification
        checks:
          - id: dat4_classification
            event_types:
              - s3_buckets
              - storage_buckets
              - storage_accounts
              - prisma_assets
            resource_types:
              - s3_bucket
              - storage_bucket
              - storage_account

      UCF-DAT-5:
        # Data Retention
        checks:
          - id: dat5_retention
            event_types:
              - s3_buckets
              - storage_accounts
              - storage_buckets
            resource_types:
              - s3_bucket
              - storage_account
              - storage_bucket

      UCF-DAT-6:
        # Data Disposal & Deletion
        checks:
          - id: dat6_disposal
            event_types:
              - s3_buckets
              - storage_accounts
              - storage_buckets
              - key_vault
            resource_types:
              - s3_bucket
              - storage_account
              - storage_bucket
              - key_vault

      UCF-DAT-7:
        # Data Loss Prevention
        checks:
          - id: dat7_dlp
            event_types:
              - ec2_security_groups
              - network_security_groups
              - s3_buckets
              - wiz_config_findings
              - purview_dlp_alerts
              - purview_dlp_policies
            resource_types:
              - ec2_security_group
              - network_security_group
              - s3_bucket
              - dlp_alert
              - dlp_policy

  # ===========================================================================
  # UCF-LOG — Logging & Monitoring
  # Maps to: NIST AU, SOC2 CC7.1-CC7.3, ISO A.8.15-A.8.17
  # ===========================================================================
  LOG:
    controls:
      UCF-LOG-1:
        # Audit Logging
        checks:
          - id: log1_cloud_logging
            event_types:
              - cloudtrail_trails
              - audit_logs
              - activity_log
            resource_types:
              - cloudtrail
              - gcp_audit
              - azure_activity
          - id: log1_idp_logging
            event_types:
              - okta_system_log
              - entra_sign_ins
              - entra_directory_audits
            resource_types:
              - okta_event
              - entra_sign_in
              - entra_audit

      UCF-LOG-2:
        # Log Review & Analysis
        checks:
          - id: log2_siem_analysis
            event_types:
              - sentinel_incidents
              - sentinel_analytics_rules
              - splunk_notable_events
              - splunk_correlation_rules
              - elastic_security_alerts
              - elastic_detection_rules
            resource_types:
              - sentinel_incident
              - sentinel_analytics_rule
              - splunk_notable_event
              - splunk_correlation_rule
              - elastic_security_alert
              - elastic_detection_rule

      UCF-LOG-3:
        # Log Protection & Integrity
        checks:
          - id: log3_protection
            event_types:
              - cloudtrail_trails
              - s3_buckets
              - config_recorders
            resource_types:
              - cloudtrail
              - s3_bucket
              - aws_config

      UCF-LOG-4:
        # Time Synchronization
        checks:
          - id: log4_clock_sync
            event_types:
              - cloudtrail_trails
              - audit_logs
            resource_types:
              - cloudtrail
              - gcp_audit

      UCF-LOG-5:
        # Continuous Monitoring
        checks:
          - id: log5_monitoring
            event_types:
              - config_recorders
              - securityhub_hub
              - guardduty_detectors
              - policy_compliance
              - scc_findings
              - prisma_compliance
              - wiz_config_findings
            resource_types:
              - aws_config
              - securityhub
              - guardduty
              - compliance_standard

      UCF-LOG-6:
        # SIEM Operations
        checks:
