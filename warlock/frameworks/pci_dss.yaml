    name: Install and Maintain Network Security Controls
    controls:
      R1.1:
        checks:
        - id: pci_1_1_network_security_controls
          event_types:
          - ec2_security_groups
          - network_security_groups
          - compute_firewall_rules
          resource_types:
          - ec2_security_group
          - network_security_group
          - compute_firewall_rule
        monitoring_frequency: quarterly
      R1.2:
        checks:
        - id: pci_1_2_restrict_inbound_outbound
          event_types:
          - ec2_security_groups
          - ec2_network_acls
          - network_security_groups
          - compute_firewall_rules
          resource_types:
          - ec2_security_group
          - ec2_network_acl
          - network_security_group
          - compute_firewall_rule
        monitoring_frequency: quarterly
      R1.3:
        checks:
        - id: pci_1_3_restrict_cardholder_access
          event_types:
          - ec2_security_groups
          - ec2_network_acls
          - network_security_groups
          - compute_firewall_rules
          resource_types:
          - ec2_security_group
          - ec2_network_acl
          - network_security_group
          - compute_firewall_rule
        monitoring_frequency: quarterly
      R1.4:
        checks:
        - id: pci_1_4_personal_firewall
          event_types:
          - falcon_device_details
          - defender_machines
          - s1_agents
          resource_types:
          - endpoint
          - endpoint_fleet
        monitoring_frequency: quarterly
      R1.5:
        checks:
        - id: pci_1_5_security_controls_managed
          event_types:
          - ec2_security_groups
          - network_security_groups
          - compute_firewall_rules
          - config_recorders
          resource_types:
          - ec2_security_group
          - network_security_group
          - compute_firewall_rule
          - aws_config
        monitoring_frequency: quarterly
  R2:
    name: Apply Secure Configurations to All System Components
