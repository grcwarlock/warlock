            event_types:
              - workday_agreements
            resource_types:
              - hr_agreement

      A.6.3:
        # Information security awareness, education and training
        checks:
          - id: a63_security_training
            event_types:
              - sailpoint_certifications
              - kb4_training_enrollments
            resource_types:
              - sailpoint_certification
              - training_enrollment

      A.6.4:
