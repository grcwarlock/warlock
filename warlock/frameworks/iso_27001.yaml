framework_id: iso_27001

control_families:
  # ---------------------------------------------------------------------------
  # A.5 — Organizational Controls (A.5.1 – A.5.37)
  # ---------------------------------------------------------------------------
  A5:
    controls:
      A.5.1:
        # Policies for information security
        checks:
          - id: a51_security_policies
            event_types:
              - okta_policies
              - entra_conditional_access_policies
              - prisma_policies
              - s1_policies
              - falcon_sensor_policies
            resource_types:
              - okta_policy
              - entra_conditional_access_policy
              - policy

      A.5.2:
        # Information security roles and responsibilities
        checks:
          - id: a52_security_roles
            event_types:
              - sailpoint_roles
              - gcp_iam_policies
            resource_types:
              - sailpoint_role
              - gcp_iam_binding
              - iam_policy

      A.5.3:
        # Segregation of duties
        checks:
          - id: a53_segregation_of_duties
            event_types:
              - sailpoint_roles
              - sailpoint_entitlements
              - gcp_iam_policies
              - cyberark_accounts
            resource_types:
              - sailpoint_role
              - sailpoint_entitlement
              - gcp_iam_binding
              - cyberark_account

      A.5.4:
        # Management responsibilities
        checks:
          - id: a54_management_responsibilities
            event_types:
              - sailpoint_certifications
            resource_types:
              - sailpoint_certification

      A.5.5:
        # Contact with authorities
        checks:
          - id: a55_contact_authorities
            event_types:
              - confluence_pages
            resource_types:
              - grc_document

      A.5.6:
        # Contact with special interest groups
        checks:
          - id: a56_contact_interest_groups
            event_types:
              - confluence_pages
            resource_types:
              - grc_document

      A.5.7:
        # Threat intelligence
        checks:
          - id: a57_threat_intel_aws
            event_types:
              - guardduty_detectors
              - securityhub_hub
            resource_types:
              - guardduty
              - securityhub
          - id: a57_threat_intel_cloud
            event_types:
              - scc_findings
              - defender_alerts
              - wiz_issues
              - prisma_alerts
            resource_types:
              - azure_defender_alert
              - vulnerability
          - id: a57_threat_intel_edr
            event_types:
              - falcon_detection_details
              - s1_threats
              - defender_alerts
            resource_types:
              - endpoint

      A.5.8:
        # Information security in project management
        checks:
          - id: a58_security_project_mgmt
            event_types:
              - confluence_pages
              - snow_change_requests
            resource_types:
              - grc_document
              - itsm_change_request

      A.5.9:
        # Inventory of information and other associated assets
        checks:
          - id: a59_asset_inventory_cloud
            event_types:
              - iam_account_summary
              - prisma_assets
              - wiz_graph
            resource_types:
              - iam_account
              - azure_resource
          - id: a59_asset_inventory_endpoints
            event_types:
              - falcon_device_details
              - falcon_devices
              - defender_machines
              - s1_agents
            resource_types:
              - endpoint
              - agent
          - id: a59_asset_inventory_vuln
            event_types:
              - asset_export
              - asset_inventory
            resource_types:
              - host
          - id: a59_asset_inventory_identity
            event_types:
              - sailpoint_identities
              - sailpoint_accounts
              - okta_users
              - entra_users
            resource_types:
              - sailpoint_identity
              - sailpoint_account
              - okta_user
              - entra_user

      A.5.10:
        # Acceptable use of information and other associated assets
        checks:
          - id: a510_acceptable_use
            event_types:
              - okta_policies
              - entra_conditional_access_policies
            resource_types:
              - okta_policy
              - entra_conditional_access_policy

      A.5.11:
        # Return of assets
        checks:
          - id: a511_return_of_assets
            event_types:
              - sailpoint_identities
              - okta_users
              - entra_users
            resource_types:
              - sailpoint_identity
              - okta_user
              - entra_user

      A.5.12:
        # Classification of information
        checks:
          - id: a512_classification
            event_types:
              - s3_buckets
              - storage_buckets
              - storage_accounts
            resource_types:
              - s3_bucket
              - storage_bucket
              - storage_account

      A.5.13:
        # Labelling of information
        checks:
          - id: a513_labelling
            event_types:
              - s3_buckets
              - storage_buckets
              - storage_accounts
            resource_types:
              - s3_bucket
              - storage_bucket
              - storage_account

      A.5.14:
        # Information transfer
        checks:
          - id: a514_info_transfer
            event_types:
              - ec2_security_groups
              - network_security_groups
              - compute_firewall_rules
            resource_types:
              - ec2_security_group
              - network_security_group
              - compute_firewall_rule

      A.5.15:
        # Access control
        checks:
          - id: a515_access_control_iam
            event_types:
              - iam_credential_report
              - iam_users
              - gcp_iam_policies
            resource_types:
              - iam_user
              - iam_policy
              - gcp_iam_binding
          - id: a515_access_control_idp
            event_types:
              - okta_users
              - okta_policies
              - entra_users
              - entra_conditional_access_policies
            resource_types:
              - okta_user
              - okta_policy
              - entra_user
              - entra_conditional_access_policy
          - id: a515_access_control_pam
            event_types:
              - cyberark_accounts
              - cyberark_safes
            resource_types:
              - cyberark_account
              - cyberark_safe

      A.5.16:
        # Identity management
        checks:
          - id: a516_identity_mgmt_cloud
            event_types:
              - iam_users
              - iam_credential_report
              - gcp_iam_policies
            resource_types:
              - iam_user
              - gcp_iam_binding
          - id: a516_identity_mgmt_idp
            event_types:
              - okta_users
              - okta_groups
              - entra_users
            resource_types:
              - okta_user
              - entra_user
          - id: a516_identity_mgmt_iga
            event_types:
              - sailpoint_identities
              - sailpoint_accounts
            resource_types:
              - sailpoint_identity
              - sailpoint_account

      A.5.17:
        # Authentication information
        checks:
          - id: a517_password_policy
            event_types:
              - iam_password_policy
              - okta_policies
            resource_types:
              - iam_password_policy
              - okta_policy
          - id: a517_mfa
            event_types:
              - okta_factors
              - entra_conditional_access_policies
              - iam_credential_report
            resource_types:
              - okta_user_factors
              - entra_conditional_access_policy
              - iam_user
          - id: a517_pam_passwords
            event_types:
              - cyberark_password_compliance
            resource_types:
              - cyberark_compliance

      A.5.18:
        # Access rights
        checks:
          - id: a518_access_rights_iga
            event_types:
              - sailpoint_roles
              - sailpoint_entitlements
              - sailpoint_certifications
            resource_types:
              - sailpoint_role
              - sailpoint_entitlement
              - sailpoint_certification
          - id: a518_access_rights_cloud
            event_types:
              - gcp_iam_policies
              - iam_users
            resource_types:
              - gcp_iam_binding
              - iam_policy
          - id: a518_access_rights_pam
            event_types:
              - cyberark_accounts
              - cyberark_safes
            resource_types:
              - cyberark_account
              - cyberark_safe

      A.5.19:
        # Information security in supplier relationships
        checks:
          - id: a519_supplier_security
            event_types:
              - entra_service_principals
              - entra_app_registrations
              - okta_applications
            resource_types:
              - entra_service_principal
              - entra_app_registration
              - okta_application

      A.5.20:
        # Addressing information security within supplier agreements
        checks:
          - id: a520_supplier_agreements
            event_types:
              - entra_service_principals
              - entra_app_registrations
            resource_types:
              - entra_service_principal
              - entra_app_registration

      A.5.21:
        # Managing information security in the ICT supply chain
        checks:
          - id: a521_supply_chain
            event_types:
              - entra_service_principals
              - okta_applications
              - wiz_config_findings
            resource_types:
              - entra_service_principal
              - okta_application

      A.5.22:
        # Monitoring, review and change management of supplier services
        checks:
          - id: a522_supplier_monitoring
            event_types:
              - entra_directory_audits
              - okta_system_log
            resource_types:
              - entra_audit
              - okta_event

      A.5.23:
        # Information security for use of cloud services
        checks:
          - id: a523_cloud_security_posture
            event_types:
              - wiz_config_findings
              - wiz_issues
              - prisma_compliance
              - prisma_alerts
            resource_types:
              - compliance_standard
              - compliance_requirement
          - id: a523_cloud_security_aws
            event_types:
              - securityhub_hub
              - config_recorders
              - guardduty_detectors
            resource_types:
              - securityhub
              - aws_config
              - guardduty
          - id: a523_cloud_security_azure
            event_types:
              - policy_compliance
              - defender_alerts
            resource_types:
              - azure_resource
              - azure_defender_alert
          - id: a523_cloud_security_gcp
            event_types:
              - scc_findings
              - gcp_iam_policies
            resource_types:
              - gcp_iam_binding

      A.5.24:
        # Information security incident management planning and preparation
        checks:
          - id: a524_incident_planning_siem
            event_types:
              - sentinel_analytics_rules
              - splunk_correlation_rules
              - elastic_detection_rules
            resource_types:
              - sentinel_analytics_rule
              - splunk_correlation_rule
              - elastic_detection_rule
          - id: a524_incident_planning_edr
            event_types:
              - falcon_sensor_policies
              - s1_policies
            resource_types:
              - policy

      A.5.25:
        # Assessment and decision on information security events
        checks:
          - id: a525_event_assessment_siem
            event_types:
              - sentinel_incidents
              - splunk_notable_events
              - elastic_security_alerts
            resource_types:
              - sentinel_incident
              - splunk_notable_event
              - elastic_security_alert
          - id: a525_event_assessment_edr
            event_types:
              - falcon_detection_details
              - s1_threats
              - defender_alerts
            resource_types:
              - endpoint

      A.5.26:
        # Response to information security incidents
        checks:
          - id: a526_incident_response
            event_types:
              - sentinel_incidents
              - splunk_notable_events
              - elastic_security_alerts
              - falcon_detection_details
              - s1_threats
            resource_types:
              - sentinel_incident
              - splunk_notable_event
              - elastic_security_alert
              - endpoint

      A.5.27:
        # Learning from information security incidents
        checks:
          - id: a527_incident_learning
            event_types:
              - sentinel_incidents
              - splunk_notable_events
              - sentinel_hunting_queries
            resource_types:
              - sentinel_incident
              - splunk_notable_event

      A.5.28:
        # Collection of evidence
        checks:
          - id: a528_evidence_collection
            event_types:
              - cloudtrail_trails
              - audit_logs
              - activity_log
              - okta_system_log
              - entra_directory_audits
            resource_types:
              - cloudtrail
              - gcp_audit
              - azure_activity
              - okta_event
              - entra_audit

      A.5.29:
        # Information security during disruption
        checks:
          - id: a529_disruption_security
            event_types:
              - sentinel_data_connectors
              - splunk_index_health
              - elastic_agent_status
            resource_types:
              - splunk_index

      A.5.30:
        # ICT readiness for business continuity
        checks:
          - id: a530_ict_readiness
            event_types:
              - sentinel_data_connectors
              - splunk_index_health
              - elastic_agent_status
              - falcon_device_details
              - s1_agents
            resource_types:
              - splunk_index
              - endpoint
              - agent

      A.5.31:
        # Legal, statutory, regulatory and contractual requirements
        checks:
          - id: a531_legal_compliance
            event_types:
              - prisma_compliance
              - policy_compliance
              - compliance_audits
              - compliance_posture
            resource_types:
              - compliance_standard
              - compliance_requirement

      A.5.32:
        # Intellectual property rights
        checks:
          - id: a532_intellectual_property
            event_types:
              - confluence_pages
              - snow_policies
            resource_types:
              - grc_document
              - itsm_policy

      A.5.33:
        # Protection of records
        checks:
          - id: a533_record_protection
            event_types:
              - s3_buckets
              - storage_buckets
              - storage_accounts
              - key_vault
            resource_types:
              - s3_bucket
              - storage_bucket
              - storage_account
              - key_vault

      A.5.34:
        # Privacy and protection of PII
        checks:
          - id: a534_pii_access_control
            event_types:
              - okta_policies
              - entra_conditional_access_policies
              - cyberark_accounts
            resource_types:
              - okta_policy
              - entra_conditional_access_policy
              - cyberark_account
          - id: a534_pii_encryption
            event_types:
              - s3_buckets
              - storage_accounts
              - key_vault
            resource_types:
              - s3_bucket
              - storage_account
              - key_vault

      A.5.35:
        # Independent review of information security
        checks:
          - id: a535_independent_review
            event_types:
              - prisma_compliance
              - compliance_audits
              - compliance_posture
            resource_types:
              - compliance_standard
              - compliance_requirement

      A.5.36:
        # Compliance with policies, rules and standards for information security
        checks:
          - id: a536_policy_compliance
            event_types:
              - policy_compliance
              - prisma_compliance
              - wiz_config_findings
              - compliance_posture
            resource_types:
              - compliance_standard
              - compliance_requirement
              - policy

      A.5.37:
        # Documented operating procedures
        checks:
          - id: a537_documented_procedures
            event_types:
              - confluence_pages
            resource_types:
              - grc_document

  # ---------------------------------------------------------------------------
  # A.6 — People Controls (A.6.1 – A.6.8)
