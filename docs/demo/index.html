<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warlock GRC Platform — Interactive Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ================================================================
   RESET & ROOT
   ================================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-900:#09090b;--bg-800:#18181b;--bg-700:#27272a;--bg-600:#3f3f46;--bg-500:#52525b;
  --text-100:#fafafa;--text-200:#e4e4e7;--text-300:#a1a1aa;--text-400:#71717a;
  --purple:#8b5cf6;--purple-dim:#7c3aed;--purple-glow:rgba(139,92,246,0.15);
  --red:#ef4444;--orange:#f97316;--yellow:#eab308;--green:#22c55e;--blue:#3b82f6;--cyan:#06b6d4;
  --sidebar-w:240px;--topbar-h:56px;
  --radius:6px;--radius-lg:12px;
  --panel-w:520px;
}
html{font-size:14px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-900);color:var(--text-200);overflow:hidden;height:100vh}
.mono{font-family:'JetBrains Mono',monospace}

/* ================================================================
   SCROLLBAR
   ================================================================ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg-600);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--bg-500)}

/* ================================================================
   LAYOUT SKELETON
   ================================================================ */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg-800);border-right:1px solid var(--bg-700);display:flex;flex-direction:column;z-index:100;overflow:hidden}
#topbar{position:fixed;left:var(--sidebar-w);top:0;right:0;height:var(--topbar-h);background:var(--bg-800);border-bottom:1px solid var(--bg-700);display:flex;align-items:center;padding:0 24px;z-index:90;gap:16px}
#main{position:fixed;left:var(--sidebar-w);top:var(--topbar-h);right:0;bottom:0;overflow-y:auto;padding:24px}

/* ================================================================
   SIDEBAR
   ================================================================ */
.logo{padding:14px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bg-700);flex-shrink:0}
.logo svg{width:26px;height:26px}
.logo span{font-weight:700;font-size:1.1rem;color:var(--text-100);letter-spacing:-0.5px}
.logo .version{font-size:0.65rem;color:var(--text-400);margin-left:4px;font-weight:400}
.nav-section{padding:14px 12px 6px;font-size:0.65rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-400);font-weight:600;flex-shrink:0}
.nav-scroll{flex:1;overflow-y:auto;padding:2px 8px 12px}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:var(--radius);color:var(--text-300);cursor:pointer;font-size:0.85rem;font-weight:500;transition:all 0.15s;margin-bottom:1px;user-select:none;white-space:nowrap}
.nav-item:hover{background:var(--bg-700);color:var(--text-200)}
.nav-item.active{background:var(--purple-glow);color:var(--purple);font-weight:600}
.nav-item .icon{width:18px;text-align:center;flex-shrink:0;font-size:0.95rem}
.nav-item .badge{margin-left:auto;background:var(--bg-700);color:var(--text-300);font-size:0.65rem;padding:2px 7px;border-radius:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.nav-item.active .badge{background:rgba(139,92,246,0.2);color:var(--purple)}

/* ================================================================
   TOPBAR
   ================================================================ */
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg-700);border:1px solid var(--bg-600);border-radius:var(--radius);padding:6px 12px;flex:1;max-width:420px}
.search-box input{background:none;border:none;outline:none;color:var(--text-200);font-size:0.85rem;width:100%;font-family:'Inter',sans-serif}
.search-box input::placeholder{color:var(--text-400)}
.topbar-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.top-btn{background:var(--bg-700);border:1px solid var(--bg-600);color:var(--text-300);padding:6px 12px;border-radius:var(--radius);cursor:pointer;font-size:0.8rem;font-family:'Inter',sans-serif;transition:all 0.15s}
.top-btn:hover{background:var(--bg-600);color:var(--text-100)}
.env-badge{background:rgba(34,197,94,0.15);color:var(--green);font-size:0.7rem;padding:4px 10px;border-radius:10px;font-weight:600;font-family:'JetBrains Mono',monospace}

/* ================================================================
   VIEW CONTAINERS
   ================================================================ */
.view{display:none}
.view.active{display:block}

/* ================================================================
   PAGE HEADERS
   ================================================================ */
.page-hdr{margin-bottom:20px}
.page-hdr h1{font-size:1.5rem;font-weight:700;color:var(--text-100);margin-bottom:4px}
.page-hdr p{color:var(--text-400);font-size:0.85rem}

/* ================================================================
   STAT CARDS
   ================================================================ */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg-800);border:1px solid var(--bg-700);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all 0.2s}
.stat-card:hover{border-color:var(--purple);transform:translateY(-1px)}
.stat-card .label{font-size:0.75rem;color:var(--text-400);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.stat-card .value{font-size:1.6rem;font-weight:700;color:var(--text-100);font-family:'JetBrains Mono',monospace}
.stat-card .sub{font-size:0.75rem;color:var(--text-400);margin-top:4px}

/* ================================================================
   FILTER PILLS
   ================================================================ */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.pill{padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:500;cursor:pointer;transition:all 0.15s;border:1px solid var(--bg-600);background:var(--bg-800);color:var(--text-300);user-select:none}
.pill:hover{border-color:var(--text-400);color:var(--text-200)}
.pill.active{background:var(--purple-glow);border-color:var(--purple);color:var(--purple);font-weight:600}
.pill .count{font-family:'JetBrains Mono',monospace;font-size:0.7rem;margin-left:4px;opacity:0.7}

/* ================================================================
   DATA TABLES
   ================================================================ */
.tbl-wrap{overflow-x:auto;border:1px solid var(--bg-700);border-radius:var(--radius-lg);background:var(--bg-800)}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
thead th{text-align:left;padding:10px 14px;color:var(--text-400);font-weight:600;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--bg-700);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;background:var(--bg-800);z-index:1}
thead th:hover{color:var(--text-200)}
thead th.sorted-asc::after{content:' \u25B2';font-size:0.6rem}
thead th.sorted-desc::after{content:' \u25BC';font-size:0.6rem}
tbody tr{border-bottom:1px solid var(--bg-700);cursor:pointer;transition:background 0.1s}
tbody tr:hover{background:var(--bg-700)}
tbody tr:last-child{border-bottom:none}
td{padding:10px 14px;color:var(--text-200);white-space:nowrap}

/* ================================================================
   BADGES
   ================================================================ */
.badge-sev{display:inline-block;padding:2px 10px;border-radius:10px;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.badge-critical{background:rgba(239,68,68,0.15);color:var(--red)}
.badge-high{background:rgba(249,115,22,0.15);color:var(--orange)}
.badge-medium{background:rgba(234,179,8,0.15);color:var(--yellow)}
.badge-low{background:rgba(59,130,246,0.15);color:var(--blue)}
.badge-info{background:rgba(6,182,212,0.15);color:var(--cyan)}
.badge-status{display:inline-block;padding:2px 10px;border-radius:10px;font-size:0.7rem;font-weight:600}
.badge-pass,.badge-active,.badge-running,.badge-completed,.badge-fixed,.badge-resolved,.badge-remediated{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-fail,.badge-critical-s,.badge-terminated,.badge-overdue,.badge-expired{background:rgba(239,68,68,0.15);color:var(--red)}
.badge-partial,.badge-warning,.badge-investigating,.badge-in_progress,.badge-expiring,.badge-leave,.badge-stopped{background:rgba(234,179,8,0.15);color:var(--yellow)}
.badge-new,.badge-open,.badge-sent{background:rgba(139,92,246,0.15);color:var(--purple)}
.badge-suspended,.badge-deprovisioned,.badge-risk_accepted{background:rgba(113,113,122,0.15);color:var(--text-400)}

/* ================================================================
   DETAIL PANEL (slide-in from right)
   ================================================================ */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.2s}
.panel-overlay.open{opacity:1;pointer-events:auto}
.detail-panel{position:fixed;right:0;top:0;bottom:0;width:var(--panel-w);max-width:90vw;background:var(--bg-800);border-left:1px solid var(--bg-700);z-index:201;transform:translateX(100%);transition:transform 0.25s ease;overflow-y:auto;padding:0}
.detail-panel.open{transform:translateX(0)}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bg-700);position:sticky;top:0;background:var(--bg-800);z-index:1}
.panel-header h2{font-size:1.1rem;font-weight:600;color:var(--text-100)}
.panel-close{background:none;border:none;color:var(--text-400);cursor:pointer;font-size:1.3rem;padding:4px 8px;border-radius:var(--radius);transition:all 0.15s}
.panel-close:hover{background:var(--bg-700);color:var(--text-100)}
.panel-body{padding:20px}
.panel-section{margin-bottom:20px}
.panel-section h3{font-size:0.8rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-400);margin-bottom:10px;font-weight:600}
.panel-field{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bg-700);font-size:0.85rem}
.panel-field .lbl{color:var(--text-400)}
.panel-field .val{color:var(--text-200);text-align:right;font-family:'JetBrains Mono',monospace;font-size:0.8rem}

/* ================================================================
   CLI COMMANDS
   ================================================================ */
.cli-section{background:var(--bg-900);border:1px solid var(--bg-700);border-radius:var(--radius);padding:12px;margin-top:12px}
.cli-section h4{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-400);margin-bottom:10px}
.cli-cmd{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg-800);border-radius:var(--radius);margin-bottom:6px;font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--green);cursor:pointer;transition:all 0.15s;border:1px solid transparent}
.cli-cmd:hover{border-color:var(--bg-600);background:var(--bg-700)}
.cli-cmd .prompt{color:var(--text-400);user-select:none}
.cli-cmd .copy-btn{margin-left:auto;font-size:0.65rem;color:var(--text-400);font-family:'Inter',sans-serif;padding:2px 8px;border-radius:4px;background:var(--bg-700);opacity:0;transition:opacity 0.15s;flex-shrink:0}
.cli-cmd:hover .copy-btn{opacity:1}
.cli-cmd .copy-btn.copied{color:var(--green);opacity:1}

/* ================================================================
   AI ANALYSIS BOX
   ================================================================ */
.ai-box{background:linear-gradient(135deg,rgba(139,92,246,0.08),rgba(6,182,212,0.05));border:1px solid rgba(139,92,246,0.2);border-radius:var(--radius-lg);padding:16px;margin-top:12px}
.ai-box .ai-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ai-box .ai-hdr .ai-icon{font-size:1rem}
.ai-box .ai-hdr .ai-title{font-size:0.85rem;font-weight:600;color:var(--purple)}
.ai-box .ai-hdr .ai-conf{margin-left:auto;font-size:0.75rem;font-family:'JetBrains Mono',monospace;color:var(--cyan)}
.ai-box .ai-body{font-size:0.82rem;color:var(--text-300);line-height:1.6}
.ai-box .ai-body ul{padding-left:16px;margin:8px 0}
.ai-box .ai-body li{margin-bottom:4px}
.ai-box .ai-rec{margin-top:10px;padding:10px;background:rgba(34,197,94,0.08);border-radius:var(--radius);font-size:0.82rem;color:var(--green)}

/* ================================================================
   FRAMEWORK CARDS (Compliance view)
   ================================================================ */
.fw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:20px}
.fw-card{background:var(--bg-800);border:1px solid var(--bg-700);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all 0.2s}
.fw-card:hover{border-color:var(--purple);transform:translateY(-1px)}
.fw-card .fw-name{font-weight:600;color:var(--text-100);font-size:0.95rem;margin-bottom:2px}
.fw-card .fw-cat{font-size:0.7rem;color:var(--text-400);text-transform:uppercase;letter-spacing:0.5px}
.fw-card .fw-score{font-size:2rem;font-weight:700;font-family:'JetBrains Mono',monospace;margin:10px 0 6px}
.fw-bar{height:6px;background:var(--bg-700);border-radius:3px;overflow:hidden;margin-top:8px}
.fw-bar-fill{height:100%;border-radius:3px;transition:width 0.5s}
.fw-stats{display:flex;gap:12px;margin-top:10px;font-size:0.75rem}
.fw-stats span{display:flex;align-items:center;gap:4px}
.fw-stats .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ================================================================
   DASHBOARD SPECIFICS
   ================================================================ */
.pipeline-flow{display:flex;align-items:center;gap:0;margin-bottom:20px;overflow-x:auto;padding:16px 0}
.pipeline-stage{background:var(--bg-800);border:1px solid var(--bg-700);border-radius:var(--radius-lg);padding:14px 20px;text-align:center;cursor:pointer;transition:all 0.2s;min-width:140px;flex-shrink:0}
.pipeline-stage:hover{border-color:var(--purple);transform:translateY(-2px)}
.pipeline-stage .p-num{font-size:1.6rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text-100)}
.pipeline-stage .p-label{font-size:0.75rem;color:var(--text-400);margin-top:4px}
.pipeline-arrow{color:var(--text-400);font-size:1.2rem;padding:0 4px;flex-shrink:0}
.activity-feed{background:var(--bg-800);border:1px solid var(--bg-700);border-radius:var(--radius-lg);padding:16px}
.activity-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg-700);cursor:pointer;transition:background 0.1s;font-size:0.82rem}
.activity-item:hover{background:var(--bg-700);margin:0 -16px;padding-left:16px;padding-right:16px}
.activity-item:last-child{border-bottom:none}
.activity-item .a-icon{flex-shrink:0;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem}
.activity-item .a-text{color:var(--text-300);line-height:1.4}
.activity-item .a-time{margin-left:auto;color:var(--text-400);font-size:0.75rem;white-space:nowrap;font-family:'JetBrains Mono',monospace}

/* ================================================================
   CONNECTOR GRID
   ================================================================ */
.conn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.conn-chip{display:flex;align-items:center;gap:10px;background:var(--bg-800);border:1px solid var(--bg-700);border-radius:var(--radius);padding:10px 14px;cursor:pointer;transition:all 0.15s}
.conn-chip:hover{border-color:var(--purple);background:var(--bg-700)}
.conn-chip .c-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conn-chip .c-name{font-weight:500;color:var(--text-200);font-size:0.85rem}
.conn-chip .c-cat{margin-left:auto;font-size:0.7rem;color:var(--text-400)}

/* ================================================================
   REMEDIATION WORKFLOW
   ================================================================ */
.rem-layout{display:grid;grid-template-columns:280px 1fr 300px;gap:16px;min-height:500px}
.rem-list{background:var(--bg-800);border:1px solid var(--bg-700);border-radius:var(--radius-lg);overflow-y:auto;max-height:600px}
.rem-list-item{padding:12px 14px;border-bottom:1px solid var(--bg-700);cursor:pointer;transition:background 0.1s;font-size:0.85rem}
.rem-list-item:hover,.rem-list-item.active{background:var(--bg-700)}
.rem-center{background:var(--bg-800);border:1px solid var(--bg-700);border-radius:var(--radius-lg);padding:20px}
.rem-stages{display:flex;align-items:center;gap:4px;margin:20px 0;flex-wrap:wrap}
.rem-stage{padding:8px 16px;border-radius:20px;font-size:0.8rem;font-weight:600;border:2px solid var(--bg-600);color:var(--text-400);transition:all 0.3s}
.rem-stage.current{border-color:var(--purple);color:var(--purple);background:var(--purple-glow)}
.rem-stage.done{border-color:var(--green);color:var(--green);background:rgba(34,197,94,0.1)}
.rem-arrow{color:var(--text-400);font-size:0.8rem}
.rem-ai{background:var(--bg-800);border:1px solid var(--bg-700);border-radius:var(--radius-lg);padding:16px;overflow-y:auto;max-height:600px}
.rem-btn{padding:10px 20px;border-radius:var(--radius);font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;font-family:'Inter',sans-serif}
.rem-btn-primary{background:var(--purple);color:white}
.rem-btn-primary:hover{background:var(--purple-dim)}
.rem-btn-success{background:var(--green);color:white}
.rem-btn-success:hover{background:#16a34a}

/* ================================================================
   SPARKLINES / POSTURE
   ================================================================ */
.sparkline{display:inline-flex;align-items:end;gap:1px;height:24px;vertical-align:middle}
.sparkline .bar{width:4px;border-radius:1px;transition:height 0.3s}
.trend-up{color:var(--green)}
.trend-down{color:var(--red)}
.trend-flat{color:var(--text-400)}

/* ================================================================
   TABS
   ================================================================ */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--bg-700);margin-bottom:16px}
.tab{padding:10px 20px;font-size:0.85rem;font-weight:500;color:var(--text-400);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;user-select:none}
.tab:hover{color:var(--text-200)}
.tab.active{color:var(--purple);border-bottom-color:var(--purple)}

/* ================================================================
   TWO COL GRID
   ================================================================ */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:1200px){.grid-2,.grid-3,.rem-layout{grid-template-columns:1fr}}

/* ================================================================
   MISC
   ================================================================ */
.link{color:var(--purple);cursor:pointer;text-decoration:none}
.link:hover{text-decoration:underline}
.empty-state{text-align:center;padding:40px;color:var(--text-400);font-size:0.9rem}
.tag{display:inline-block;padding:2px 8px;margin:2px;border-radius:4px;font-size:0.7rem;background:var(--bg-700);color:var(--text-300)}
.section-title{font-size:0.85rem;font-weight:600;color:var(--text-100);margin:16px 0 10px}
.divider{border:none;border-top:1px solid var(--bg-700);margin:16px 0}
.text-mono{font-family:'JetBrains Mono',monospace}
.text-sm{font-size:0.8rem}
.text-xs{font-size:0.7rem}
.text-muted{color:var(--text-400)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-yellow{color:var(--yellow)}
.text-purple{color:var(--purple)}
.mt-8{margin-top:8px}
.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}
.mb-16{margin-bottom:16px}
.flex{display:flex}.gap-8{gap:8px}.gap-16{gap:16px}.items-center{align-items:center}.flex-wrap{flex-wrap:wrap}
.w-full{width:100%}
</style>
</head>
<body>

<!-- ============================================================
     SIDEBAR
     ============================================================ -->
<div id="sidebar">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none"><path d="M16 2L4 8v16l12 6 12-6V8L16 2z" stroke="#8b5cf6" stroke-width="2" fill="rgba(139,92,246,0.1)"/><path d="M16 8l-6 3v10l6 3 6-3V11l-6-3z" fill="#8b5cf6" opacity="0.6"/><circle cx="16" cy="16" r="3" fill="#8b5cf6"/></svg>
    <span>Warlock<span class="version">v2.0</span></span>
  </div>
  <div class="nav-scroll" id="nav-container"></div>
</div>

<!-- ============================================================
     TOPBAR
     ============================================================ -->
<div id="topbar">
  <div class="search-box">
    <span style="color:var(--text-400)">&#x1F50D;</span>
    <input type="text" id="global-search" placeholder="Search across all views..." autocomplete="off">
  </div>
  <div class="topbar-right">
    <span class="env-badge">DEMO</span>
    <button class="top-btn" onclick="location.reload()">Reset</button>
  </div>
</div>

<!-- ============================================================
     MAIN CONTENT
     ============================================================ -->
<div id="main"></div>

<!-- ============================================================
     DETAIL PANEL
     ============================================================ -->
<div class="panel-overlay" id="panel-overlay"></div>
<div class="detail-panel" id="detail-panel">
  <div class="panel-header">
    <h2 id="panel-title">Detail</h2>
    <button class="panel-close" id="panel-close">&times;</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<script>
/* ================================================================
   SEEDED PRNG & DATA GENERATION
   ================================================================ */
class PRNG {
  constructor(seed){this.seed=seed}
  next(){this.seed=(this.seed*16807)%2147483647;return(this.seed-1)/2147483646}
  int(min,max){return Math.floor(this.next()*(max-min+1))+min}
  pick(arr){return arr[this.int(0,arr.length-1)]}
  pickN(arr,n){const s=[...arr];const r=[];for(let i=0;i<n&&s.length;i++){const idx=this.int(0,s.length-1);r.push(s.splice(idx,1)[0])}return r}
  chance(p){return this.next()<p}
  date(start,end){return new Date(start.getTime()+this.next()*(end.getTime()-start.getTime()))}
  uuid(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=this.int(0,15);return(c==='x'?r:(r&0x3|0x8)).toString(16)})}
  ip(){return `${this.int(10,192)}.${this.int(0,255)}.${this.int(0,255)}.${this.int(1,254)}`}
  hex(len){let s='';for(let i=0;i<len;i++)s+='0123456789abcdef'[this.int(0,15)];return s}
}

function renderNav(){
  const c=$('#nav-container');
  let html='';
  NAV.forEach(section=>{

    section.items.forEach(item=>{
      const badge=item.badge?`<span class="badge">${item.badge()}</span>`:'';
      html+=`<div class="nav-item${item.id===currentView?' active':''}" data-view="${item.id}"><span class="icon">${item.icon}</span><span>${item.label}</span>${badge}</div>`;
    });
  });
  c.innerHTML=html;
  c.querySelectorAll('.nav-item').forEach(el=>{
    el.addEventListener('click',()=>navigateTo(el.dataset.view));
  });
}

function navigateTo(viewId,opts){
  closePanel();
  currentView=viewId;
  $$('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.view===viewId));
  if(!viewCache[viewId]){
    const div=document.createElement('div');
    div.className='view';
    div.id=`view-${viewId}`;
    $('#main').appendChild(div);
    viewCache[viewId]=div;
    renderView(viewId,opts);
  }else if(opts){
    renderView(viewId,opts);
  }
  $$('.view').forEach(v=>v.classList.remove('active'));
  viewCache[viewId].classList.add('active');
  $('#main').scrollTop=0;
}

/* ================================================================
   SORTING HELPER
   ================================================================ */
function makeSortable(viewId,data,renderFn){
  const state={col:null,dir:'asc'};
  return function sort(col){
    if(state.col===col)state.dir=state.dir==='asc'?'desc':'asc';
    else{state.col=col;state.dir='asc'}
    data.sort((a,b)=>{
      let va=a[col],vb=b[col];
      if(va instanceof Date)va=va.getTime();
      if(vb instanceof Date)vb=vb.getTime();
      if(typeof va==='string')va=va.toLowerCase();
      if(typeof vb==='string')vb=vb.toLowerCase();
      if(va<vb)return state.dir==='asc'?-1:1;
      if(va>vb)return state.dir==='asc'?1:-1;
      return 0;
    });
    renderFn(state.col,state.dir);
  };
}

function thClass(col,sortCol,sortDir){
  if(col===sortCol)return sortDir==='asc'?'sorted-asc':'sorted-desc';
  return '';
}

/* ================================================================
   CLOUD ENVIRONMENTS
   ================================================================ */
function renderCloud(el,opts){
  const data=[...D.cloud];
  let filter=opts?.cloud||'all';
  let stateFilter=opts?.state||'all';

  const sorter=makeSortable('cloud',data,render);
  function render(sortCol,sortDir){
    const filtered=data.filter(c=>(filter==='all'||c.cloud===filter)&&(stateFilter==='all'||c.state===stateFilter));
    const counts={all:data.length,aws:data.filter(c=>c.cloud==='aws').length,azure:data.filter(c=>c.cloud==='azure').length,gcp:data.filter(c=>c.cloud==='gcp').length};
    const stateCounts={all:data.length,running:data.filter(c=>c.state==='running').length,stopped:data.filter(c=>c.state==='stopped').length,terminated:data.filter(c=>c.state==='terminated').length};

    el.innerHTML=`
      <div class="page-hdr"><h1>Cloud Environments</h1><p>${fmtN(data.length)} instances across AWS, Azure, and GCP</p></div>
      <div class="stats-row">
        <div class="stat-card"><div class="label">Total Instances</div><div class="value">${fmtN(data.length)}</div></div>
        <div class="stat-card"><div class="label">Running</div><div class="value text-green">${fmtN(stateCounts.running)}</div></div>
        <div class="stat-card"><div class="label">Encrypted Volumes</div><div class="value">${fmtN(data.filter(c=>c.encrypted_volumes).length)}</div></div>
        <div class="stat-card"><div class="label">Public IPs</div><div class="value text-yellow">${fmtN(data.filter(c=>c.public_ip).length)}</div></div>
      </div>
      <div class="tab-bar">
        ${['all','aws','azure','gcp'].map(t=>`<div class="tab${filter===t?' active':''}" onclick="this._cloudFilter='${t}'">${t==='all'?'All':t.toUpperCase()} <span class="text-muted">(${counts[t]})</span></div>`).join('')}
      </div>
      <div class="filters">
        ${['all','running','stopped','terminated'].map(s=>`<span class="pill${stateFilter===s?' active':''}" onclick="this._stateFilter='${s}'">${s==='all'?'All States':s} <span class="count">${stateCounts[s]||0}</span></span>`).join('')}
      </div>
      <div class="tbl-wrap"><table><thead><tr>
        <th class="${thClass('instance_id',sortCol,sortDir)}" data-col="instance_id">ID</th>
        <th class="${thClass('name',sortCol,sortDir)}" data-col="name">Name</th>
        <th class="${thClass('cloud',sortCol,sortDir)}" data-col="cloud">Cloud</th>
        <th class="${thClass('region',sortCol,sortDir)}" data-col="region">Region</th>
        <th class="${thClass('instance_type',sortCol,sortDir)}" data-col="instance_type">Type</th>
        <th class="${thClass('state',sortCol,sortDir)}" data-col="state">State</th>
        <th class="${thClass('public_ip',sortCol,sortDir)}" data-col="public_ip">Public IP</th>
        <th>Encrypted</th>
      </tr></thead><tbody>
        ${filtered.slice(0,100).map(c=>`<tr data-id="${c.instance_id}">
          <td class="mono text-sm">${c.instance_id}</td>
          <td>${c.name}</td>
          <td><span class="tag">${c.cloud.toUpperCase()}</span></td>
          <td class="mono text-sm">${c.region}</td>
          <td class="mono text-sm">${c.instance_type}</td>
          <td><span class="${statusClass(c.state)}">${c.state}</span></td>
          <td class="mono text-sm">${c.public_ip||'--'}</td>
          <td>${c.encrypted_volumes?'<span class="text-green">Yes</span>':'<span class="text-red">No</span>'}</td>
        </tr>`).join('')}
      </tbody></table></div>`;

    // Bind events
    el.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',function(){filter=this._cloudFilter;render(sortCol,sortDir)}));
    el.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',function(){stateFilter=this._stateFilter;render(sortCol,sortDir)}));
    el.querySelectorAll('th[data-col]').forEach(th=>th.addEventListener('click',()=>sorter(th.dataset.col)));
    el.querySelectorAll('tbody tr').forEach(tr=>tr.addEventListener('click',()=>{
      const c=data.find(x=>x.instance_id===tr.dataset.id);if(!c)return;
      openPanel(c.name,`
        <div class="panel-section"><h3>Instance Details</h3>${panelFields([['Instance ID',c.instance_id],['Name',c.name],['Cloud',c.cloud.toUpperCase()],['Region',c.region],['Type',c.instance_type],['State',`<span class="${statusClass(c.state)}">${c.state}</span>`],['Public IP',c.public_ip||'None'],['Private IP',c.private_ip],['VPC',c.vpc_id],['Encrypted',c.encrypted_volumes?'Yes':'No'],['Launched',fmtDate(c.launched_at)]])}</div>
        <div class="panel-section"><h3>Security Groups</h3>${c.security_groups.map(sg=>`<span class="tag">${sg}</span>`).join(' ')}</div>
        <div class="panel-section"><h3>Tags</h3>${panelFields(Object.entries(c.tags))}</div>
        ${cliBlock([`warlock cloud instance ${c.instance_id}`,`warlock cloud security-groups ${c.vpc_id}`,`warlock findings --resource ${c.instance_id}`])}
        ${aiBox(8)}
      `);
    }));
  }
  render();
}

}

/* ================================================================
   REMEDIATION WORKFLOW
   ================================================================ */
function renderRemediation(el){
  const failingControls=[];
  Object.entries(D.controlResults).forEach(([fwId,controls])=>{
    controls.filter(c=>c.status==='fail').slice(0,5).forEach(c=>{
      failingControls.push({...c,fwId});
    });
  });
  const stages=['Broken','Investigate','Remediate','Verify','Closed'];
  let selected=0;
  let stageStates=failingControls.map(()=>0);

  function render(){
    const ctrl=failingControls[selected];
    const stage=stageStates[selected];
    const tIdx=selected%AI_TEMPLATES.length;
    const t=AI_TEMPLATES[tIdx];

    el.innerHTML=`
      <div class="page-hdr"><h1>Remediation Workflow</h1><p>Interactive remediation of non-compliant controls</p></div>
      <div class="rem-layout">
        <div class="rem-list">
          <div style="padding:12px 14px;border-bottom:1px solid var(--bg-700);font-size:0.75rem;text-transform:uppercase;color:var(--text-400);font-weight:600">Non-Compliant Controls (${failingControls.length})</div>
          ${failingControls.map((c,i)=>`<div class="rem-list-item${i===selected?' active':''}" data-idx="${i}">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="color:${stageStates[i]>=4?'var(--green)':'var(--red)'}">&#x25CF;</span>
              <span class="mono text-sm">${c.id}</span>
            </div>
            <div class="text-xs text-muted mt-8">${c.framework_name}</div>
          </div>`).join('')}
        </div>
        <div class="rem-center">
          <h3 style="color:var(--text-100)">${ctrl.id} - ${ctrl.framework_name}</h3>
          <div class="rem-stages">
            ${stages.map((s,i)=>`<span class="rem-stage${i===stage?' current':''}${i<stage?' done':''}">${s}</span>${i<stages.length-1?'<span class="rem-arrow">\u2192</span>':''}`).join('')}
          </div>
          <div style="padding:16px 0;font-size:0.85rem;color:var(--text-300);line-height:1.6">
            ${stage===0?'<div style="color:var(--red);font-weight:600;margin-bottom:8px">Control is FAILING</div><p>This control has been identified as non-compliant. Click "Investigate" to begin the remediation workflow.</p>':''}
            ${stage===1?'<div style="color:var(--yellow);font-weight:600;margin-bottom:8px">Under Investigation</div><p>AI analysis has identified the root cause. Review the analysis panel on the right and proceed to remediation when ready.</p>':''}
            ${stage===2?`<div style="color:var(--orange);font-weight:600;margin-bottom:8px">Remediation In Progress</div><p>Execute the following commands to remediate:</p>${cliBlock([`warlock remediate ${ctrl.id} -a show`,`warlock control ${ctrl.id} --framework ${ctrl.fwId}`,`warlock remediate ${ctrl.id} -a transition --status remediated`])}`:''}
            ${stage===3?'<div style="color:var(--cyan);font-weight:600;margin-bottom:8px">Verifying Remediation</div><p>Running verification checks against the control requirements...</p>':''}
            ${stage>=4?'<div style="color:var(--green);font-weight:600;margin-bottom:8px">Control PASSING</div><p>Remediation verified successfully. Control is now compliant.</p>':''}
          </div>
          <div style="display:flex;gap:8px;margin-top:16px">
            ${stage<4?`<button class="rem-btn ${stage<2?'rem-btn-primary':'rem-btn-success'}" id="rem-advance">${stage===0?'Investigate':stage===1?'Begin Remediation':stage===2?'Mark Remediated':'Verify & Close'}</button>`:'<span class="text-green" style="font-weight:600">Remediation Complete</span>'}
          </div>
        </div>
        <div class="rem-ai">
          <div style="font-size:0.75rem;text-transform:uppercase;color:var(--text-400);font-weight:600;margin-bottom:12px">AI Reasoning</div>
          ${aiBox(tIdx)}
        </div>
      </div>`;

    el.querySelectorAll('.rem-list-item').forEach(item=>item.addEventListener('click',()=>{selected=parseInt(item.dataset.idx);render()}));
    const advBtn=el.querySelector('#rem-advance');
    if(advBtn)advBtn.addEventListener('click',()=>{if(stageStates[selected]<4){stageStates[selected]++;render()}});
  }
  render();
}

        </tr>`;
      }).join('')}

function renderPosture(el){
  const rng=new PRNG(2200);
  el.innerHTML=`
    <div class="page-hdr"><h1>Posture History</h1><p>Control compliance trends over the last 12 weeks</p></div>
    <div class="tbl-wrap"><table><thead><tr>
      <th>Framework</th><th>Current</th><th>12-Week Trend</th><th>Slope</th><th>Change</th>
    </tr></thead><tbody>
      ${FRAMEWORKS.map(fw=>{
        const values=[];let v=fw.score-rng.int(0,10);
        for(let i=0;i<12;i++){v+=rng.int(-3,4);v=Math.max(40,Math.min(100,v));values.push(v)}
        const change=values[11]-values[0];
        const slope=change>2?'improving':change<-2?'degrading':'stable';
        const color=slope==='improving'?'var(--green)':slope==='degrading'?'var(--red)':'var(--text-400)';
        return `<tr>
          <td><span class="link" onclick="navigateTo('compliance',{framework:'${fw.id}'})">${fw.name}</span></td>
          <td class="mono" style="color:${scoreColor(fw.score)}">${fw.score}%</td>
          <td>${sparkline(values,color)}</td>
          <td style="color:${color}">${slope==='improving'?'\u2191':slope==='degrading'?'\u2193':'\u2192'} ${slope}</td>
          <td class="mono" style="color:${color}">${change>0?'+':''}${change}%</td>
        </tr>`;
      }).join('')}
    </tbody></table></div>
    ${cliBlock(['warlock posture-history -f nist_800_53','warlock posture-history -f iso_27001','warlock drift'])}`;
}

          :`<div style="padding:8px;background:rgba(239,68,68,0.1);border-radius:var(--radius);font-size:0.82rem;color:var(--red)">No matching IdP account found</div>`}
        </div>
        <div class="panel-section"><h3>Training (${empTraining.length})</h3>${empTraining.length?empTraining.map(t=>`<div style="padding:4px 0;font-size:0.82rem">${t.course_name} - <span class="${statusClass(t.status)}">${t.status}</span></div>`).join(''):'<span class="text-muted">No training records</span>'}</div>
        ${cliBlock([`warlock personnel ${e.employee_id}`,`warlock personnel --department ${e.department}`])}
        ${e.status==='terminated'&&matchUser?aiBox(11):''}
      `);
    }));
  }
  render();
}

/* ================================================================
   VENDORS
   ================================================================ */
function renderVendors(el){
  const data=[...D.vendors];
  const sorter=makeSortable('vendors',data,render);
  function render(sortCol,sortDir){
    el.innerHTML=`
      <div class="page-hdr"><h1>Vendor Assessments</h1><p>${data.length} third-party vendors assessed</p></div>
      <div class="stats-row">
        <div class="stat-card"><div class="label">Total Vendors</div><div class="value">${data.length}</div></div>
        <div class="stat-card"><div class="label">Low Risk</div><div class="value text-green">${data.filter(v=>v.risk_score>=85).length}</div></div>
        <div class="stat-card"><div class="label">High Risk</div><div class="value text-orange">${data.filter(v=>v.risk_score<70&&v.risk_score>=50).length}</div></div>
        <div class="stat-card"><div class="label">Critical Risk</div><div class="value text-red">${data.filter(v=>v.risk_score<50).length}</div></div>
      </div>
      <div class="tbl-wrap"><table><thead><tr>
        <th class="${thClass('vendor_name',sortCol,sortDir)}" data-col="vendor_name">Vendor</th>
        <th class="${thClass('category',sortCol,sortDir)}" data-col="category">Category</th>
        <th class="${thClass('risk_score',sortCol,sortDir)}" data-col="risk_score">Risk Score</th>
        <th class="${thClass('rating',sortCol,sortDir)}" data-col="rating">Rating</th>
        <th>Certifications</th>
        <th class="${thClass('sla_compliance',sortCol,sortDir)}" data-col="sla_compliance">SLA %</th>
        <th class="${thClass('last_assessment',sortCol,sortDir)}" data-col="last_assessment">Last Assessment</th>
      </tr></thead><tbody>
        ${data.map(v=>`<tr data-id="${v.vendor_id}">
          <td style="font-weight:500">${v.vendor_name}</td>
          <td><span class="tag">${v.category}</span></td>
          <td class="mono" style="color:${v.risk_score>=85?'var(--green)':v.risk_score>=70?'var(--yellow)':v.risk_score>=50?'var(--orange)':'var(--red)'}">${v.risk_score}</td>
          <td>${v.rating}</td>
          <td>${v.certifications.slice(0,2).map(c=>`<span class="tag">${c}</span>`).join(' ')}${v.certifications.length>2?`<span class="text-muted text-xs"> +${v.certifications.length-2}</span>`:''}</td>
          <td class="mono">${v.sla_compliance}%</td>
          <td class="mono text-sm">${fmtDate(v.last_assessment)}</td>
        </tr>`).join('')}
      </tbody></table></div>
      ${cliBlock(['warlock vendors','warlock vendors --threshold 70'])}`;

    el.querySelectorAll('th[data-col]').forEach(th=>th.addEventListener('click',()=>sorter(th.dataset.col)));
    el.querySelectorAll('tbody tr').forEach(tr=>tr.addEventListener('click',()=>{
      const v=data.find(x=>x.vendor_id===tr.dataset.id);if(!v)return;
      openPanel(v.vendor_name,`
        <div class="panel-section"><h3>Vendor Details</h3>${panelFields([['ID',v.vendor_id],['Name',v.vendor_name],['Category',v.category],['Risk Score',`<span style="color:${v.risk_score>=70?'var(--green)':'var(--red)'};">${v.risk_score}</span>`],['Rating',v.rating],['SLA Compliance',`${v.sla_compliance}%`],['Last Assessment',fmtDate(v.last_assessment)]])}</div>
        <div class="panel-section"><h3>Certifications</h3>${v.certifications.map(c=>`<span class="tag">${c}</span>`).join(' ')}</div>
        ${cliBlock([`warlock vendors "${v.vendor_name}"`,`warlock questionnaires --vendor "${v.vendor_name}"`])}
        ${v.risk_score<70?aiBox(10):''}
      `);
    }));
  }
  render();
}

/* ================================================================
   PIPELINE VIZ
   ================================================================ */
function renderPipeline(el){
  const stages=[
    {name:'Collect',desc:'82 connectors pull raw events',count:82,icon:'\uD83D\uDD0C',color:'var(--blue)'},
    {name:'Normalize',desc:'82 normalizers parse to FindingData',count:358,icon:'\u2699',color:'var(--purple)'},
    {name:'Map',desc:'Findings mapped to framework controls',count:'5,007',icon:'\uD83D\uDDFA',color:'var(--cyan)'},
    {name:'Assess',desc:'101 assertions evaluate compliance',count:'373,852',icon:'\uD83D\uDD0D',color:'var(--green)'},
    {name:'Report',desc:'14 frameworks scored and reported',count:14,icon:'\uD83D\uDCCA',color:'var(--yellow)'}
  ];
  const rng=new PRNG(3000);

  el.innerHTML=`
    <div class="page-hdr"><h1>Pipeline Visualization</h1><p>End-to-end data flow with hash-chain integrity verification</p></div>
    <div style="display:flex;align-items:stretch;gap:0;margin:24px 0;overflow-x:auto">
      ${stages.map((s,i)=>`
        <div style="flex:1;min-width:180px;text-align:center;padding:24px 16px;background:var(--bg-800);border:1px solid var(--bg-700);${i===0?'border-radius:var(--radius-lg) 0 0 var(--radius-lg)':''}${i===stages.length-1?'border-radius:0 var(--radius-lg) var(--radius-lg) 0':''}cursor:pointer" onclick="${i===0?`navigateTo('connectors')`:i===4?`navigateTo('compliance')`:''}" class="pipeline-stage-big">
          <div style="font-size:2rem;margin-bottom:8px">${s.icon}</div>
          <div style="font-size:0.85rem;font-weight:600;color:var(--text-100)">${s.name}</div>
          <div style="font-size:2rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:${s.color};margin:8px 0">${s.count}</div>
          <div style="font-size:0.75rem;color:var(--text-400)">${s.desc}</div>
        </div>
        ${i<stages.length-1?'<div style="display:flex;align-items:center;padding:0 4px;font-size:1.5rem;color:var(--text-400)">\u2192</div>':''}
      `).join('')}
    </div>
    <div class="section-title">Hash Chain Integrity</div>
    <div style="background:var(--bg-800);border:1px solid var(--bg-700);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="color:var(--green);font-size:1.2rem">\u2713</span>
        <span style="font-weight:600;color:var(--green)">Hash chain verified -- all pipeline stages intact</span>
      </div>
      ${stages.map((s,i)=>`<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--bg-700);font-size:0.82rem">
        <span style="color:${s.color}">${s.icon}</span>
        <span style="width:80px;color:var(--text-200)">${s.name}</span>
        <span class="mono text-muted" style="flex:1">sha256:${rng.hex(16)}...${rng.hex(8)}</span>
        <span class="text-green">\u2713</span>
      </div>`).join('')}
    </div>
    ${cliBlock(['warlock init','warlock collect','warlock ingest','warlock results','warlock coverage'])}`;
}

renderNav();
navigateTo('dashboard');
